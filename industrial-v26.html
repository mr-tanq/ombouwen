<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally Ombouwen v26</title>
  <style>
    :root{
      --bg:#0b0d12;
      --card:#171c24;
      --line:rgba(255,255,255,.08);
      --lineGold:rgba(216,180,138,.22);
      --text:#f5f7fb;
      --muted:rgba(255,255,255,.60);
      --gold:#d8b48a;
      --blue:#67b8ff;
      --green:#59d48a;
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#0b0d12,#0f141b 40%,#0b0d12 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{min-height:100vh}
    button,input,textarea{font:inherit}
    img{max-width:100%;display:block}
    .app{max-width:1180px;margin:0 auto;padding:18px 14px 42px}
    .hero{border:1px solid var(--lineGold);background:radial-gradient(circle at top right, rgba(216,180,138,.14), transparent 28%),radial-gradient(circle at top left, rgba(103,184,255,.07), transparent 26%),linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));border-radius:34px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px;overflow:hidden}
    .heroTop{display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brandWrap{display:flex;gap:16px;align-items:center;min-width:0}
    .logoBox{width:84px;height:84px;border-radius:22px;background:#0b0d12;border:1px solid rgba(216,180,138,.16);padding:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:rgba(216,180,138,.76);font-weight:800;margin-bottom:6px}
    h1,h2,h3,h4,p{margin:0}
    h1{font-size:clamp(30px,5vw,50px);line-height:.95;letter-spacing:-.05em;font-weight:900}
    .heroSub{margin-top:10px;max-width:760px;color:var(--muted);line-height:1.5;font-size:15px}
    .statusPill,.pill{border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.18);border-radius:999px;padding:10px 14px;display:inline-flex;gap:10px;align-items:center;color:var(--muted);font-size:12px;white-space:nowrap;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .statusDot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 6px rgba(89,212,138,.12);flex:0 0 auto}
    .summaryBar{margin-top:18px;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:22px;padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .summaryNode,.summaryArrow{border-radius:16px;padding:10px 12px;font-weight:800;font-size:13px}
    .summaryNode{background:#0f1319;border:1px solid rgba(255,255,255,.06)}
    .summaryNode.active{background:var(--gold);color:#111;border-color:transparent}
    .summaryArrow{color:rgba(255,255,255,.34);padding-left:2px;padding-right:2px}
    .stepTrack{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:18px 0 16px}
    .stepDot{height:8px;border-radius:999px;background:rgba(255,255,255,.08)}
    .stepDot.active{background:linear-gradient(90deg,var(--gold),#f1d4b1)}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:18px}
    .sectionHead{display:flex;gap:14px;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
    .sectionTitle{font-size:clamp(26px,4vw,38px);font-weight:900;letter-spacing:-.04em}
    .sectionSub{margin-top:8px;color:var(--muted);max-width:760px;line-height:1.5;font-size:15px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .grid2,.grid4,.setupGrid,.miniMenu,.mainCols{display:grid;gap:14px}
    .grid2,.setupGrid,.miniMenu,.mainCols{grid-template-columns:repeat(2,1fr)}
    .grid4{grid-template-columns:repeat(2,1fr)}
    .setupPanel,.sidePanel{border-radius:26px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));padding:16px}
    .setupTitle{font-size:24px;font-weight:900;letter-spacing:-.03em}
    .setupSub{margin-top:6px;color:var(--muted);font-size:14px}
    .chipRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .chipLabel{margin-top:14px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(216,180,138,.78);font-weight:800}
    .chip,.backBtn,.ghostBtn,.primaryBtn,.toggleBtn,.menuBtn{border:none;cursor:pointer;transition:.18s ease}
    .chip,.backBtn,.ghostBtn,.toggleBtn{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:11px 14px;font-weight:700}
    .chip.active,.toggleBtn.active{background:rgba(103,184,255,.14);color:#dff1ff;border-color:rgba(103,184,255,.28)}
    .primaryBtn{background:linear-gradient(180deg,#efd2b2,var(--gold));color:#111;border-radius:999px;padding:14px 20px;font-weight:900;box-shadow:0 14px 32px rgba(216,180,138,.22)}
    .primaryBtn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
    .menuBtn{text-align:left;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));color:var(--text);padding:22px 18px;min-height:150px}
    .menuBtn:hover{transform:translateY(-1px);border-color:rgba(216,180,138,.25)}
    .tileIcon{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:rgba(216,180,138,.12);border:1px solid rgba(216,180,138,.14);font-size:28px;margin-bottom:16px}
    .tileTitle{font-size:24px;font-weight:900;letter-spacing:-.03em}.tileMeta{margin-top:10px;color:var(--muted);line-height:1.45;font-size:14px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .listPanel{margin-top:14px;border-radius:24px;border:1px solid var(--line);background:rgba(0,0,0,.16);padding:14px}
    .valueList{display:grid;gap:10px}.valueRow{border-radius:20px;border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.18);padding:14px}
    .valueLabel{font-size:13px;color:var(--muted);line-height:1.35}.valueFlow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .valueBox{border-radius:14px;padding:10px 12px;font-weight:800;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
    .valueBox.new{background:rgba(103,184,255,.12);color:#cfe8ff;border-color:rgba(103,184,255,.22)}
    .valueArrow{color:rgba(255,255,255,.35);font-weight:900}.emptyNote{color:var(--muted);padding:18px;border:1px dashed rgba(255,255,255,.1);border-radius:20px;background:rgba(0,0,0,.12)}
    .stepPlayer{margin-top:14px;border-radius:28px;border:1px solid rgba(103,184,255,.24);background:linear-gradient(180deg, rgba(103,184,255,.08), rgba(103,184,255,.04));padding:16px}
    .progressText{color:var(--muted);font-size:13px;margin-bottom:10px}.progressBar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:14px}
    .progressFill{height:100%;background:linear-gradient(90deg,var(--blue),#a5d4ff);border-radius:999px}.stepPlayerCard{border-radius:22px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);padding:16px}.stepPlayerLabel{font-size:14px;color:var(--muted);margin-bottom:12px}.playerControls{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    .metaGrid{display:grid;gap:10px}.metaCard{padding:12px;border-radius:18px;background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.06)}.metaLabel{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}.metaValue{font-weight:800;line-height:1.5}
    .historyList{display:grid;gap:10px}.historyItem{padding:12px;border-radius:18px;background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.06)}
    textarea{width:100%;min-height:340px;background:#0f1319;color:var(--text);border:1px solid var(--line);border-radius:18px;padding:14px;resize:vertical}
    .bottomBar{position:sticky;bottom:10px;margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;background:rgba(11,13,18,.72);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:24px;padding:12px}
    .hiddenInput{display:none}
    @media (max-width:900px){.setupGrid,.grid2,.grid4,.miniMenu,.mainCols{grid-template-columns:1fr}.heroTop{align-items:flex-start}.logoBox{width:72px;height:72px}.summaryBar{padding:12px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script>
    const BISCUITS = [
      { id: 'richtea', label: 'Rich Tea', formats: ['5x6', '3x6'], icon: '🍪' },
      { id: 'koffiekoek', label: 'Koffiekoek', formats: ['4x4', '4x5', '5x5'], icon: '🧈' },
      { id: 'theekokos', label: 'Thee/Kokos', formats: ['5x5'], icon: '🥥' }
    ];

    const FILES = {
      cavanna9: './data/cavanna9.json',
      cavanna10: './data/cavanna10.json',
      robertpack: './data/robertpack.json',
      dozen: './data/dozen.json',
      dekselaar: './data/dekselaar.json'
    };

    const STORAGE_KEY = 'pally-ombouwen-v26-overrides';

    function biscuitLabel(id){ return BISCUITS.find(b => b.id === id)?.label || ''; }
    function formatsForBiscuit(id){ return BISCUITS.find(b => b.id === id)?.formats || []; }
    function buildFlowRows(fromObj, toObj){
      const keys = Array.from(new Set([...(Object.keys(fromObj||{})), ...(Object.keys(toObj||{}))]));
      return keys.map(key => [key, fromObj?.[key] ?? '—', toObj?.[key] ?? '—']);
    }
    function filterRows(rows, onlyChanges){ return onlyChanges ? rows.filter(r => r[1] !== r[2]) : rows; }
    function safeJsonParse(text, fallback){ try { return JSON.parse(text); } catch { return fallback; } }
    function downloadJson(filename, data){
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function StepDots({ stage }){
      return React.createElement('div', { className: 'stepTrack' },
        [1,2].map(n => React.createElement('div', { key:n, className:'stepDot' + (stage >= n ? ' active' : '') }))
      );
    }

    function BiscuitChipGroup({ value, onChange }){
      return React.createElement('div', { className: 'chipRow' },
        BISCUITS.map(b => React.createElement('button', {
          key: b.id,
          className: 'chip' + (value === b.id ? ' active' : ''),
          onClick: () => onChange(b.id)
        }, b.label))
      );
    }

    function FormatChipGroup({ biscuitId, value, onChange }){
      const formats = formatsForBiscuit(biscuitId);
      return React.createElement('div', { className: 'chipRow' },
        formats.map(f => React.createElement('button', {
          key: f,
          className: 'chip' + (value === f ? ' active' : ''),
          onClick: () => onChange(f)
        }, f))
      );
    }

    function ValueList({ rows }){
      if (!rows.length) return React.createElement('div', { className: 'emptyNote' }, 'No rows to show.');
      return React.createElement('div', { className: 'valueList' },
        rows.map((row, i) => React.createElement('div', { className: 'valueRow', key: i },
          React.createElement('div', { className: 'valueLabel' }, row[0]),
          React.createElement('div', { className: 'valueFlow' },
            React.createElement('div', { className: 'valueBox' }, row[1]),
            React.createElement('div', { className: 'valueArrow' }, '→'),
            React.createElement('div', { className: 'valueBox new' }, row[2])
          )
        ))
      );
    }

    function StepPlayer({ rows, index, setIndex, onClose }){
      const total = rows.length;
      const current = rows[index];
      if (!total || !current) return React.createElement('div', { className: 'emptyNote' }, 'No steps available.');
      const progress = ((index + 1) / total) * 100;
      return React.createElement('div', { className: 'stepPlayer' },
        React.createElement('div', { className: 'progressText' }, 'Step ' + (index + 1) + ' of ' + total),
        React.createElement('div', { className: 'progressBar' },
          React.createElement('div', { className: 'progressFill', style: { width: progress + '%' } })
        ),
        React.createElement('div', { className: 'stepPlayerCard' },
          React.createElement('div', { className: 'stepPlayerLabel' }, current[0]),
          React.createElement('div', { className: 'valueFlow' },
            React.createElement('div', { className: 'valueBox' }, current[1]),
            React.createElement('div', { className: 'valueArrow' }, '→'),
            React.createElement('div', { className: 'valueBox new' }, current[2])
          ),
          React.createElement('div', { className: 'playerControls' },
            React.createElement('button', { className: 'backBtn', disabled: index === 0, onClick: () => index > 0 && setIndex(index - 1) }, 'Previous'),
            React.createElement('button', { className: 'primaryBtn', onClick: () => index < total - 1 && setIndex(index + 1) }, index < total - 1 ? 'Next' : 'Done'),
            React.createElement('button', { className: 'ghostBtn', onClick: onClose }, 'Close')
          )
        )
      );
    }

    function MachineSidebar({ machineData, machineKey, onImport, onResetOverride, onSaveRaw }){
      const [editMode, setEditMode] = React.useState(false);
      const [rawText, setRawText] = React.useState(JSON.stringify(machineData, null, 2));
      const fileInputRef = React.useRef(null);

      React.useEffect(() => {
        setRawText(JSON.stringify(machineData, null, 2));
      }, [machineData]);

      const meta = machineData?.meta || {};
      const history = meta.versionHistory || [];

      return React.createElement('div', { className: 'sidePanel' },
        React.createElement('div', { className: 'setupTitle', style: { marginBottom: '10px' } }, 'Data tools'),
        React.createElement('div', { className: 'toolbar' },
          React.createElement('button', { className: 'toggleBtn' + (editMode ? ' active' : ''), onClick: () => setEditMode(v => !v) }, editMode ? 'Close edit mode' : 'Edit mode'),
          React.createElement('button', { className: 'ghostBtn', onClick: () => downloadJson(machineKey + '.json', machineData) }, 'Export JSON'),
          React.createElement('button', { className: 'ghostBtn', onClick: () => fileInputRef.current && fileInputRef.current.click() }, 'Import JSON'),
          React.createElement('button', { className: 'ghostBtn', onClick: onResetOverride }, 'Reset local edits')
        ),
        React.createElement('input', {
          className: 'hiddenInput',
          type: 'file',
          accept: 'application/json,.json',
          ref: fileInputRef,
          onChange: async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const text = await file.text();
            const parsed = safeJsonParse(text, null);
            if (parsed) onImport(parsed);
            e.target.value = '';
          }
        }),
        editMode ? React.createElement(React.Fragment, null,
          React.createElement('textarea', { value: rawText, onChange: (e) => setRawText(e.target.value) }),
          React.createElement('div', { className: 'toolbar', style: { marginTop: '10px' } },
            React.createElement('button', { className: 'primaryBtn', onClick: () => onSaveRaw(rawText) }, 'Save local JSON')
          )
        ) : null,
        React.createElement('div', { className: 'metaGrid', style: { marginTop: '12px' } },
          React.createElement('div', { className: 'metaCard' },
            React.createElement('div', { className: 'metaLabel' }, 'Machine'),
            React.createElement('div', { className: 'metaValue' }, meta.machine || machineKey)
          ),
          React.createElement('div', { className: 'metaCard' },
            React.createElement('div', { className: 'metaLabel' }, 'Version'),
            React.createElement('div', { className: 'metaValue' }, meta.version || '—')
          ),
          React.createElement('div', { className: 'metaCard' },
            React.createElement('div', { className: 'metaLabel' }, 'Latest revision date'),
            React.createElement('div', { className: 'metaValue' }, meta.latestRevisionDate || '—')
          ),
          React.createElement('div', { className: 'metaCard' },
            React.createElement('div', { className: 'metaLabel' }, 'Notes'),
            React.createElement('div', { className: 'metaValue' }, meta.notes || '—')
          )
        ),
        React.createElement('div', { className: 'setupTitle', style: { marginTop: '14px', marginBottom: '10px', fontSize: '20px' } }, 'Version history'),
        history.length
          ? React.createElement('div', { className: 'historyList' },
              history.map((item, idx) => React.createElement('div', { className: 'historyItem', key: idx },
                React.createElement('div', { className: 'metaValue' }, (item.version || '—') + ' • ' + (item.date || '—')),
                React.createElement('div', { className: 'sectionSub', style: { marginTop: '6px', fontSize: '13px' } }, item.note || '')
              ))
            )
          : React.createElement('div', { className: 'emptyNote' }, 'No history.')
      );
    }

    function SectionDetail({ title, rows, extraToolbar, onBack, onStartOver, machineData, machineKey, onImport, onResetOverride, onSaveRaw }){
      const [viewMode, setViewMode] = React.useState(null);
      const [onlyChanges, setOnlyChanges] = React.useState(true);
      const [stepIndex, setStepIndex] = React.useState(0);
      const visibleRows = filterRows(rows, onlyChanges);

      return React.createElement('div', { className: 'mainCols' },
        React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'sectionHead' },
            React.createElement('div', null,
              React.createElement('div', { className: 'eyebrow' }, 'Section'),
              React.createElement('div', { className: 'sectionTitle' }, title),
              React.createElement('div', { className: 'sectionSub' }, 'Choose Start Ombouw or Show List.')
            ),
            React.createElement('div', { className: 'row' },
              React.createElement('button', { className: 'backBtn', onClick: onBack }, 'Back'),
              React.createElement('button', { className: 'ghostBtn', onClick: onStartOver }, 'Start over')
            )
          ),
          extraToolbar,
          React.createElement('div', { className: 'miniMenu' },
            React.createElement('button', { className: 'menuBtn' + (viewMode === 'start' ? ' selected' : ''), onClick: () => { setViewMode('start'); setStepIndex(0); } },
              React.createElement('div', { className: 'tileIcon' }, '▶️'),
              React.createElement('div', { className: 'tileTitle' }, 'Start Ombouw'),
              React.createElement('div', { className: 'tileMeta' }, 'Step by step. One change at a time.')
            ),
            React.createElement('button', { className: 'menuBtn' + (viewMode === 'list' ? ' selected' : ''), onClick: () => setViewMode('list') },
              React.createElement('div', { className: 'tileIcon' }, '📋'),
              React.createElement('div', { className: 'tileTitle' }, 'Show List'),
              React.createElement('div', { className: 'tileMeta' }, 'Open the list and compare old → new values.')
            )
          ),
          viewMode ? React.createElement('div', { className: 'toolbar', style: { marginTop: '14px' } },
            React.createElement('button', { className: 'toggleBtn' + (!onlyChanges ? ' active' : ''), onClick: () => { setOnlyChanges(false); setStepIndex(0); } }, 'Show all'),
            React.createElement('button', { className: 'toggleBtn' + (onlyChanges ? ' active' : ''), onClick: () => { setOnlyChanges(true); setStepIndex(0); } }, 'Only changes')
          ) : null,
          viewMode === 'start' ? React.createElement(StepPlayer, { rows: visibleRows, index: stepIndex, setIndex: setStepIndex, onClose: () => setViewMode(null) }) : null,
          viewMode === 'list' ? React.createElement('div', { className: 'listPanel' }, React.createElement(ValueList, { rows: visibleRows })) : null
        ),
        React.createElement(MachineSidebar, { machineData, machineKey, onImport, onResetOverride, onSaveRaw })
      );
    }

    function App(){
      const [stage, setStage] = React.useState(1);
      const [fromBiscuit, setFromBiscuit] = React.useState(null);
      const [fromFormat, setFromFormat] = React.useState(null);
      const [toBiscuit, setToBiscuit] = React.useState(null);
      const [toFormat, setToFormat] = React.useState(null);
      const [section, setSection] = React.useState(null);
      const [cavannaLine, setCavannaLine] = React.useState('9');
      const [robertpackLine, setRobertpackLine] = React.useState('9');
      const [baseData, setBaseData] = React.useState(null);
      const [overrides, setOverrides] = React.useState(() => safeJsonParse(localStorage.getItem(STORAGE_KEY), {}));
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState('');

      React.useEffect(() => {
        (async () => {
          try {
            const entries = await Promise.all(Object.entries(FILES).map(async ([key, path]) => {
              const res = await fetch(path, { cache: 'no-store' });
              if (!res.ok) throw new Error('Failed to load ' + path);
              return [key, await res.json()];
            }));
            setBaseData(Object.fromEntries(entries));
          } catch (e) {
            setError(e.message || 'Failed to load data files.');
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      React.useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
      }, [overrides]);

      function getMachineData(key){
        if (!baseData) return null;
        return overrides[key] || baseData[key];
      }

      function saveMachineOverride(key, data){
        setOverrides(prev => ({ ...prev, [key]: data }));
      }

      function resetMachineOverride(key){
        setOverrides(prev => {
          const copy = { ...prev };
          delete copy[key];
          return copy;
        });
      }

      function saveMachineRaw(key, rawText){
        const parsed = safeJsonParse(rawText, null);
        if (!parsed) {
          alert('Invalid JSON');
          return;
        }
        saveMachineOverride(key, parsed);
        alert('Local JSON saved. Export it when you want to replace the file in GitHub.');
      }

      function resetAll(){
        setStage(1);
        setFromBiscuit(null);
        setFromFormat(null);
        setToBiscuit(null);
        setToFormat(null);
        setSection(null);
        setCavannaLine('9');
        setRobertpackLine('9');
      }

      if (loading) {
        return React.createElement('div', { className: 'app' }, React.createElement('div', { className: 'card' }, 'Loading external data files...'));
      }

      if (error) {
        return React.createElement('div', { className: 'app' }, React.createElement('div', { className: 'card' }, error));
      }

      const cavanna9 = getMachineData('cavanna9');
      const cavanna10 = getMachineData('cavanna10');
      const robertpack = getMachineData('robertpack');
      const dozen = getMachineData('dozen');
      const dekselaar = getMachineData('dekselaar');

      const cavannaSource = cavannaLine === '10' ? cavanna10 : cavanna9;
      const robertpackSource = robertpackLine === '10' ? robertpack?.values?.line10 : robertpack?.values?.line9;

      const cavannaRows = buildFlowRows(cavannaSource?.values?.[fromFormat] || {}, cavannaSource?.values?.[toFormat] || {});
      const robertRows = buildFlowRows(robertpackSource?.[fromFormat] || {}, robertpackSource?.[toFormat] || {});
      const dozenRows = buildFlowRows(dozen?.values?.[fromFormat] || {}, dozen?.values?.[toFormat] || {});
      const dekselaarRows = buildFlowRows(dekselaar?.values?.[fromFormat] || {}, dekselaar?.values?.[toFormat] || {});

      const canContinueSetup = fromBiscuit && fromFormat && toBiscuit && toFormat;

      const summaryBar = React.createElement('div', { className: 'summaryBar' },
        React.createElement('div', { className: 'summaryNode' }, fromBiscuit ? biscuitLabel(fromBiscuit) : 'Van product'),
        fromFormat ? React.createElement('div', { className: 'summaryNode' }, fromFormat) : null,
        React.createElement('div', { className: 'summaryArrow' }, '→'),
        React.createElement('div', { className: 'summaryNode active' }, toBiscuit ? biscuitLabel(toBiscuit) : 'Naar product'),
        toFormat ? React.createElement('div', { className: 'summaryNode active' }, toFormat) : null,
        section ? React.createElement('div', { className: 'summaryArrow' }, '•') : null,
        section ? React.createElement('div', { className: 'summaryNode' }, section === 'cavanna' ? ('Cavanna ' + cavannaLine) : section === 'robertpack' ? ('Robert Pack ' + robertpackLine) : section === 'dozen' ? 'Dozen Opzetter' : 'Dekselaar Opzetter') : null
      );

      return React.createElement('div', { className: 'app' },
        React.createElement('div', { className: 'hero' },
          React.createElement('div', { className: 'heroTop' },
            React.createElement('div', { className: 'brandWrap' },
              React.createElement('div', { className: 'logoBox' },
                React.createElement('img', { src: './pally-logo.png', alt: 'Pally Biscuits logo', onError: (e) => { e.currentTarget.style.display = 'none'; } })
              ),
              React.createElement('div', null,
                React.createElement('div', { className: 'eyebrow' }, 'Pally Biscuits'),
                React.createElement('h1', null, 'Ombouwen'),
                React.createElement('div', { className: 'heroSub' }, 'v26 external data files. Local edit mode, import/export, version history, latest revision date and notes per machine.')
              )
            ),
            React.createElement('div', { className: 'statusPill' },
              React.createElement('div', { className: 'statusDot' }),
              React.createElement('span', null, 'v26 • external data')
            )
          ),
          summaryBar
        ),
        React.createElement(StepDots, { stage }),

        stage === 1 && !section ? React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'sectionHead' },
            React.createElement('div', null,
              React.createElement('div', { className: 'eyebrow' }, 'Setup'),
              React.createElement('div', { className: 'sectionTitle' }, 'Van → Naar'),
              React.createElement('div', { className: 'sectionSub' }, 'Select from which product and format you come, and to which product and format you go.')
            )
          ),
          React.createElement('div', { className: 'setupGrid' },
            React.createElement('div', { className: 'setupPanel' },
              React.createElement('div', { className: 'setupTitle' }, 'Van'),
              React.createElement('div', { className: 'setupSub' }, 'Vorige product en formaat'),
              React.createElement('div', { className: 'chipLabel' }, 'Product'),
              React.createElement(BiscuitChipGroup, { value: fromBiscuit, onChange: (id) => { setFromBiscuit(id); setFromFormat(null); } }),
              fromBiscuit ? React.createElement(React.Fragment, null,
                React.createElement('div', { className: 'chipLabel' }, 'Formaat'),
                React.createElement(FormatChipGroup, { biscuitId: fromBiscuit, value: fromFormat, onChange: setFromFormat })
              ) : null
            ),
            React.createElement('div', { className: 'setupPanel' },
              React.createElement('div', { className: 'setupTitle' }, 'Naar'),
              React.createElement('div', { className: 'setupSub' }, 'Nieuw product en formaat'),
              React.createElement('div', { className: 'chipLabel' }, 'Product'),
              React.createElement(BiscuitChipGroup, { value: toBiscuit, onChange: (id) => { setToBiscuit(id); setToFormat(null); } }),
              toBiscuit ? React.createElement(React.Fragment, null,
                React.createElement('div', { className: 'chipLabel' }, 'Formaat'),
                React.createElement(FormatChipGroup, { biscuitId: toBiscuit, value: toFormat, onChange: setToFormat })
              ) : null
            )
          ),
          React.createElement('div', { className: 'bottomBar' },
            React.createElement('button', { className: 'ghostBtn', onClick: resetAll }, 'Reset'),
            React.createElement('button', { className: 'primaryBtn', disabled: !canContinueSetup, onClick: () => setStage(2) }, 'Verder naar secties')
          )
        ) : null,

        stage === 2 && !section ? React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'sectionHead' },
            React.createElement('div', null,
              React.createElement('div', { className: 'eyebrow' }, 'Sections'),
              React.createElement('div', { className: 'sectionTitle' }, 'Choose section'),
              React.createElement('div', { className: 'sectionSub' }, 'Open the exact machine section you want to work on.')
            ),
            React.createElement('button', { className: 'backBtn', onClick: () => setStage(1) }, 'Back')
          ),
          React.createElement('div', { className: 'grid4' },
            React.createElement('button', { className: 'menuBtn', onClick: () => setSection('cavanna') },
              React.createElement('div', { className: 'tileIcon' }, '⚙️'),
              React.createElement('div', { className: 'tileTitle' }, 'Cavanna'),
              React.createElement('div', { className: 'tileMeta' }, 'Choose line 9 or 10, then Start Ombouw or Show List.')
            ),
            React.createElement('button', { className: 'menuBtn', onClick: () => setSection('robertpack') },
              React.createElement('div', { className: 'tileIcon' }, '📦'),
              React.createElement('div', { className: 'tileTitle' }, 'Robert Pack'),
              React.createElement('div', { className: 'tileMeta' }, 'Choose line 9 or 10, then Start Ombouw or Show List.')
            ),
            React.createElement('button', { className: 'menuBtn', onClick: () => setSection('dozen') },
              React.createElement('div', { className: 'tileIcon' }, '🔧'),
              React.createElement('div', { className: 'tileTitle' }, 'Dozen Opzetter'),
              React.createElement('div', { className: 'tileMeta' }, 'Start Ombouw or Show List.')
            ),
            React.createElement('button', { className: 'menuBtn', onClick: () => setSection('dekselaar') },
              React.createElement('div', { className: 'tileIcon' }, '🧰'),
              React.createElement('div', { className: 'tileTitle' }, 'Dekselaar Opzetter'),
              React.createElement('div', { className: 'tileMeta' }, 'Start Ombouw or Show List.')
            )
          )
        ) : null,

        stage === 2 && section === 'cavanna' ? React.createElement(SectionDetail, {
          title: 'Cavanna', rows: cavannaRows,
          machineData: cavannaSource, machineKey: cavannaLine === '10' ? 'cavanna10' : 'cavanna9',
          onImport: (data) => saveMachineOverride(cavannaLine === '10' ? 'cavanna10' : 'cavanna9', data),
          onResetOverride: () => resetMachineOverride(cavannaLine === '10' ? 'cavanna10' : 'cavanna9'),
          onSaveRaw: (raw) => saveMachineRaw(cavannaLine === '10' ? 'cavanna10' : 'cavanna9', raw),
          onBack: () => setSection(null), onStartOver: resetAll,
          extraToolbar: React.createElement('div', { className: 'toolbar' },
            React.createElement('button', { className: 'toggleBtn' + (cavannaLine === '9' ? ' active' : ''), onClick: () => setCavannaLine('9') }, 'Cavanna 9'),
            React.createElement('button', { className: 'toggleBtn' + (cavannaLine === '10' ? ' active' : ''), onClick: () => setCavannaLine('10') }, 'Cavanna 10'),
            React.createElement('div', { className: 'pill' }, biscuitLabel(fromBiscuit) + ' ' + fromFormat),
            React.createElement('div', { className: 'pill' }, biscuitLabel(toBiscuit) + ' ' + toFormat)
          )
        }) : null,

        stage === 2 && section === 'robertpack' ? React.createElement(SectionDetail, {
          title: 'Robert Pack', rows: robertRows,
          machineData: robertpack, machineKey: 'robertpack',
          onImport: (data) => saveMachineOverride('robertpack', data),
          onResetOverride: () => resetMachineOverride('robertpack'),
          onSaveRaw: (raw) => saveMachineRaw('robertpack', raw),
          onBack: () => setSection(null), onStartOver: resetAll,
          extraToolbar: React.createElement('div', { className: 'toolbar' },
            React.createElement('button', { className: 'toggleBtn' + (robertpackLine === '9' ? ' active' : ''), onClick: () => setRobertpackLine('9') }, 'Lijn 9'),
            React.createElement('button', { className: 'toggleBtn' + (robertpackLine === '10' ? ' active' : ''), onClick: () => setRobertpackLine('10') }, 'Lijn 10'),
            React.createElement('div', { className: 'pill' }, fromFormat),
            React.createElement('div', { className: 'pill' }, toFormat)
          )
        }) : null,

        stage === 2 && section === 'dozen' ? React.createElement(SectionDetail, {
          title: 'Dozen Opzetter', rows: dozenRows,
          machineData: dozen, machineKey: 'dozen',
          onImport: (data) => saveMachineOverride('dozen', data),
          onResetOverride: () => resetMachineOverride('dozen'),
          onSaveRaw: (raw) => saveMachineRaw('dozen', raw),
          onBack: () => setSection(null), onStartOver: resetAll,
          extraToolbar: React.createElement('div', { className: 'toolbar' },
            React.createElement('div', { className: 'pill' }, fromFormat),
            React.createElement('div', { className: 'pill' }, toFormat)
          )
        }) : null,

        stage === 2 && section === 'dekselaar' ? React.createElement(SectionDetail, {
          title: 'Dekselaar Opzetter', rows: dekselaarRows,
          machineData: dekselaar, machineKey: 'dekselaar',
          onImport: (data) => saveMachineOverride('dekselaar', data),
          onResetOverride: () => resetMachineOverride('dekselaar'),
          onSaveRaw: (raw) => saveMachineRaw('dekselaar', raw),
          onBack: () => setSection(null), onStartOver: resetAll,
          extraToolbar: React.createElement('div', { className: 'toolbar' },
            React.createElement('div', { className: 'pill' }, fromFormat),
            React.createElement('div', { className: 'pill' }, toFormat)
          )
        }) : null
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>
