<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally · Ombouwen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:      #000000;
      --surface-1:  rgba(255,255,255,.03);
      --surface-2:  rgba(255,255,255,.055);
      --surface-3:  rgba(255,255,255,.08);
      --border:     rgba(255,255,255,.07);
      --border-2:   rgba(255,255,255,.12);
      --border-3:   rgba(255,255,255,.18);
      --amber:      #f59e0b;
      --amber-dim:  rgba(245,158,11,.18);
      --amber-glow: rgba(245,158,11,.35);
      --blue:       #3b82f6;
      --blue-dim:   rgba(59,130,246,.18);
      --blue-glow:  rgba(59,130,246,.35);
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,.18);
      --green-glow: rgba(34,197,94,.4);
      --red:        #ef4444;
      --text:       #ffffff;
      --text-2:     #94a3b8;
      --text-3:     #475569;
      --mono:       'Geist Mono', monospace;
      --sans:       'Geist', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    button { font: inherit; cursor: pointer; border: none; background: none; }
    img { max-width: 100%; display: block; }

    /* SCANLINE OVERLAY */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,.008) 2px,
        rgba(255,255,255,.008) 4px
      );
    }

    .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; position: relative; z-index: 1; }

    /* ──────────── TOPBAR ──────────── */
    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px;
      position: sticky; top: 0; z-index: 200;
    }

    .topbar-brand { display: flex; align-items: center; gap: 14px; }

    .topbar-logo {
      width: 30px; height: 30px;
      border: 1px solid var(--border-2); border-radius: 6px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); flex-shrink: 0;
    }

    .topbar-name {
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      color: var(--text); letter-spacing: .14em; text-transform: uppercase;
    }

    .topbar-sep { width: 1px; height: 18px; background: var(--border-2); }

    .topbar-module {
      font-family: var(--mono); font-size: 10px; color: var(--text-3);
      letter-spacing: .22em; text-transform: uppercase;
    }

    .topbar-right { display: flex; align-items: center; gap: 16px; }

    .sys-readout {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .08em;
    }

    .status-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid rgba(34,197,94,.2);
      background: rgba(34,197,94,.06);
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow), 0 0 2px var(--green);
      animation: pulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--green-glow)} 50%{opacity:.5;box-shadow:0 0 3px rgba(34,197,94,.15)} }

    .status-label { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: .12em; opacity: .8; }

    /* ──────────── BODY ──────────── */
    .body { display: grid; grid-template-columns: 280px 1fr; }

    /* ──────────── SIDEBAR ──────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,.6);
      display: flex; flex-direction: column;
      padding: 32px 0;
      min-height: calc(100vh - 56px);
      position: sticky; top: 56px; align-self: start;
      max-height: calc(100vh - 56px); overflow-y: auto;
    }

    .sidebar-section { padding: 0 20px 24px; }

    .sidebar-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }

    /* Flow display */
    .flow-card {
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface-1); overflow: hidden;
    }

    .flow-card-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
    }

    .flow-block { padding: 12px 14px; }
    .flow-block + .flow-block { border-left: 1px solid var(--border); }

    .flow-block-label {
      font-family: var(--mono); font-size: 8px; color: var(--text-3);
      letter-spacing: .2em; text-transform: uppercase; margin-bottom: 4px;
    }

    .flow-block-value {
      font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .flow-block-value.dim   { color: var(--text-3); font-weight: 400; }
    .flow-block-value.amber { color: var(--amber); text-shadow: 0 0 12px var(--amber-glow); }

    .flow-arrow-col {
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--surface-1);
      font-family: var(--mono); font-size: 11px; color: var(--text-3);
    }

    .section-tag {
      margin-top: 8px;
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-1);
      font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .06em;
    }

    .tag-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber-glow);
      flex-shrink: 0;
    }

    .sidebar-sep { height: 1px; background: var(--border); margin: 0 20px 24px; }

    /* Steps */
    .step-list { display: flex; flex-direction: column; gap: 3px; padding: 0 20px; }

    .step-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px; cursor: default;
      border: 1px solid transparent;
      transition: all .2s ease;
    }
    .step-item.done   { background: rgba(34,197,94,.05); border-color: rgba(34,197,94,.12); }
    .step-item.active { background: rgba(245,158,11,.05); border-color: rgba(245,158,11,.14); }

    .step-num {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border-2); color: var(--text-3); background: var(--surface-1);
      transition: all .2s ease;
    }
    .step-item.done   .step-num {
      background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.3); color: var(--green);
      box-shadow: 0 0 8px rgba(34,197,94,.2);
    }
    .step-item.active .step-num {
      background: rgba(245,158,11,.1); border-color: rgba(245,158,11,.25); color: var(--amber);
      box-shadow: 0 0 8px rgba(245,158,11,.18);
    }

    .step-text { font-size: 12px; color: var(--text-3); font-weight: 500; letter-spacing: .01em; }
    .step-item.done   .step-text { color: rgba(34,197,94,.8); }
    .step-item.active .step-text { color: var(--text); }

    /* ──────────── MAIN ──────────── */
    .main { display: flex; flex-direction: column; min-width: 0; }

    .breadcrumb {
      border-bottom: 1px solid var(--border);
      padding: 0 36px; height: 38px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,.4);
    }
    .bc-item { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .08em; }
    .bc-item.active { color: rgba(255,255,255,.6); }
    .bc-sep { font-family: var(--mono); font-size: 10px; color: var(--text-3); opacity: .4; }

    /* ──────────── CONTENT ──────────── */
    .content {
      flex: 1; padding: 40px 40px 60px;
      animation: fadeUp .25s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .content-header { margin-bottom: 32px; }

    .content-title {
      font-size: 26px; font-weight: 700; color: var(--text);
      letter-spacing: -.04em; margin-bottom: 6px; line-height: 1.15;
    }

    .content-sub { font-size: 13px; color: var(--text-2); line-height: 1.6; max-width: 480px; }

    /* ──────────── BENTO GRID – PANELS ──────────── */
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    .panel {
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface-1);
      overflow: hidden; position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color .2s ease, background .2s ease;
    }
    .panel::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,.025) 0%, transparent 60%);
      pointer-events: none;
    }
    .panel:hover { border-color: var(--border-2); background: var(--surface-2); }

    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    .panel-title {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.4);
    }

    .panel-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2);
      color: var(--green); letter-spacing: .12em;
    }
    .panel-badge::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 5px var(--green-glow);
      display: inline-block; flex-shrink: 0;
    }

    .panel-body { padding: 20px; }

    /* ──────────── FIELD LABELS ──────────── */
    .field-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px; margin-top: 18px;
    }
    .field-label:first-child { margin-top: 0; }

    /* ──────────── CHIPS ──────────── */
    .chip-row, .chipRow { display: flex; flex-wrap: wrap; gap: 7px; }

    .chip {
      font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 7px;
      border: 1px solid var(--border-2); background: var(--surface-1); color: var(--text-2);
      display: inline-flex; align-items: center; gap: 8px;
      transition: all .15s cubic-bezier(.16,1,.3,1); letter-spacing: -.01em;
      position: relative; overflow: hidden;
    }
    .chip::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .chip:hover {
      background: var(--surface-3); color: var(--text); border-color: var(--border-3);
      transform: translateY(-1px);
    }
    .chip.active {
      background: rgba(245,158,11,.09);
      border-color: rgba(245,158,11,.3);
      color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245,158,11,.08), inset 0 1px 0 rgba(245,158,11,.1);
    }
    .chipInner { display: inline-flex; align-items: center; gap: 8px; position: relative; z-index: 1; }

    /* ──────────── ACTIONS BAR ──────────── */
    .actions-bar {
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      padding-top: 24px; border-top: 1px solid var(--border);
    }

    /* ──────────── BUTTONS ──────────── */
    .btn-ghost {
      font-size: 13px; font-weight: 500; padding: 9px 18px;
      border-radius: 8px; border: 1px solid var(--border-2);
      background: transparent; color: var(--text-2);
      transition: all .15s ease; letter-spacing: -.01em;
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-3); }

    .btn-primary {
      font-size: 13px; font-weight: 700; padding: 9px 22px;
      border-radius: 8px; color: #000;
      background: var(--amber);
      border: none;
      transition: all .18s cubic-bezier(.16,1,.3,1);
      letter-spacing: -.01em;
      box-shadow: 0 0 0 0 var(--amber-glow);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover:not(:disabled) {
      background: #fbbf24;
      box-shadow: 0 0 24px var(--amber-glow), 0 4px 20px rgba(245,158,11,.25);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    .btn-primary:disabled { opacity: .18; cursor: not-allowed; background: var(--amber); }

    /* ──────────── SECTION CARDS (bento) ──────────── */
    .section-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }

    .section-card {
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface-1); padding: 26px;
      text-align: left; display: flex; flex-direction: column; gap: 14px;
      transition: all .2s cubic-bezier(.16,1,.3,1); cursor: pointer;
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .section-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.025) 0%, transparent 55%);
      pointer-events: none;
    }
    .section-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      opacity: 0; transition: opacity .2s ease;
    }
    .section-card:hover {
      border-color: var(--border-3);
      background: var(--surface-2);
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(0,0,0,.6), 0 0 0 1px var(--border-2);
    }
    .section-card:hover::after { opacity: 1; }

    .section-card-icon {
      width: 42px; height: 42px;
      border: 1px solid var(--border-2); border-radius: 10px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s ease; flex-shrink: 0;
    }
    .section-card-icon svg {
      width: 18px; height: 18px; stroke: rgba(255,255,255,.3); fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: stroke .2s ease;
    }
    .section-card:hover .section-card-icon {
      border-color: rgba(245,158,11,.3);
      background: rgba(245,158,11,.07);
      box-shadow: 0 0 12px rgba(245,158,11,.12);
    }
    .section-card:hover .section-card-icon svg { stroke: var(--amber); }

    .section-card-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .section-card-desc  { font-size: 12px; color: var(--text-2); line-height: 1.65; flex: 1; }

    .section-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .section-card-tag {
      font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: .1em;
      text-transform: uppercase;
    }

    .section-card-arrow {
      font-family: var(--mono); font-size: 14px; color: var(--text-3);
      transition: color .15s, transform .15s;
    }
    .section-card:hover .section-card-arrow { color: var(--amber); transform: translateX(5px); }

    /* ──────────── TOGGLE ROW ──────────── */
    .toggle-row { display: flex; gap: 6px; margin-bottom: 22px; }

    .toggleBtn {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border-2);
      background: var(--surface-1); color: var(--text-3); letter-spacing: .12em; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 8px; transition: all .15s ease;
    }
    .toggleBtn:hover { color: var(--text-2); background: var(--surface-2); border-color: var(--border-3); }
    .toggleBtn.active {
      background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.25); color: var(--amber);
      box-shadow: 0 0 12px rgba(245,158,11,.12);
    }
    .lineToggle { display: inline-flex; align-items: center; gap: 8px; }

    /* ──────────── VIEW HEADER ──────────── */
    .view-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .view-header-left { display: flex; align-items: center; gap: 14px; }

    .btn-back {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--border-2); background: var(--surface-1); color: rgba(255,255,255,.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all .15s ease; flex-shrink: 0;
    }
    .btn-back:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-3); }

    .view-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -.03em; }
    .view-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border-2); background: var(--surface-1);
      font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text-2);
      letter-spacing: .02em;
    }

    /* ──────────── MODE BAR ──────────── */
    .mode-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }

    .view-actions { display: flex; gap: 5px; }

    .view-action-btn {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      padding: 8px 16px; border-radius: 7px;
      border: 1px solid var(--border-2); background: var(--surface-1); color: var(--text-3);
      display: inline-flex; align-items: center; gap: 8px; transition: all .15s ease;
      letter-spacing: .12em; text-transform: uppercase;
    }
    .view-action-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-3); }
    .view-action-btn.active {
      background: rgba(59,130,246,.08); border-color: rgba(59,130,246,.25); color: var(--blue);
      box-shadow: 0 0 12px rgba(59,130,246,.12);
    }

    .mode-pills { display: flex; gap: 3px; }

    .mode-btn {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-3); transition: all .12s ease;
    }
    .mode-btn:hover { color: var(--text-2); }
    .mode-btn.active { background: var(--surface-2); border-color: var(--border-2); color: var(--text); }

    /* ──────────── VALUE TABLE ──────────── */
    .value-table {
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      background: var(--surface-1);
    }

    .value-table-header {
      display: grid; grid-template-columns: minmax(160px,2fr) 130px 24px 130px;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }
    .value-table-col {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--text-3);
    }
    .value-table-col.center { text-align: center; }

    .value-rows { display: flex; flex-direction: column; }

    .value-row {
      display: grid; grid-template-columns: minmax(160px,2fr) 130px 24px 130px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      align-items: center; gap: 8px; transition: background .12s ease;
    }
    .value-row:last-child { border-bottom: none; }
    .value-row:hover { background: rgba(255,255,255,.02); }

    .value-key {
      font-size: 12px; color: rgba(255,255,255,.7);
      display: flex; align-items: center; gap: 8px;
      min-width: 0; /* prevent overflow */
      padding-right: 8px;
    }

    .value-key-text {
      white-space: normal; word-break: break-word; line-height: 1.45;
    }

    .param-num {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: var(--amber); background: rgba(245,158,11,.07);
      border: 1px solid rgba(245,158,11,.2); border-radius: 4px;
      padding: 2px 6px; flex-shrink: 0; letter-spacing: .04em;
      align-self: flex-start; margin-top: 1px;
    }

    /* Huidig: muted slate zo dat het duidelijk verschilt van parameter-tekst en Nieuw */
    .value-cell {
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      color: #64748b; /* muted slate — duidelijk anders dan wit parameter-tekst */
    }
    .value-cell.is-new {
      color: var(--blue); text-shadow: 0 0 8px rgba(59,130,246,.3);
      font-weight: 600;
    }
    .value-sep  { font-family: var(--mono); font-size: 11px; color: var(--text-3); text-align: center; opacity: .4; }

    .emptyNote {
      padding: 64px 40px; text-align: center;
      color: var(--text-3); font-family: var(--mono); font-size: 11px;
      letter-spacing: .1em; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .emptyNote::before {
      content: ''; display: block; width: 40px; height: 1px; background: var(--border-2);
    }

    /* ──────────── PLAYER ──────────── */
    .player-wrap { display: grid; grid-template-columns: 1fr 280px; gap: 16px; align-items: start; }

    .player-main {
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface-1); overflow: hidden; position: relative;
      backdrop-filter: blur(10px);
    }
    .player-main::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.015) 0%, transparent 50%);
      pointer-events: none;
    }

    .player-top-bar {
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,.02);
    }

    .player-counter { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .12em; flex-shrink: 0; }

    /* Telemetry progress bar */
    .player-progress-track {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,.06); margin: 0 20px; overflow: hidden;
      position: relative;
    }
    .player-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(245,158,11,.6), var(--amber));
      border-radius: 2px;
      transition: width .35s cubic-bezier(.16,1,.3,1);
      box-shadow: 0 0 8px var(--amber-glow);
      position: relative;
    }
    .player-progress-fill::after {
      content: ''; position: absolute; right: 0; top: -2px; bottom: -2px;
      width: 4px; background: #fff; border-radius: 2px;
      box-shadow: 0 0 6px var(--amber);
      opacity: .8;
    }

    .player-body { padding: 36px; }

    .player-key {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
    }

    .player-label {
      font-size: 26px; font-weight: 700; color: var(--text);
      letter-spacing: -.04em; line-height: 1.15; margin-bottom: 34px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }

    .player-num {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      color: var(--amber); background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.22); border-radius: 5px;
      padding: 4px 10px; flex-shrink: 0;
      box-shadow: 0 0 10px rgba(245,158,11,.1);
    }

    .player-values { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
    .player-val-block { flex: 1; min-width: 120px; }

    .player-val-label {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
    }

    .player-val-box {
      border: 1px solid var(--border-2); border-radius: 8px;
      background: rgba(255,255,255,.02); padding: 16px 20px;
      font-family: var(--mono); font-size: 18px; font-weight: 600;
      color: rgba(255,255,255,.6); min-height: 58px;
      display: flex; align-items: center; gap: 10px;
      transition: all .2s ease;
    }
    .player-val-box.new-val {
      border-color: rgba(59,130,246,.25);
      background: rgba(59,130,246,.06);
      color: var(--blue);
      box-shadow: 0 0 16px rgba(59,130,246,.1), inset 0 1px 0 rgba(59,130,246,.08);
    }

    .player-arrow-sep {
      font-family: var(--mono); font-size: 16px; color: var(--text-3);
      flex-shrink: 0; margin-top: 26px; opacity: .4;
    }

    .player-controls {
      padding: 14px 24px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.015);
    }

    /* ──────────── PLAYER SIDEBAR ──────────── */
    .player-sidebar {
      border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface-1); overflow: hidden;
    }

    .player-sidebar-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }
    .player-sidebar-title {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: var(--text-3);
    }

    .mini-list {
      display: flex; flex-direction: column;
      max-height: 420px; overflow-y: auto;
    }
    .mini-list::-webkit-scrollbar { width: 2px; }
    .mini-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 1px; }

    .mini-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .mini-row:last-child { border-bottom: none; }
    .mini-row:hover { background: var(--surface-2); }
    .mini-row.active {
      background: rgba(245,158,11,.05);
      border-left: 2px solid var(--amber); padding-left: 12px;
    }

    .mini-num { font-family: var(--mono); font-size: 9px; color: var(--text-3); width: 18px; flex-shrink: 0; }
    .mini-row.active .mini-num { color: var(--amber); }

    .mini-key {
      font-size: 11px; color: rgba(255,255,255,.4); flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mini-row.active .mini-key { color: rgba(255,255,255,.85); font-weight: 600; }
    .mini-check { font-size: 9px; color: var(--green); }

    /* ──────────── RICH VALUES ──────────── */
    .richValue  { display: inline-flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .richText   { font-weight: 600; }
    .colorDots  { display: inline-flex; gap: 4px; align-items: center; }
    .colorDot   { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,.1); display: inline-block; }
    .colorDot.wit   { border-color: rgba(255,255,255,.4); }
    .colorDot.grijs { border-color: rgba(255,255,255,.2); }
    .colorDot.blauw { background: #3b82f6 !important; border-color: rgba(59,130,246,.5); box-shadow: 0 0 6px rgba(59,130,246,.4); }

    .lineBadge, .productBadge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 7px; border-radius: 3px; background: var(--surface-2); border: 1px solid var(--border-2);
      font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--text-2);
    }

    /* ──────────── LOADING ──────────── */
    .loading-screen {
      display: flex; align-items: center; justify-content: center;
      flex: 1; padding: 80px;
      flex-direction: column; gap: 14px;
    }

    .loading-bar-wrap {
      width: 180px; height: 2px; background: var(--border-2); border-radius: 1px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 40%;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      border-radius: 1px;
      animation: sweep 1.6s ease-in-out infinite;
    }
    @keyframes sweep { 0%{transform:translateX(-200%)} 100%{transform:translateX(500%)} }

    .loading-label {
      font-family: var(--mono); font-size: 9px; color: var(--text-3);
      letter-spacing: .24em; text-transform: uppercase;
    }

    /* ──────────── RESPONSIVE ──────────── */
    @media (max-width: 900px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .panel-grid, .section-grid { grid-template-columns: 1fr; }
      .player-wrap { grid-template-columns: 1fr; }
      .player-sidebar { display: none; }
      .value-table-header, .value-row { grid-template-columns: minmax(120px,2fr) 80px 20px 80px; }
      .value-cell { font-size: 11px; }
      .value-key { font-size: 11px; }
      .content { padding: 24px 20px 40px; }
      .topbar { padding: 0 20px; }
      .breadcrumb { padding: 0 20px; }
    }
  </style>
</head>
<body>
<div class="shell" id="app-shell"></div>
<script>
  const BISCUITS = [
    { id:'richtea',    label:'Rich Tea',   formats:['5x6','3x6'], color:'blauw' },
    { id:'koffiekoek', label:'Koffiekoek', formats:['4x4','5x4','5x5'], color:'bruin' },
    { id:'theekokos',  label:'Thee/Kokos', formats:['5x5'], color:'wit' }
  ];

  const FILES = {
    cavanna9:   './data/cavanna9.json',
    cavanna10:  './data/cavanna10.json',
    robertpack: './data/robertpack.json',
    dozen:      './data/dozen.json',
    dekselaar:  './data/dekselaar.json'
  };

  const state = {
    loading:true, error:'', data:null,
    stage:1,
    fromBiscuit:null, fromFormat:null,
    toBiscuit:null,   toFormat:null,
    section:null,
    cavannaLine:'9', robertpackLine:'9',
    viewMode:null, onlyChanges:true, stepIndex:0
  };

  const COLOR_MAP = {
    rood:'#ef4444', grijs:'#64748b', bruin:'#7a4a21',
    wit:'#ffffff',  blauw:'#3b82f6', zwart:'#111', groen:'#22c55e'
  };

  const LINE_COLORS = { '9':'rood', '10':'grijs' };

  const biscuitLabel      = id => BISCUITS.find(b=>b.id===id)?.label || '';
  const formatsForBiscuit = id => BISCUITS.find(b=>b.id===id)?.formats || [];
  const getBiscuitMeta    = id => BISCUITS.find(b=>b.id===id) || null;

  function buildFlowRows(fromObj, toObj){
    const keys = Array.from(new Set([...Object.keys(fromObj||{}), ...Object.keys(toObj||{})]));
    return keys.map(k => [k, fromObj?.[k]??'—', toObj?.[k]??'—']);
  }

  function escapeHtml(v){
    return String(v??'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function cleanNumberToken(token){
    let s = String(token).trim();
    if(!s) return s;
    if(!/^[-+]?\d+[\.,]?\d*$/.test(s)) return s;
    const hasComma=s.includes(','), hasDot=s.includes('.');
    const sep = hasComma?',':(hasDot?'.':'');
    let parts = sep ? s.split(sep) : [s];
    let intPart = parts[0].replace(/^0+(\d)/,'$1');
    if(intPart==='') intPart='0';
    if(parts.length===1) return intPart;
    let decPart = parts[1].replace(/0+$/,'');
    if(decPart==='') return intPart;
    return intPart+','+decPart;
  }

  function normalizeDisplayValue(value){
    return String(value??'').replace(/\u0392/g,'B')
      .split('/').map(p=>cleanNumberToken(p.trim())).join(' / ');
  }

  function normalizeCompareValue(value){
    return normalizeDisplayValue(value).toLowerCase().replace(/\s+/g,' ').trim();
  }

  const filterRows = (rows, onlyChanges) =>
    onlyChanges ? rows.filter(r=>normalizeCompareValue(r[1])!==normalizeCompareValue(r[2])) : rows;

  const isColorToken = t => Object.prototype.hasOwnProperty.call(COLOR_MAP, String(t).trim().toLowerCase());

  function renderColorDot(token){
    const name = String(token).trim().toLowerCase();
    const color = COLOR_MAP[name];
    if(!color) return '';
    return `<span class="colorDot ${name}" style="background:${color}"></span>`;
  }

  function renderRichValue(value){
    const norm  = normalizeDisplayValue(value);
    const parts = norm.split('/').map(p=>p.trim()).filter(Boolean);
    if(parts.length && parts.every(isColorToken))
      return `<span class="richValue"><span class="colorDots">${parts.map(renderColorDot).join('')}</span></span>`;
    const html = parts.map(p=>
      isColorToken(p) ? renderColorDot(p) : `<span class="richText">${escapeHtml(p)}</span>`
    );
    return `<span class="richValue">${html.join('<span class="richText">/</span>')}</span>`;
  }

  function renderParamKey(key){
    const m = String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
    if(!m) return `<span class="value-key-text">${escapeHtml(key)}</span>`;
    return `<span class="param-num">${escapeHtml(m[1])}</span><span class="value-key-text">${escapeHtml(m[2])}</span>`;
  }

  function renderPlayerLabel(key){
    const m = String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
    if(!m) return `<span>${escapeHtml(key)}</span>`;
    return `<span class="player-num">${escapeHtml(m[1])}</span><span>${escapeHtml(m[2])}</span>`;
  }

  const SECTION_ICONS = {
    cavanna: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>`,
    robertpack: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <path d="M10 6.5h4M14 4v5"/>
      <path d="M14 6.5c2 0 3 .5 4 2l1 2"/>
      <path d="M19 10.5v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-4"/>
      <rect x="7" y="16" width="10" height="5" rx="1"/>
      <path d="M10 16v-2M14 16v-2"/>
    </svg>`,
    dozen: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
      <path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>
    </svg>`,
    dekselaar: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="12" width="18" height="9" rx="1"/>
      <path d="M3 12l2.5-6h13L21 12"/>
      <path d="M2 12h20"/>
      <path d="M9 12V9M15 12V9"/>
    </svg>`
  };

  const SECTION_DESCS = {
    cavanna:    'Instellingen voor Cavanna 9 en 10',
    robertpack: 'Instellingen voor RobertPack 9 en 10',
    dozen:      'Instellingen voor Dozen Opzetter',
    dekselaar:  'Instellingen voor Dekselaar Opzetter'
  };

  async function loadData(){
    try{
      const entries = await Promise.all(
        Object.entries(FILES).map(async([key,path])=>{
          const res = await fetch(path,{cache:'no-store'});
          if(!res.ok) throw new Error('Failed: '+path);
          return [key, await res.json()];
        })
      );
      state.data = Object.fromEntries(entries);
    } catch(err){
      state.error = err.message||'Failed to load data.';
    } finally{
      state.loading = false;
      render();
    }
  }

  function setState(patch){ Object.assign(state,patch); render(); }

  function resetAll(){
    Object.assign(state,{
      stage:1, fromBiscuit:null, fromFormat:null,
      toBiscuit:null, toFormat:null, section:null,
      cavannaLine:'9', robertpackLine:'9',
      viewMode:null, onlyChanges:true, stepIndex:0
    });
    render();
  }

  function getRobertPackValuesForFormat(format,col){
    return (state.data?.robertpack?.values?.[format]||{})?.[col]||{};
  }

  function getRows(){
    if(!state.data) return [];
    if(state.section==='cavanna'){
      const src = state.cavannaLine==='10' ? state.data.cavanna10 : state.data.cavanna9;
      return buildFlowRows(src?.values?.[state.fromFormat]||{}, src?.values?.[state.toFormat]||{});
    }
    if(state.section==='robertpack')
      return buildFlowRows(
        getRobertPackValuesForFormat(state.fromFormat, state.robertpackLine),
        getRobertPackValuesForFormat(state.toFormat,   state.robertpackLine)
      );
    if(state.section==='dozen')
      return buildFlowRows(state.data.dozen?.values?.[state.fromFormat]||{}, state.data.dozen?.values?.[state.toFormat]||{});
    if(state.section==='dekselaar')
      return buildFlowRows(state.data.dekselaar?.values?.[state.fromFormat]||{}, state.data.dekselaar?.values?.[state.toFormat]||{});
    return [];
  }

  function renderChipGroup(items, value, onClick, formatter=x=>x){
    return `<div class="chipRow">${items.map(item=>`
      <button class="chip${value===item?' active':''}" data-action="${onClick}" data-value="${item}">
        <span class="chipInner">${formatter(item)}</span>
      </button>`).join('')}</div>`;
  }

  function renderValueList(rows){
    if(!rows.length) return `<div class="emptyNote">Geen data gevonden</div>`;
    return `
      <div class="value-table">
        <div class="value-table-header">
          <span class="value-table-col">Parameter</span>
          <span class="value-table-col">Huidig</span>
          <span class="value-table-col center"></span>
          <span class="value-table-col">Nieuw</span>
        </div>
        <div class="value-rows">
          ${rows.map(r=>`
            <div class="value-row">
              <span class="value-key">${renderParamKey(r[0])}</span>
              <span class="value-cell">${renderRichValue(r[1])}</span>
              <span class="value-sep">→</span>
              <span class="value-cell is-new">${renderRichValue(r[2])}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }

  function renderStepPlayer(rows){
    const total = rows.length;
    const cur   = rows[state.stepIndex];
    if(!total||!cur) return `<div class="emptyNote">Geen data gevonden</div>`;
    const pct    = ((state.stepIndex+1)/total*100).toFixed(1);
    const isLast = state.stepIndex >= total-1;

    const miniRows = rows.map((r,i)=>`
      <div class="mini-row${i===state.stepIndex?' active':''}" data-action="jump-step" data-value="${i}">
        <span class="mini-num">${String(i+1).padStart(2,'0')}</span>
        <span class="mini-key">${escapeHtml(r[0])}</span>
        ${i<state.stepIndex?'<span class="mini-check">✓</span>':''}
      </div>`).join('');

    return `
      <div class="player-wrap">
        <div class="player-main">
          <div class="player-top-bar">
            <span class="player-counter">${state.stepIndex+1} / ${total}</span>
            <div class="player-progress-track">
              <div class="player-progress-fill" style="width:${pct}%"></div>
            </div>
            <span class="player-counter">${pct}%</span>
          </div>
          <div class="player-body">
            <div class="player-key">PARAMETER</div>
            <div class="player-label">${renderPlayerLabel(cur[0])}</div>
            <div class="player-values">
              <div class="player-val-block">
                <div class="player-val-label">Huidig</div>
                <div class="player-val-box">${renderRichValue(cur[1])}</div>
              </div>
              <div class="player-arrow-sep">→</div>
              <div class="player-val-block">
                <div class="player-val-label">Nieuw</div>
                <div class="player-val-box new-val">${renderRichValue(cur[2])}</div>
              </div>
            </div>
          </div>
          <div class="player-controls">
            <button class="btn-ghost" data-action="prev-step" ${state.stepIndex===0?'disabled':''}>← Vorige</button>
            <button class="btn-primary" data-action="next-step">${isLast ? 'Afronden ✓' : 'Volgende →'}</button>
          </div>
        </div>
        <div class="player-sidebar">
          <div class="player-sidebar-header">
            <div class="player-sidebar-title">Stappen overzicht</div>
          </div>
          <div class="mini-list">${miniRows}</div>
        </div>
      </div>`;
  }

  function renderSidebar(){
    const canContinue = state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat;
    const fromLabel   = state.fromBiscuit ? biscuitLabel(state.fromBiscuit) : '—';
    const toLabel     = state.toBiscuit   ? biscuitLabel(state.toBiscuit)   : '—';
    const fromFmt     = state.fromFormat  || '—';
    const toFmt       = state.toFormat    || '—';

    const sectionLabel = !state.section ? null :
      state.section==='cavanna'    ? `Cavanna · L${state.cavannaLine}` :
      state.section==='robertpack' ? `Robert Pack · L${state.robertpackLine}` :
      state.section==='dozen'      ? 'Dozen Opzetter' : 'Dekselaar Opzetter';

    const steps = [
      { label:'Product & Formaat', done: canContinue,                         active: state.stage===1 },
      { label:'Sectie & Ombouw',   done: state.stage===2 && !!state.section,  active: state.stage===2 }
    ];

    return `
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Ombouw sessie</div>
          <div class="flow-card">
            <div class="flow-card-row">
              <div class="flow-block">
                <div class="flow-block-label">Van</div>
                <div class="flow-block-value ${state.fromBiscuit?'':'dim'}">${fromLabel}${state.fromFormat?` · ${fromFmt}`:''}</div>
              </div>
              <div class="flow-arrow-col">→</div>
              <div class="flow-block">
                <div class="flow-block-label">Naar</div>
                <div class="flow-block-value ${state.toBiscuit?'amber':'dim'}">${toLabel}${state.toFormat?` · ${toFmt}`:''}</div>
              </div>
            </div>
          </div>
          ${sectionLabel?`<div class="section-tag"><div class="tag-dot"></div>${escapeHtml(sectionLabel)}</div>`:''}
        </div>
        <div class="sidebar-sep"></div>
        <div class="step-list">
          <div class="sidebar-label" style="padding:0 2px;margin-bottom:12px">Workflow</div>
          ${steps.map((s,i)=>`
            <div class="step-item${s.done?' done':''}${s.active&&!s.done?' active':''}">
              <div class="step-num">${s.done?'✓':i+1}</div>
              <div class="step-text">${s.label}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  const getSectionTitle = s =>
    s==='cavanna'?'Cavanna':s==='robertpack'?'Robert Pack':s==='dozen'?'Dozen Opzetter':'Dekselaar Opzetter';

  function render(){
    const shell       = document.getElementById('app-shell');
    const canContinue = state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat;
    const rows        = getRows();
    const visibleRows = filterRows(rows, state.onlyChanges);

    const bc = state.stage===1
      ? `<span class="bc-item active">Configuratie</span>`
      : state.stage===2&&!state.section
        ? `<span class="bc-item">Configuratie</span><span class="bc-sep"> › </span><span class="bc-item active">Sectie kiezen</span>`
        : `<span class="bc-item">Configuratie</span><span class="bc-sep"> › </span><span class="bc-item">Sectie kiezen</span><span class="bc-sep"> › </span><span class="bc-item active">${getSectionTitle(state.section)}</span>`;

    let mainContent = '';

    if(state.loading){
      mainContent = `<div class="loading-screen">
        <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
        <div class="loading-label">Systeem initialiseren</div>
      </div>`;
    }
    else if(state.error){
      mainContent = `<div class="content"><div class="emptyNote">${escapeHtml(state.error)}</div></div>`;
    }
    else if(state.stage===1){
      mainContent = `
        <div class="content">
          <div class="content-header">
            <div class="content-title">Configureer ombouw</div>
            <div class="content-sub">Selecteer van welk product je komt en naar welk product je gaat.</div>
          </div>
          <div class="panel-grid">
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title">Van</span>
                ${state.fromBiscuit&&state.fromFormat?'<span class="panel-badge">GEREED</span>':''}
              </div>
              <div class="panel-body">
                <div class="field-label">Product</div>
                ${renderChipGroup(BISCUITS.map(b=>b.id), state.fromBiscuit, 'from-product',
                  id=>`${renderColorDot(getBiscuitMeta(id)?.color)}<span>${escapeHtml(biscuitLabel(id))}</span>`)}
                ${state.fromBiscuit?`<div class="field-label">Formaat</div>
                  ${renderChipGroup(formatsForBiscuit(state.fromBiscuit), state.fromFormat, 'from-format')}`:''}
              </div>
            </div>
            <div class="panel">
              <div class="panel-header">
                <span class="panel-title">Naar</span>
                ${state.toBiscuit&&state.toFormat?'<span class="panel-badge">GEREED</span>':''}
              </div>
              <div class="panel-body">
                <div class="field-label">Product</div>
                ${renderChipGroup(BISCUITS.map(b=>b.id), state.toBiscuit, 'to-product',
                  id=>`${renderColorDot(getBiscuitMeta(id)?.color)}<span>${escapeHtml(biscuitLabel(id))}</span>`)}
                ${state.toBiscuit?`<div class="field-label">Formaat</div>
                  ${renderChipGroup(formatsForBiscuit(state.toBiscuit), state.toFormat, 'to-format')}`:''}
              </div>
            </div>
          </div>
          <div class="actions-bar">
            <button class="btn-ghost" data-action="reset-all">Reset</button>
            <button class="btn-primary" data-action="go-sections" ${canContinue?'':'disabled'}>Volgende stap →</button>
          </div>
        </div>`;
    }
    else if(state.stage===2&&!state.section){
      const cards = ['cavanna','robertpack','dozen','dekselaar'].map(id=>`
        <button class="section-card" data-action="open-section" data-value="${id}">
          <div class="section-card-icon">${SECTION_ICONS[id]}</div>
          <div class="section-card-title">${getSectionTitle(id)}</div>
          <div class="section-card-desc">${SECTION_DESCS[id]}</div>
          <div class="section-card-footer">
            <span class="section-card-tag">Module</span>
            <span class="section-card-arrow">→</span>
          </div>
        </button>`).join('');

      mainContent = `
        <div class="content">
          <div class="view-header">
            <div class="view-header-left">
              <button class="btn-back" data-action="back-setup">‹</button>
              <div class="view-title">Kies sectie</div>
            </div>
          </div>
          <div class="section-grid">${cards}</div>
        </div>`;
    }
    else if(state.stage===2&&state.section){
      mainContent = `
        <div class="content">
          <div class="view-header">
            <div class="view-header-left">
              <button class="btn-back" data-action="close-section">‹</button>
              <div class="view-title">${getSectionTitle(state.section)}</div>
            </div>
            <div class="view-header-right">
              <div class="pill">${renderColorDot(getBiscuitMeta(state.fromBiscuit)?.color)} ${escapeHtml(biscuitLabel(state.fromBiscuit))} ${escapeHtml(state.fromFormat||'')}</div>
              <span style="color:var(--text-3);font-family:var(--mono);font-size:11px">→</span>
              <div class="pill">${renderColorDot(getBiscuitMeta(state.toBiscuit)?.color)} ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat||'')}</div>
            </div>
          </div>

          <div class="toggle-row">
            ${state.section==='cavanna'?`
              <button class="toggleBtn lineToggle ${state.cavannaLine==='9'?'active':''}" data-action="cav-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
              <button class="toggleBtn lineToggle ${state.cavannaLine==='10'?'active':''}" data-action="cav-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>
            `:''}
            ${state.section==='robertpack'?`
              <button class="toggleBtn lineToggle ${state.robertpackLine==='9'?'active':''}" data-action="rp-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
              <button class="toggleBtn lineToggle ${state.robertpackLine==='10'?'active':''}" data-action="rp-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>
            `:''}
          </div>

          <div class="mode-bar">
            <div class="view-actions">
              <button class="view-action-btn${state.viewMode==='start'?' active':''}" data-action="view-mode" data-value="start">▶ Stap voor stap</button>
              <button class="view-action-btn${state.viewMode==='list'?' active':''}" data-action="view-mode" data-value="list">☰ Lijst</button>
            </div>
            ${state.viewMode?`
              <div class="mode-pills">
                <button class="mode-btn${!state.onlyChanges?' active':''}" data-action="show-mode" data-value="all">Alles</button>
                <button class="mode-btn${state.onlyChanges?' active':''}" data-action="show-mode" data-value="changes">Wijzigingen</button>
              </div>`:''
            }
          </div>

          ${state.viewMode==='start' ? renderStepPlayer(visibleRows) : ''}
          ${state.viewMode==='list'  ? renderValueList(visibleRows) : ''}
          ${!state.viewMode ? `<div class="emptyNote">Kies hierboven hoe je de informatie wilt weergeven.</div>` : ''}
        </div>`;
    }

    shell.innerHTML = `
      <div class="topbar">
        <div class="topbar-brand">
          <div class="topbar-logo">
            <img src="./pally-logo.png" alt="Pally" onerror="this.style.display='none'">
          </div>
          <span class="topbar-name">Pally Biscuits</span>
          <div class="topbar-sep"></div>
          <span class="topbar-module">Ombouwen</span>
        </div>
        <div class="topbar-right">
mr-tanq.github.io          <div class="status-pill">
            <div class="status-dot"></div>
            <span class="status-label">Online</span>
          </div>
        </div>
      </div>
      <div class="body">
        ${renderSidebar()}
        <div class="main">
          <div class="breadcrumb">${bc}</div>
          ${mainContent}
        </div>
      </div>`;

    bindActions();
  }

  function bindActions(){
    document.querySelectorAll('[data-action]').forEach(el=>{
      el.addEventListener('click',()=>{
        const action = el.dataset.action;
        const value  = el.dataset.value;

        if(action==='from-product') setState({fromBiscuit:value, fromFormat:null});
        if(action==='to-product')   setState({toBiscuit:value,   toFormat:null});
        if(action==='from-format')  setState({fromFormat:value});
        if(action==='to-format')    setState({toFormat:value});
        if(action==='reset-all')    resetAll();
        if(action==='go-sections' && state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat) setState({stage:2});
        if(action==='back-setup')   setState({stage:1});
        if(action==='open-section') setState({section:value, viewMode:null, stepIndex:0});
        if(action==='close-section') setState({section:null, viewMode:null, stepIndex:0});
        if(action==='cav-line')     setState({cavannaLine:value, stepIndex:0});
        if(action==='rp-line')      setState({robertpackLine:value, stepIndex:0});
        if(action==='show-mode')    setState({onlyChanges:value==='changes', stepIndex:0});
        if(action==='jump-step')    setState({stepIndex:parseInt(value)});
        if(action==='prev-step' && state.stepIndex>0) setState({stepIndex:state.stepIndex-1});

        if(action==='view-mode')
          setState({viewMode: state.viewMode===value ? null : value, stepIndex:0});

        if(action==='next-step'){
          const vr = filterRows(getRows(), state.onlyChanges);
          if(state.stepIndex < vr.length-1) setState({stepIndex:state.stepIndex+1});
          else setState({viewMode:null, stepIndex:0});
        }
      });
    });
  }

  render();
  loadData();
</script>
</body>
</html>
