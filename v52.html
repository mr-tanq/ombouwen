/* ═══════════════════════════════════════════════════════════
   RENDER: CHECK SUMMARY
═══════════════════════════════════════════════════════════ */
function renderCheckSummary(rows){
  const matches   = rows.filter(([k])=>chk.results[k]?.status==='match');
  const saved     = rows.filter(([k])=>chk.results[k]?.status==='saved');
  const mismatches= rows.filter(([k])=>chk.results[k]?.status==='mismatch');
  const skipped   = rows.filter(([k])=>chk.results[k]?.status==='skipped');
  const pending   = rows.filter(([k])=>!chk.results[k]?.status||chk.results[k]?.status==='pending');

  const tableRows=rows.filter(([k])=>chk.results[k]?.status&&chk.results[k]?.status!=='pending').map(([key,,expRaw])=>{
    const r=chk.results[key]; const s=r?.status||'pending';
    const expDisp=normalizeDisplayValue(String(getExpectedValue(key,expRaw)));
    const isColor=expDisp.split('/').map(p=>p.trim()).filter(Boolean).every(isColorToken);
    const toDisp=isColor?renderRichValue(expDisp):escapeHtml(normalizeDisplayValue(String(r?.actual||'—')));
    const rowCls=s==='match'?'row-match':s==='saved'?'row-saved':s==='mismatch'?'row-mismatch':'row-skipped';
    const icon=s==='match'?'✓':s==='saved'?'↑':s==='mismatch'?'✕':'—';
    return `<div class="summary-row ${rowCls}">
      <span class="summary-key">${renderParamKey(key)}</span>
      <span class="summary-from">${renderRichValue(expDisp)}</span>
      <span class="summary-sep">→</span>
      <span class="summary-to ${s}">${toDisp}</span>
      <span class="badge ${s==='match'?'badge-green':s==='saved'?'badge-cyan':s==='mismatch'?'badge-red':'badge-slate'}">${icon}</span>
    </div>`;
  }).join('');

  /* Find first mismatch for "Review" button */
  const firstMismatch=rows.findIndex(([k])=>chk.results[k]?.status==='mismatch');

  return `<div class="summary-screen">
    <div class="summary-hero">Check afgerond</div>
    <div class="summary-sub">${getSectionTitle(state.section)} · ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat||'')}</div>
    <div class="summary-stats">
      <span class="badge badge-green"><span class="badge-dot"></span>${matches.length} Match</span>
      <span class="badge badge-red"><span class="badge-dot"></span>${mismatches.length} Afwijking</span>
      <span class="badge badge-cyan"><span class="badge-dot"></span>${saved.length} Opgeslagen</span>
      ${skipped.length?`<span class="badge badge-slate"><span class="badge-dot"></span>${skipped.length} Overgeslagen</span>`:''}
      ${pending.length?`<span class="badge badge-slate"><span class="badge-dot"></span>${pending.length} Niet gecheckt</span>`:''}
    </div>
    ${tableRows?`<div class="summary-table">${tableRows}</div>`:`<div class="empty-state" style="margin-bottom:24px">Geen parameters gecheckt</div>`}
    <div class="summary-actions">
      ${saved.length?`<button class="btn btn-success" data-action="chk-commit">✓ Opslaan &amp; sluiten</button>`:''}
      ${firstMismatch>=0?`<button class="btn btn-danger" data-action="chk-goto-mismatch" data-value="${firstMismatch}">↩ Afwijkingen bekijken</button>`:''}
      <button class="btn btn-ghost" data-action="close-check">Sluiten</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   RENDER: HISTORY VERSIONS
═══════════════════════════════════════════════════════════ */
function renderHistory(){
  const store=getStore(); const sk=buildStoreKey();
  const versions=store.versions[sk]||[];
  if(!versions.length) return `<div class="empty-state">Geen versies — nog geen waarden opgeslagen</div>`;

  return `<div class="version-list">${versions.map((v,vi)=>`
    <div class="version-card">
      <div class="version-card-header" data-action="toggle-version" data-value="${vi}">
        <span class="badge ${vi===0?'badge-green':'badge-amber'}">v${v.v}</span>
        <span class="version-meta">${escapeHtml(v.toBiscuit)} ${escapeHtml(v.toFormat)} · ${getSectionTitle(state.section)}${v.line?' · Lijn '+v.line:''}</span>
        <span class="version-count">${v.changes.length} wijziging${v.changes.length!==1?'en':''}</span>
        <span class="version-date">${v.ts}</span>
      </div>
      <div class="version-body${vi===0?' open':''}" id="vbody-${vi}">
        <div class="version-param-list">
          ${v.changes.map(c=>`
            <div class="version-param-row">
              <span class="version-param-name">${renderParamKey(c.param)}</span>
              <span class="version-param-val">${escapeHtml(c.old)}</span>
              <span class="version-param-sep">→</span>
              <span class="version-param-val new">${escapeHtml(c.new_)}</span>
            </div>
            ${c.note?`<div style="padding:0 10px 6px 10px"><span style="font-family:var(--mono);font-size:10px;color:var(--text-3);font-style:italic">"${escapeHtml(c.note)}"</span></div>`:''}`).join('')}
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   RENDER: AUDIT LOG
═══════════════════════════════════════════════════════════ */
function renderAudit(){
  const store=getStore();
  const logs=store.auditLog.filter(e=>
    e.section===getSectionTitle(state.section)&&
    e.toBiscuit===biscuitLabel(state.toBiscuit)&&
    e.toFormat===state.toFormat
  );
  if(!logs.length) return `<div class="empty-state">Geen wijzigingen gelogd voor deze combinatie</div>`;

  const iconMap={match:'✓',mismatch:'✕',saved:'↑',skipped:'—'};
  return `<div class="audit-list">${logs.map(e=>`
    <div class="audit-entry">
      <div class="audit-icon ${e.action}">${iconMap[e.action]||'·'}</div>
      <div>
        <div class="audit-title">${escapeHtml(e.param)}</div>
        <div class="audit-meta">${escapeHtml(e.section)}${e.line?' · Lijn '+e.line:''} · ${escapeHtml(e.toBiscuit)} ${escapeHtml(e.toFormat)}</div>
        <div class="audit-change">
          <span class="audit-old">${escapeHtml(e.old)}</span>
          <span class="audit-arr">→</span>
          <span class="audit-new">${escapeHtml(e.new_)}</span>
        </div>
        ${e.note?`<div class="audit-note">"${escapeHtml(e.note)}"</div>`:''}
      </div>
      <div class="audit-ts">${escapeHtml(e.ts)}</div>
    </div>`).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   RENDER: SIDEBAR
═══════════════════════════════════════════════════════════ */
function renderSidebar(){
  const canContinue=state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat;
  const fromLabel=state.fromBiscuit?biscuitLabel(state.fromBiscuit):'—';
  const toLabel  =state.toBiscuit  ?biscuitLabel(state.toBiscuit)  :'—';
  const fromFmt  =state.fromFormat ||'—';
  const toFmt    =state.toFormat   ||'—';
  const sectionLabel=!state.section?null:
    state.section==='cavanna'    ?`Cavanna · L${state.cavannaLine}`:
    state.section==='robertpack' ?`Robert Pack · L${state.robertpackLine}`:
    state.section==='dozen'      ?'Dozen Opzetter':'Dekselaar Opzetter';

  const steps=[
    { label:'Product & Formaat', done:canContinue,                        active:state.stage===1 },
    { label:'Sectie & Ombouw',   done:state.stage===2&&!!state.section,   active:state.stage===2&&!chk.active },
    { label:'Check & Verify',    done:false, active:chk.active, checkActive:chk.active }
  ];

  return `<div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Ombouw sessie</div>
      <div class="flow-card">
        <div class="flow-card-row">
          <div class="flow-block">
            <div class="flow-block-label">Van</div>
            <div class="flow-block-value ${state.fromBiscuit?'':'dim'}">${fromLabel}${state.fromFormat?' · '+fromFmt:''}</div>
          </div>
          <div class="flow-arrow-col">→</div>
          <div class="flow-block">
            <div class="flow-block-label">Naar</div>
            <div class="flow-block-value ${state.toBiscuit?'amber':'dim'}">${toLabel}${state.toFormat?' · '+toFmt:''}</div>
          </div>
        </div>
      </div>
      ${sectionLabel?`<div class="section-tag"><div class="tag-dot"></div>${escapeHtml(sectionLabel)}</div>`:''}
    </div>
    <div class="sidebar-sep"></div>
    <div class="step-list">
      <div class="sidebar-label" style="padding:0 2px;margin-bottom:10px">Workflow</div>
      ${steps.map((s,i)=>`
        <div class="step-item${s.done?' done':''}${s.active&&!s.done?' active':''}${s.checkActive?' check-active':''}">
          <div class="step-num">${s.done?'✓':i+1}</div>
          <div class="step-text">${s.label}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════════════════ */
function setState(patch){ Object.assign(state,patch); render(); }

function resetAll(){
  Object.assign(state,{ stage:1, fromBiscuit:null, fromFormat:null, toBiscuit:null, toFormat:null, section:null, cavannaLine:'9', robertpackLine:'9', viewMode:null, onlyChanges:true, stepIndex:0 });
  Object.assign(chk,{ active:false, stepIndex:0, results:{}, showSummary:false, tab:'check', noteVisible:false });
  render();
}

function render(){
  const shell=document.getElementById('app-shell');
  const canContinue=state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat;
  const rows=getRows();
  const visibleRows=filterRows(rows, state.onlyChanges);

  /* Breadcrumb */
  let bcParts=[`<span class="bc-item${state.stage===1&&!chk.active?' active':''}">Configuratie</span>`];
  if(state.stage>=2) bcParts.push(`<span class="bc-sep"> › </span><span class="bc-item${state.stage===2&&!chk.active&&!state.section?' active':''}">Sectie kiezen</span>`);
  if(state.stage===2&&state.section) bcParts.push(`<span class="bc-sep"> › </span><span class="bc-item${!chk.active?' active':''}">${getSectionTitle(state.section)}</span>`);
  if(chk.active) bcParts.push(`<span class="bc-sep"> › </span><span class="bc-item active" style="color:var(--cyan)">Check Mode</span>`);

  let mainContent='';

  /* LOADING */
  if(state.loading){
    mainContent=`<div class="loading-screen"><div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div><div class="loading-label">Systeem initialiseren…</div></div>`;
  }
  /* ERROR */
  else if(state.error){
    mainContent=`<div class="content"><div class="empty-state">${escapeHtml(state.error)}</div></div>`;
  }
  /* CHECK MODE */
  else if(chk.active&&state.stage===2&&state.section){
    const tabContent=chk.tab==='check'?renderCheckMode(rows):chk.tab==='history'?renderHistory():renderAudit();
    mainContent=`<div class="content">
      <div class="view-header">
        <div class="view-header-left">
          <button class="btn-icon" data-action="close-check">‹</button>
          <div class="view-title">Check Mode <span style="font-family:var(--mono);font-size:12px;color:var(--text-3);font-weight:400;margin-left:4px">— ${getSectionTitle(state.section)}</span></div>
        </div>
        <div class="view-header-right">
          <div class="pill">${renderColorDot((getBiscuitMeta(state.toBiscuit)||{}).color)} ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat||'')}</div>
          ${state.section==='cavanna'    ?`<div class="pill">Lijn ${state.cavannaLine}</div>`:''}
          ${state.section==='robertpack' ?`<div class="pill">Lijn ${state.robertpackLine}</div>`:''}
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn${chk.tab==='check'?' active':''}" data-action="chk-tab" data-value="check">⊙ Check</button>
        <button class="tab-btn${chk.tab==='history'?' active':''}" data-action="chk-tab" data-value="history">◷ Versies</button>
        <button class="tab-btn${chk.tab==='audit'?' active':''}" data-action="chk-tab" data-value="audit">≡ Logboek</button>
      </div>
      ${tabContent}
    </div>`;
  }
  /* STAGE 1: product setup */
  else if(state.stage===1){
    mainContent=`<div class="content">
      <div class="content-title">Ombouw configureren</div>
      <div class="content-sub">Selecteer het bronproduct en het doelproduct voor deze ombouw.</div>
      <div class="panel-grid">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Van</span>
            ${state.fromBiscuit&&state.fromFormat?`<span class="badge badge-green" style="margin-left:auto"><span class="badge-dot"></span>Gereed</span>`:''}
          </div>
          <div class="panel-body">
            <div class="field-label">Product</div>
            <div class="chip-row">${BISCUITS.map(b=>`
              <button class="chip${state.fromBiscuit===b.id?' active':''}" data-action="from-product" data-value="${b.id}">
                ${renderColorDot(b.color)}<span>${escapeHtml(b.label)}</span>
              </button>`).join('')}</div>
            ${state.fromBiscuit?`<div class="field-label">Formaat</div>
              <div class="chip-row">${formatsForBiscuit(state.fromBiscuit).map(f=>`
                <button class="chip${state.fromFormat===f?' active':''}" data-action="from-format" data-value="${f}">${f}</button>`).join('')}</div>`:''}
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Naar</span>
            ${state.toBiscuit&&state.toFormat?`<span class="badge badge-green" style="margin-left:auto"><span class="badge-dot"></span>Gereed</span>`:''}
          </div>
          <div class="panel-body">
            <div class="field-label">Product</div>
            <div class="chip-row">${BISCUITS.map(b=>`
              <button class="chip${state.toBiscuit===b.id?' active':''}" data-action="to-product" data-value="${b.id}">
                ${renderColorDot(b.color)}<span>${escapeHtml(b.label)}</span>
              </button>`).join('')}</div>
            ${state.toBiscuit?`<div class="field-label">Formaat</div>
              <div class="chip-row">${formatsForBiscuit(state.toBiscuit).map(f=>`
                <button class="chip${state.toFormat===f?' active':''}" data-action="to-format" data-value="${f}">${f}</button>`).join('')}</div>`:''}
          </div>
        </div>
      </div>
      <div class="actions-bar">
        <button class="btn btn-ghost" data-action="reset-all">Reset</button>
        <button class="btn btn-primary" data-action="go-sections" ${canContinue?'':'disabled'}>Volgende stap →</button>
      </div>
    </div>`;
  }
  /* STAGE 2: section picker */
  else if(state.stage===2&&!state.section){
    const cards=Object.entries(SECTIONS).map(([id,sec])=>`
      <button class="section-card" data-action="open-section" data-value="${id}">
        <div class="section-card-logo-wrap">
          <img class="section-card-logo" src="${escapeHtml(sec.logo)}" alt="${escapeHtml(sec.title)}" onerror="this.style.display='none'">
        </div>
        <div class="section-card-title">${escapeHtml(sec.title)}</div>
        <div class="section-card-desc">${escapeHtml(sec.desc)}</div>
        <div class="section-card-footer">
          <span class="section-card-tag">Module</span>
          <span class="section-card-arrow">→</span>
        </div>
      </button>`).join('');

    mainContent=`<div class="content">
      <div class="view-header">
        <div class="view-header-left">
          <button class="btn-icon" data-action="back-setup">‹</button>
          <div class="view-title">Kies sectie</div>
        </div>
      </div>
      <div class="section-grid">${cards}</div>
    </div>`;
  }
  /* STAGE 2: section detail */
  else if(state.stage===2&&state.section){
    const sec=SECTIONS[state.section];
    mainContent=`<div class="content">
      <div class="view-header">
        <div class="view-header-left">
          <button class="btn-icon" data-action="close-section">‹</button>
          <img src="${escapeHtml(sec.logo)}" alt="${escapeHtml(sec.title)}" style="height:28px;width:auto;object-fit:contain;opacity:.9;filter:brightness(1.1)" onerror="this.style.display='none'">
          <div class="view-title">${escapeHtml(sec.title)}</div>
        </div>
        <div class="view-header-right">
          <div class="pill">${renderColorDot((getBiscuitMeta(state.fromBiscuit)||{}).color)} ${escapeHtml(biscuitLabel(state.fromBiscuit))} ${escapeHtml(state.fromFormat||'')}</div>
          <span style="color:var(--text-3);font-family:var(--mono);font-size:11px">→</span>
          <div class="pill">${renderColorDot((getBiscuitMeta(state.toBiscuit)||{}).color)} ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat||'')}</div>
          <button class="btn btn-ghost" data-action="open-check" style="margin-left:6px;border-color:rgba(6,182,212,.25);color:var(--cyan)">⊙ Check &amp; Verify</button>
        </div>
      </div>

      ${sec.hasLines?`<div class="toggle-row">
        ${state.section==='cavanna'?`
          <button class="toggle-btn${state.cavannaLine==='9'?' active':''}" data-action="cav-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
          <button class="toggle-btn${state.cavannaLine==='10'?' active':''}" data-action="cav-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>`:''}
        ${state.section==='robertpack'?`
          <button class="toggle-btn${state.robertpackLine==='9'?' active':''}" data-action="rp-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
          <button class="toggle-btn${state.robertpackLine==='10'?' active':''}" data-action="rp-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>`:''}
      </div>`:''}

      <div class="mode-bar">
        <div class="view-tabs">
          <button class="view-tab-btn${state.viewMode==='start'?' active':''}" data-action="view-mode" data-value="start">▶ Stap voor stap</button>
          <button class="view-tab-btn${state.viewMode==='list'?' active':''}" data-action="view-mode" data-value="list">☰ Lijst</button>
        </div>
        ${state.viewMode?`<div class="filter-pills">
          <button class="filter-btn${!state.onlyChanges?' active':''}" data-action="show-mode" data-value="all">Alles</button>
          <button class="filter-btn${state.onlyChanges?' active':''}" data-action="show-mode" data-value="changes">Wijzigingen</button>
        </div>`:''}
      </div>

      ${state.viewMode==='start'?renderStepPlayer(visibleRows):''}
      ${state.viewMode==='list' ?renderValueList(visibleRows):''}
      ${!state.viewMode?`<div class="empty-state">Kies hierboven hoe je de informatie wilt weergeven.</div>`:''}
    </div>`;
  }

  shell.innerHTML=`
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo"><img src="./pally-logo.png" alt="Pally" onerror="this.style.display='none'"></div>
        <span class="topbar-name">Pally Biscuits</span>
        <div class="topbar-sep"></div>
        <span class="topbar-module">${chk.active?'Check Mode':'Ombouwen'}</span>
      </div>
      <div class="topbar-right">
        <div class="sys-readout">SYS v4.0</div>
        <div class="status-pill"><div class="status-dot"></div><span class="status-label">Online</span></div>
      </div>
    </div>
    <div class="body">
      ${renderSidebar()}
      <div class="main">
        <div class="breadcrumb">${bcParts.join('')}</div>
        ${mainContent}
      </div>
    </div>`;

  bindActions();
}

/* ═══════════════════════════════════════════════════════════
   BIND ACTIONS
═══════════════════════════════════════════════════════════ */
function saveInputToState(){
  const inp=document.getElementById('chk-input');
  const rows=getRows(); const cur=rows[chk.stepIndex];
  if(!cur||!inp) return;
  const key=cur[0]; const expRaw=cur[2];
  const val=inp.value;
  const exp=getExpectedValue(key,expRaw);
  const status=val.trim()
    ?(normalizeCompareValue(String(exp))===normalizeCompareValue(val)?'match':'mismatch')
    :(chk.results[key]?.status||'pending');
  chk.results[key]={ ...(chk.results[key]||{}), actual:val, status };
}

function getNoteValue(){ const n=document.getElementById('chk-note'); return n?n.value.trim():''; }

function bindActions(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') return;
    el.addEventListener('click',()=>{
      const a=el.dataset.action; const v=el.dataset.value;

      /* Setup */
      if(a==='from-product')  setState({fromBiscuit:v,fromFormat:null});
      if(a==='to-product')    setState({toBiscuit:v,toFormat:null});
      if(a==='from-format')   setState({fromFormat:v});
      if(a==='to-format')     setState({toFormat:v});
      if(a==='reset-all')     resetAll();
      if(a==='go-sections'&&canContinue()) setState({stage:2});
      if(a==='back-setup')    setState({stage:1});
      if(a==='open-section')  setState({section:v,viewMode:null,stepIndex:0});
      if(a==='close-section') setState({section:null,viewMode:null,stepIndex:0});
      if(a==='cav-line')      setState({cavannaLine:v,stepIndex:0});
      if(a==='rp-line')       setState({robertpackLine:v,stepIndex:0});
      if(a==='show-mode')     setState({onlyChanges:v==='changes',stepIndex:0});
      if(a==='jump-step')     setState({stepIndex:parseInt(v)});
      if(a==='prev-step'&&state.stepIndex>0) setState({stepIndex:state.stepIndex-1});
      if(a==='view-mode')     setState({viewMode:state.viewMode===v?null:v,stepIndex:0});
      if(a==='next-step'){
        const vr=filterRows(getRows(),state.onlyChanges);
        if(state.stepIndex<vr.length-1) setState({stepIndex:state.stepIndex+1});
        else setState({viewMode:null,stepIndex:0});
      }

      /* Check mode navigation */
      if(a==='open-check')   openCheckMode();
      if(a==='close-check')  closeCheckMode();
      if(a==='chk-commit')   commitAndClose();
      if(a==='chk-tab')      { chk.tab=v; render(); }

      if(a==='chk-jump'){
        saveInputToState();
        chk.stepIndex=parseInt(v);
        chk.noteVisible=false;
        render();
      }

      if(a==='chk-prev'){
        saveInputToState();
        if(chk.stepIndex>0){ chk.stepIndex--; chk.noteVisible=false; render(); }
      }

      if(a==='chk-next'){
        saveInputToState();
        advanceCheck();
      }

      if(a==='chk-finish'){
        saveInputToState();
        chk.showSummary=true; render();
      }

      if(a==='chk-goto-mismatch'){
        chk.showSummary=false;
        chk.stepIndex=parseInt(v);
        render();
      }

      /* Check actions */
      if(a==='chk-act'){
        saveInputToState();
        const note=getNoteValue();
        const param=el.dataset.param;
        chkAction(v, param, note);
      }

      if(a==='chk-color'){
        const param=el.dataset.param; const status=v;
        chk.results[param]={ status, actual:status==='match'?'✓':'—', note:'' };
        advanceCheck();
      }

      if(a==='chk-toggle-note'){
        saveInputToState();
        chk.noteVisible=!chk.noteVisible;
        render();
        if(chk.noteVisible) setTimeout(()=>{ document.getElementById('chk-note')?.focus(); },50);
      }

      if(a==='toggle-version'){
        const body=document.getElementById('vbody-'+v);
        if(body) body.classList.toggle('open');
      }
    });
  });

  /* Live input feedback */
  const inp=document.getElementById('chk-input');
  if(inp){
    inp.addEventListener('input',()=>{
      const rows=getRows(); const cur=rows[chk.stepIndex]; if(!cur) return;
      const key=cur[0]; const expRaw=cur[2];
      const val=inp.value;
      const exp=getExpectedValue(key,expRaw);
      const status=val.trim()
        ?(normalizeCompareValue(String(exp))===normalizeCompareValue(val)?'match':'mismatch')
        :'pending';
      chk.results[key]={ ...(chk.results[key]||{}), actual:val, status };
      /* Update box class live */
      const box=inp.closest('.check-val-box');
      if(box) box.className='check-val-box '+(status==='match'?'st-match':status==='mismatch'?'st-mismatch':'actual');
      /* Update badge live */
      const badge=document.querySelector('.check-player-top .badge');
      const lblMap={ match:'✓ Match', mismatch:'✕ Afwijking', pending:'In behandeling' };
      const clsMap={ match:'badge-green', mismatch:'badge-red', pending:'badge-slate' };
      if(badge){ badge.className='badge '+(clsMap[status]||'badge-slate'); badge.innerHTML=`<span class="badge-dot"></span>${lblMap[status]||'In behandeling'}`; }
    });
    inp.focus();
    const len=inp.value.length; inp.setSelectionRange(len,len);
  }
}

function canContinue(){ return !!(state.fromBiscuit&&state.fromFormat&&state.toBiscuit&&state.toFormat); }

/* Boot */
render();
loadData();

})();
</script>
