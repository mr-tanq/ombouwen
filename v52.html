<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pally · Ombouwen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --black:        #000;
      --s1:           rgba(255,255,255,.03);
      --s2:           rgba(255,255,255,.055);
      --s3:           rgba(255,255,255,.09);
      --b1:           rgba(255,255,255,.07);
      --b2:           rgba(255,255,255,.12);
      --b3:           rgba(255,255,255,.20);
      --amber:        #f59e0b;
      --amber-d:      rgba(245,158,11,.14);
      --amber-g:      rgba(245,158,11,.28);
      --blue:         #3b82f6;
      --blue-d:       rgba(59,130,246,.14);
      --blue-g:       rgba(59,130,246,.28);
      --green:        #22c55e;
      --green-d:      rgba(34,197,94,.14);
      --green-g:      rgba(34,197,94,.32);
      --red:          #ef4444;
      --red-d:        rgba(239,68,68,.14);
      --red-g:        rgba(239,68,68,.28);
      --cyan:         #06b6d4;
      --cyan-d:       rgba(6,182,212,.14);
      --cyan-g:       rgba(6,182,212,.28);
      --slate:        #64748b;
      --text:         #fff;
      --text-2:       #94a3b8;
      --text-3:       #475569;
      --mono:         'Geist Mono', monospace;
      --sans:         'Geist', system-ui, sans-serif;
      --r-sm:         6px;
      --r-md:         10px;
      --r-lg:         14px;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--black); color: var(--text);
      font-family: var(--sans); font-size: 14px; line-height: 1.5;
      min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    img { max-width: 100%; display: block; }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
        rgba(255,255,255,.006) 2px, rgba(255,255,255,.006) 4px);
    }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: var(--r-sm);
      transition: all .14s ease; cursor: pointer; border: none;
      white-space: nowrap;
    }
    .btn-ghost  { background: transparent; border: 1px solid var(--b2); color: var(--text-2); }
    .btn-ghost:hover:not(:disabled)   { background: var(--s2); color: var(--text); border-color: var(--b3); }
    .btn-ghost:disabled { opacity: .25; cursor: not-allowed; }

    .btn-primary { background: var(--amber); color: #000; font-weight: 700; border: none; }
    .btn-primary:hover:not(:disabled) { background: #fbbf24; box-shadow: 0 0 20px var(--amber-g); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .18; cursor: not-allowed; }

    .btn-success { background: var(--green); color: #000; font-weight: 700; border: none; }
    .btn-success:hover:not(:disabled) { box-shadow: 0 0 20px var(--green-g); transform: translateY(-1px); }

    .btn-danger  { background: transparent; border: 1px solid rgba(239,68,68,.3); color: var(--red); }
    .btn-danger:hover:not(:disabled)  { background: var(--red-d); }

    .btn-icon {
      width: 33px; height: 33px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--r-sm); border: 1px solid var(--b2);
      background: var(--s1); color: var(--text-3); font-size: 16px;
      transition: all .14s ease; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--s3); color: var(--text); border-color: var(--b3); }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: BADGES / PILLS / STATUS
    ═══════════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px; border: 1px solid; letter-spacing: .1em;
      text-transform: uppercase; white-space: nowrap;
    }
    .badge-amber  { background: var(--amber-d); border-color: rgba(245,158,11,.25); color: var(--amber); }
    .badge-green  { background: var(--green-d); border-color: rgba(34,197,94,.25);  color: var(--green); }
    .badge-red    { background: var(--red-d);   border-color: rgba(239,68,68,.25);  color: var(--red); }
    .badge-blue   { background: var(--blue-d);  border-color: rgba(59,130,246,.25); color: var(--blue); }
    .badge-cyan   { background: var(--cyan-d);  border-color: rgba(6,182,212,.25);  color: var(--cyan); }
    .badge-slate  { background: rgba(100,116,139,.12); border-color: rgba(100,116,139,.25); color: var(--slate); }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 4px 11px; border-radius: 20px;
      border: 1px solid var(--b2); background: var(--s1);
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      color: var(--text-2); letter-spacing: .02em;
    }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: CARDS
    ═══════════════════════════════════════════ */
    .card {
      border: 1px solid var(--b1); border-radius: var(--r-lg);
      background: var(--s1); position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.018) 0%, transparent 60%);
      pointer-events: none;
    }
    .card:hover { border-color: var(--b2); }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: CHIPS
    ═══════════════════════════════════════════ */
    .chip {
      font-size: 12px; font-weight: 500; padding: 7px 13px;
      border-radius: var(--r-sm); border: 1px solid var(--b2);
      background: var(--s1); color: var(--text-2);
      display: inline-flex; align-items: center; gap: 8px;
      transition: all .14s ease;
    }
    .chip:hover  { background: var(--s3); color: var(--text); border-color: var(--b3); transform: translateY(-1px); }
    .chip.active { background: var(--amber-d); border-color: rgba(245,158,11,.28); color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,.07); }
    .chip-row    { display: flex; flex-wrap: wrap; gap: 7px; }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: COLOR DOTS
    ═══════════════════════════════════════════ */
    .colorDot  { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12); display: inline-block; flex-shrink: 0; }
    .colorDot.wit   { border-color: rgba(255,255,255,.4); }
    .colorDot.grijs { border-color: rgba(255,255,255,.22); }
    .colorDots { display: inline-flex; gap: 4px; align-items: center; }
    .richValue { display: inline-flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .richText  { font-weight: 600; }

    /* ═══════════════════════════════════════════
       SHARED COMPONENT: PARAM NUMBER BADGE
    ═══════════════════════════════════════════ */
    .param-num {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: var(--amber); background: rgba(245,158,11,.07);
      border: 1px solid rgba(245,158,11,.2); border-radius: 4px;
      padding: 2px 6px; flex-shrink: 0; letter-spacing: .04em;
      align-self: flex-start; margin-top: 1px;
    }

    /* ═══════════════════════════════════════════
       SHELL & TOPBAR
    ═══════════════════════════════════════════ */
    .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; position: relative; z-index: 1; }

    .topbar {
      height: 56px; border-bottom: 1px solid var(--b1);
      background: rgba(0,0,0,.88); backdrop-filter: blur(20px) saturate(1.6);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; position: sticky; top: 0; z-index: 200;
    }
    .topbar-brand { display: flex; align-items: center; gap: 14px; }
    .topbar-logo  { width: 30px; height: 30px; border: 1px solid var(--b2); border-radius: var(--r-sm); overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--s2); flex-shrink: 0; }
    .topbar-name  { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: .14em; text-transform: uppercase; }
    .topbar-sep   { width: 1px; height: 18px; background: var(--b2); }
    .topbar-module{ font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .22em; text-transform: uppercase; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .sys-readout  { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .08em; }
    .status-pill  { display: flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(34,197,94,.2); background: rgba(34,197,94,.05); }
    .status-dot   { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green-g); animation: pulse 3s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-label { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: .12em; opacity: .85; }

    /* ═══════════════════════════════════════════
       BODY LAYOUT
    ═══════════════════════════════════════════ */
    .body { display: grid; grid-template-columns: 260px 1fr; }

    /* ═══════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════ */
    .sidebar {
      border-right: 1px solid var(--b1); background: rgba(0,0,0,.55);
      display: flex; flex-direction: column; padding: 28px 0;
      min-height: calc(100vh - 56px);
      position: sticky; top: 56px; align-self: start;
      max-height: calc(100vh - 56px); overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 2px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 1px; }
    .sidebar-section { padding: 0 18px 22px; }
    .sidebar-label   { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .26em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .sidebar-sep     { height: 1px; background: var(--b1); margin: 0 18px 22px; }

    .flow-card { border: 1px solid var(--b1); border-radius: var(--r-md); background: var(--s1); overflow: hidden; }
    .flow-card-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: stretch; }
    .flow-block { padding: 11px 13px; }
    .flow-block + .flow-block { border-left: 1px solid var(--b1); }
    .flow-block-label { font-family: var(--mono); font-size: 8px; color: var(--text-3); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 4px; }
    .flow-block-value { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flow-block-value.dim   { color: var(--text-3); font-weight: 400; }
    .flow-block-value.amber { color: var(--amber); }
    .flow-arrow-col { display: flex; align-items: center; justify-content: center; padding: 0 9px; border-left: 1px solid var(--b1); border-right: 1px solid var(--b1); background: var(--s1); font-family: var(--mono); font-size: 11px; color: var(--text-3); }

    .section-tag { margin-top: 7px; display: flex; align-items: center; gap: 7px; padding: 5px 11px; border-radius: var(--r-sm); border: 1px solid var(--b1); background: var(--s1); font-family: var(--mono); font-size: 10px; color: var(--text-3); }
    .tag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 6px var(--amber-g); flex-shrink: 0; }

    .step-list { display: flex; flex-direction: column; gap: 3px; padding: 0 18px; }
    .step-item { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: var(--r-sm); cursor: default; border: 1px solid transparent; transition: all .18s ease; }
    .step-item.done         { background: rgba(34,197,94,.05);  border-color: rgba(34,197,94,.1); }
    .step-item.active       { background: rgba(245,158,11,.05); border-color: rgba(245,158,11,.12); }
    .step-item.check-active { background: rgba(6,182,212,.05);  border-color: rgba(6,182,212,.14); }
    .step-num { font-family: var(--mono); font-size: 9px; font-weight: 700; width: 21px; height: 21px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--b2); color: var(--text-3); background: var(--s1); transition: all .18s ease; }
    .step-item.done         .step-num { background: rgba(34,197,94,.15);  border-color: rgba(34,197,94,.3);   color: var(--green); }
    .step-item.active       .step-num { background: rgba(245,158,11,.1);  border-color: rgba(245,158,11,.25); color: var(--amber); }
    .step-item.check-active .step-num { background: rgba(6,182,212,.1);   border-color: rgba(6,182,212,.28);  color: var(--cyan); box-shadow: 0 0 8px var(--cyan-d); }
    .step-text { font-size: 12px; color: var(--text-3); font-weight: 500; }
    .step-item.done         .step-text { color: rgba(34,197,94,.75); }
    .step-item.active       .step-text { color: var(--text); }
    .step-item.check-active .step-text { color: rgba(6,182,212,.9); }

    /* ═══════════════════════════════════════════
       MAIN & BREADCRUMB
    ═══════════════════════════════════════════ */
    .main { display: flex; flex-direction: column; min-width: 0; }
    .breadcrumb { border-bottom: 1px solid var(--b1); padding: 0 32px; height: 38px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,.35); }
    .bc-item { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .08em; }
    .bc-item.active { color: rgba(255,255,255,.6); }
    .bc-sep  { font-family: var(--mono); font-size: 10px; color: var(--text-3); opacity: .4; }

    /* ═══════════════════════════════════════════
       CONTENT
    ═══════════════════════════════════════════ */
    .content { flex: 1; padding: 36px 36px 56px; animation: fadeUp .22s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .content-title { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -.04em; margin-bottom: 5px; line-height: 1.15; }
    .content-sub   { font-size: 13px; color: var(--text-2); line-height: 1.6; max-width: 480px; margin-bottom: 28px; }

    /* ═══════════════════════════════════════════
       SETUP PANELS
    ═══════════════════════════════════════════ */
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .panel { border: 1px solid var(--b1); border-radius: var(--r-lg); background: var(--s1); overflow: hidden; position: relative; }
    .panel::before { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(135deg,rgba(255,255,255,.018) 0%,transparent 60%); pointer-events:none; }
    .panel-header { padding: 12px 18px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.014); }
    .panel-title  { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3); }
    .panel-body   { padding: 18px; }
    .field-label  { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; margin-top: 16px; }
    .field-label:first-child { margin-top: 0; }
    .actions-bar  { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding-top: 22px; border-top: 1px solid var(--b1); }

    /* ═══════════════════════════════════════════
       SECTION CARDS (machine selection)
    ═══════════════════════════════════════════ */
    .section-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 13px; }
    .section-card {
      border: 1px solid var(--b1); border-radius: var(--r-lg); background: var(--s1);
      padding: 22px; text-align: left; display: flex; flex-direction: column; gap: 12px;
      transition: all .18s cubic-bezier(.16,1,.3,1); cursor: pointer; position: relative; overflow: hidden;
    }
    .section-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.018) 0%,transparent 55%); pointer-events:none; }
    .section-card:hover { border-color: var(--b3); background: var(--s2); transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,.5); }

    .section-card-logo-wrap {
      height: 44px; display: flex; align-items: center;
    }
    .section-card-logo { height: 36px; width: auto; object-fit: contain; object-position: left center; opacity: .85; transition: opacity .18s; filter: brightness(1.1); }
    .section-card:hover .section-card-logo { opacity: 1; }

    .section-card-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.025em; }
    .section-card-desc  { font-size: 12px; color: var(--text-2); line-height: 1.65; flex: 1; }
    .section-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 11px; border-top: 1px solid var(--b1); }
    .section-card-tag   { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: .1em; text-transform: uppercase; }
    .section-card-arrow { font-family: var(--mono); font-size: 13px; color: var(--text-3); transition: color .15s, transform .15s; }
    .section-card:hover .section-card-arrow { color: var(--amber); transform: translateX(4px); }

    /* ═══════════════════════════════════════════
       VIEW HEADER & TOGGLE ROW
    ═══════════════════════════════════════════ */
    .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 14px; flex-wrap: wrap; }
    .view-header-left  { display: flex; align-items: center; gap: 13px; }
    .view-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .view-title { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -.03em; }

    .toggle-row { display: flex; gap: 6px; margin-bottom: 20px; }
    .toggle-btn {
      font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 6px 13px;
      border-radius: var(--r-sm); border: 1px solid var(--b2); background: var(--s1);
      color: var(--text-3); letter-spacing: .12em; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 7px; transition: all .14s ease;
    }
    .toggle-btn:hover  { color: var(--text-2); background: var(--s2); }
    .toggle-btn.active { background: var(--amber-d); border-color: rgba(245,158,11,.22); color: var(--amber); }

    .mode-bar    { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .view-tabs   { display: flex; gap: 5px; }
    .view-tab-btn {
      font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 7px 14px;
      border-radius: var(--r-sm); border: 1px solid var(--b2); background: var(--s1);
      color: var(--text-3); display: inline-flex; align-items: center; gap: 7px;
      transition: all .14s ease; letter-spacing: .12em; text-transform: uppercase;
    }
    .view-tab-btn:hover  { background: var(--s3); color: var(--text); }
    .view-tab-btn.active { background: var(--blue-d); border-color: rgba(59,130,246,.22); color: var(--blue); }

    .filter-pills { display: flex; gap: 3px; }
    .filter-btn {
      font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      padding: 5px 11px; border-radius: var(--r-sm); border: 1px solid var(--b1);
      background: transparent; color: var(--text-3); transition: all .12s ease;
    }
    .filter-btn:hover  { color: var(--text-2); }
    .filter-btn.active { background: var(--s2); border-color: var(--b2); color: var(--text); }

    /* ═══════════════════════════════════════════
       VALUE TABLE (list view)
    ═══════════════════════════════════════════ */
    .value-table { border: 1px solid var(--b1); border-radius: var(--r-lg); overflow: hidden; background: var(--s1); }
    .value-table-header { display: grid; grid-template-columns: minmax(160px,2fr) 130px 24px 130px; padding: 9px 18px; border-bottom: 1px solid var(--b1); background: rgba(255,255,255,.018); }
    .value-table-col    { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--text-3); }
    .value-rows { display: flex; flex-direction: column; }
    .value-row  { display: grid; grid-template-columns: minmax(160px,2fr) 130px 24px 130px; padding: 11px 18px; border-bottom: 1px solid var(--b1); align-items: center; gap: 8px; transition: background .11s; }
    .value-row:last-child { border-bottom: none; }
    .value-row:hover { background: rgba(255,255,255,.018); }
    .value-key  { font-size: 12px; color: rgba(255,255,255,.7); display: flex; align-items: center; gap: 8px; min-width: 0; padding-right: 8px; }
    .value-key-text { white-space: normal; word-break: break-word; line-height: 1.4; }
    .value-cell { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--slate); }
    .value-cell.is-new { color: var(--blue); font-weight: 600; }
    .value-sep  { font-family: var(--mono); font-size: 11px; color: var(--text-3); text-align: center; opacity: .4; }

    /* ═══════════════════════════════════════════
       STEP PLAYER (stap voor stap)
    ═══════════════════════════════════════════ */
    .player-wrap { display: grid; grid-template-columns: 1fr 268px; gap: 14px; align-items: start; }
    .player-main { border: 1px solid var(--b1); border-radius: var(--r-lg); background: var(--s1); overflow: hidden; position: relative; }
    .player-main::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.012) 0%,transparent 50%); pointer-events:none; }
    .player-top-bar   { padding: 11px 22px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,.018); }
    .player-counter   { font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: .12em; flex-shrink: 0; }
    .progress-track   { flex: 1; height: 2px; border-radius: 1px; background: rgba(255,255,255,.06); margin: 0 18px; overflow: hidden; position: relative; }
    .progress-fill    { height: 100%; border-radius: 1px; transition: width .32s cubic-bezier(.16,1,.3,1); }
    .progress-fill.amber { background: linear-gradient(90deg,rgba(245,158,11,.5),var(--amber)); box-shadow: 0 0 8px var(--amber-g); }
    .progress-fill.cyan  { background: linear-gradient(90deg,rgba(6,182,212,.5),var(--cyan));  box-shadow: 0 0 8px var(--cyan-g); }
    .player-body      { padding: 32px; }
    .player-key-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 9px; }
    .player-label     { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -.04em; line-height: 1.15; margin-bottom: 30px; display: flex; align-items: center; gap: 13px; flex-wrap: wrap; }
    .player-num       { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--amber); background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.22); border-radius: 5px; padding: 3px 9px; flex-shrink: 0; }
    .player-values    { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
    .player-val-block { flex: 1; min-width: 110px; }
    .player-val-label { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 7px; }
    .player-val-box   { border: 1px solid var(--b2); border-radius: var(--r-sm); background: rgba(255,255,255,.02); padding: 14px 18px; font-family: var(--mono); font-size: 18px; font-weight: 600; color: rgba(255,255,255,.6); min-height: 56px; display: flex; align-items: center; gap: 9px; transition: all .18s ease; }
    .player-val-box.new-val { border-color: rgba(59,130,246,.22); background: rgba(59,130,246,.06); color: var(--blue); }
    .player-arrow-sep { font-family: var(--mono); font-size: 15px; color: var(--text-3); flex-shrink: 0; margin-top: 24px; opacity: .4; }
    .player-controls  { padding: 13px 22px; border-top: 1px solid var(--b1); display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.01); }

    .mini-panel { border: 1px solid var(--b1); border-radius: var(--r-lg); background: var(--s1); overflow: hidden; }
    .mini-panel-header { padding: 10px 14px; border-bottom: 1px solid var(--b1); background: rgba(255,255,255,.018); display: flex; align-items: center; justify-content: space-between; }
    .mini-panel-title  { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--text-3); }
    .mini-list { display: flex; flex-direction: column; max-height: 440px; overflow-y: auto; }
    .mini-list::-webkit-scrollbar { width: 2px; }
    .mini-list::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 1px; }
    .mini-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--b1); cursor: pointer; transition: background .1s; }
    .mini-row:last-child { border-bottom: none; }
    .mini-row:hover { background: var(--s2); }
    .mini-row.active { background: rgba(245,158,11,.05); border-left: 2px solid var(--amber); padding-left: 10px; }
    .mini-row.check-active { border-left: 2px solid var(--cyan); padding-left: 10px; }
    .mini-num  { font-family: var(--mono); font-size: 9px; color: var(--text-3); width: 18px; flex-shrink: 0; }
    .mini-row.active .mini-num { color: var(--amber); }
    .mini-row.check-active .mini-num { color: var(--cyan); }
    .mini-key  { font-size: 11px; color: rgba(255,255,255,.4); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-row.active .mini-key { color: rgba(255,255,255,.85); font-weight: 600; }
    .mini-row.check-active .mini-key { color: rgba(255,255,255,.85); font-weight: 600; }
    .mini-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mini-status-dot.match    { background: var(--green); box-shadow: 0 0 5px var(--green-g); }
    .mini-status-dot.mismatch { background: var(--red);   box-shadow: 0 0 5px var(--red-g); }
    .mini-status-dot.saved    { background: var(--cyan);  box-shadow: 0 0 5px var(--cyan-g); }
    .mini-status-dot.skipped  { background: var(--slate); }
    .mini-status-dot.pending  { background: var(--b2); }
    .mini-check { font-size: 9px; color: var(--green); }

    /* ═══════════════════════════════════════════
       CHECK MODE
    ═══════════════════════════════════════════ */
    .check-wrap { display: grid; grid-template-columns: 1fr 264px; gap: 14px; align-items: start; }

    .check-player { border: 1px solid var(--b1); border-radius: var(--r-lg); background: var(--s1); overflow: hidden; position: relative; margin-bottom: 0; }
    .check-player-top { padding: 12px 22px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,.018); gap: 14px; }
    .check-player-body { padding: 32px; }
    .check-param-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); margin-bottom: 9px; }
    .check-param-name  { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -.04em; line-height: 1.15; margin-bottom: 28px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* Expected vs Actual side by side */
    .check-values-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: start; margin-bottom: 24px; }
    .check-val-block   { display: flex; flex-direction: column; gap: 7px; }
    .check-val-label   { font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; color: var(--text-3); }
    .check-val-box     { border: 1px solid var(--b2); border-radius: var(--r-sm); padding: 16px 20px; font-family: var(--mono); font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; min-height: 62px; transition: all .2s ease; }
    .check-val-box.expected { background: rgba(255,255,255,.02); color: rgba(255,255,255,.7); }
    .check-val-box.actual   { background: rgba(255,255,255,.02); color: rgba(255,255,255,.9); }
    .check-val-box.st-match    { border-color: rgba(34,197,94,.3);  background: rgba(34,197,94,.07);  color: var(--green); }
    .check-val-box.st-mismatch { border-color: rgba(239,68,68,.3);  background: rgba(239,68,68,.07);  color: var(--red); }
    .check-val-box.st-saved    { border-color: rgba(6,182,212,.3);  background: rgba(6,182,212,.07);  color: var(--cyan); }
    .check-val-box.st-skipped  { border-color: rgba(100,116,139,.3); background: rgba(100,116,139,.07); color: var(--slate); }
    .check-val-box:focus-within { border-color: rgba(6,182,212,.35) !important; box-shadow: 0 0 0 3px rgba(6,182,212,.07); }

    .check-input { width: 100%; border: none; background: transparent; color: inherit; font-family: var(--mono); font-size: 22px; font-weight: 700; padding: 0; outline: none; caret-color: var(--cyan); }
    .check-input::placeholder { color: var(--text-3); font-size: 16px; font-weight: 400; }

    .check-arrow { font-family: var(--mono); font-size: 16px; color: var(--text-3); opacity: .4; margin-top: 28px; align-self: center; }

    /* Action bar — always visible */
    .check-action-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 0; }
    .check-action-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; padding: 12px 8px; border-radius: var(--r-sm);
      border: 1px solid var(--b2); background: var(--s1);
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--text-3);
      cursor: pointer; transition: all .15s ease; min-height: 64px;
    }
    .check-action-btn .action-icon { font-size: 16px; line-height: 1; }
    .check-action-btn:hover { background: var(--s3); color: var(--text); border-color: var(--b3); }
    .check-action-btn.act-match   { border-color: rgba(34,197,94,.2); color: var(--green); }
    .check-action-btn.act-match:hover  { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.4); box-shadow: 0 0 14px rgba(34,197,94,.18); }
    .check-action-btn.act-save    { border-color: rgba(6,182,212,.2); color: var(--cyan); }
    .check-action-btn.act-save:hover   { background: rgba(6,182,212,.12); border-color: rgba(6,182,212,.4); box-shadow: 0 0 14px rgba(6,182,212,.18); }
    .check-action-btn.act-skip    { border-color: rgba(100,116,139,.2); color: var(--slate); }
    .check-action-btn.act-skip:hover   { background: rgba(100,116,139,.12); border-color: rgba(100,116,139,.4); }
    .check-action-btn.act-note    { border-color: rgba(245,158,11,.2); color: var(--amber); }
    .check-action-btn.act-note:hover   { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.4); }
    .check-action-btn.selected    { box-shadow: inset 0 0 0 2px currentColor; }

    .check-player-nav { padding: 13px 22px; border-top: 1px solid var(--b1); display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,.01); }

    /* Note input */
    .note-row { margin-top: 14px; display: none; }
    .note-row.visible { display: flex; gap: 8px; }
    .note-input { flex: 1; background: var(--s2); border: 1px solid var(--b2); border-radius: var(--r-sm); padding: 8px 12px; font: inherit; font-size: 13px; color: var(--text); outline: none; transition: border-color .14s; }
    .note-input:focus { border-color: rgba(245,158,11,.35); }
    .note-input::placeholder { color: var(--text-3); }

    /* ═══════════════════════════════════════════
       CHECK SUMMARY SCREEN
    ═══════════════════════════════════════════ */
    .summary-screen { animation: fadeUp .22s cubic-bezier(.16,1,.3,1) both; }
    .summary-hero { font-size: 22px; font-weight: 700; letter-spacing: -.03em; color: var(--text); margin-bottom: 6px; }
    .summary-sub  { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }
    .summary-stats{ display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }

    .summary-table { border: 1px solid var(--b1); border-radius: var(--r-lg); overflow: hidden; background: var(--s1); margin-bottom: 24px; }
    .summary-row   { display: grid; grid-template-columns: minmax(130px,2fr) 110px 22px 110px 100px; gap: 10px; padding: 12px 18px; border-bottom: 1px solid var(--b1); align-items: center; }
    .summary-row:last-child { border-bottom: none; }
    .summary-row.row-match    { background: rgba(34,197,94,.025); }
    .summary-row.row-mismatch { background: rgba(239,68,68,.03); }
    .summary-row.row-saved    { background: rgba(6,182,212,.025); }
    .summary-row.row-skipped  { background: rgba(100,116,139,.02); }
    .summary-key   { font-size: 12px; color: rgba(255,255,255,.7); display: flex; align-items: center; gap: 8px; }
    .summary-from  { font-family: var(--mono); font-size: 12px; color: var(--slate); }
    .summary-to    { font-family: var(--mono); font-size: 12px; font-weight: 700; }
    .summary-to.match    { color: var(--green); }
    .summary-to.mismatch { color: var(--red); }
    .summary-to.saved    { color: var(--cyan); }
    .summary-to.skipped  { color: var(--slate); }
    .summary-to.pending  { color: var(--text-3); }
    .summary-sep   { font-family: var(--mono); font-size: 11px; color: var(--text-3); opacity: .4; text-align: center; }
    .summary-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Section tab bar */
    .tab-bar { display: flex; gap: 3px; margin-bottom: 22px; border-bottom: 1px solid var(--b1); }
    .tab-btn { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: 8px 16px; border-radius: var(--r-sm) var(--r-sm) 0 0; border: 1px solid transparent; border-bottom: none; background: transparent; color: var(--text-3); cursor: pointer; transition: all .14s ease; margin-bottom: -1px; }
    .tab-btn:hover { color: var(--text-2); }
    .tab-btn.active { background: var(--s2); border-color: var(--b2); border-bottom-color: var(--s2); color: var(--text); }

    /* ═══════════════════════════════════════════
       HISTORY / VERSIONS
    ═══════════════════════════════════════════ */
    .version-list { display: flex; flex-direction: column; gap: 10px; }
    .version-card { border: 1px solid var(--b1); border-radius: var(--r-md); background: var(--s1); overflow: hidden; transition: border-color .15s; }
    .version-card:hover { border-color: var(--b2); }
    .version-card-header { padding: 11px 18px; border-bottom: 1px solid var(--b1); display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.018); cursor: pointer; }
    .version-meta  { font-family: var(--mono); font-size: 10px; color: var(--text-2); flex: 1; }
    .version-date  { font-family: var(--mono); font-size: 10px; color: var(--text-3); flex-shrink: 0; }
    .version-count { font-family: var(--mono); font-size: 9px; padding: 2px 8px; border-radius: 3px; background: var(--s2); border: 1px solid var(--b2); color: var(--text-3); flex-shrink: 0; }
    .version-body  { padding: 14px 18px; display: none; }
    .version-body.open { display: block; }
    .version-param-list { display: flex; flex-direction: column; gap: 2px; }
    .version-param-row  { display: grid; grid-template-columns: 1fr 100px 20px 100px; gap: 8px; padding: 7px 10px; border-radius: var(--r-sm); align-items: center; }
    .version-param-row:hover { background: rgba(255,255,255,.02); }
    .version-param-name { font-size: 12px; color: rgba(255,255,255,.6); display: flex; align-items: center; gap: 7px; }
    .version-param-val  { font-family: var(--mono); font-size: 11px; color: var(--slate); }
    .version-param-val.new { color: var(--blue); font-weight: 600; }
    .version-param-sep  { font-family: var(--mono); font-size: 10px; color: var(--text-3); opacity: .4; text-align: center; }

    /* ═══════════════════════════════════════════
       AUDIT LOG
    ═══════════════════════════════════════════ */
    .audit-list  { display: flex; flex-direction: column; gap: 8px; }
    .audit-entry { border: 1px solid var(--b1); border-radius: var(--r-md); background: var(--s1); padding: 14px 18px; display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: start; transition: border-color .14s; }
    .audit-entry:hover { border-color: var(--b2); }
    .audit-icon  { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
    .audit-icon.match    { background: var(--green-d);  border: 1px solid rgba(34,197,94,.22); }
    .audit-icon.mismatch { background: var(--red-d);    border: 1px solid rgba(239,68,68,.22); }
    .audit-icon.saved    { background: var(--cyan-d);   border: 1px solid rgba(6,182,212,.22); }
    .audit-icon.skipped  { background: rgba(100,116,139,.12); border: 1px solid rgba(100,116,139,.22); }
    .audit-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .audit-meta  { font-family: var(--mono); font-size: 10px; color: var(--text-3); line-height: 1.6; }
    .audit-change{ display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; margin-top: 4px; }
    .audit-old   { color: var(--slate); }
    .audit-arr   { color: var(--text-3); opacity: .5; }
    .audit-new   { color: var(--blue); font-weight: 700; }
    .audit-note  { margin-top: 5px; font-size: 12px; color: var(--text-2); font-style: italic; padding: 5px 9px; border-radius: 5px; background: rgba(255,255,255,.03); border-left: 2px solid var(--b2); }
    .audit-ts    { font-family: var(--mono); font-size: 9px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }

    /* ═══════════════════════════════════════════
       EMPTY STATE & LOADING
    ═══════════════════════════════════════════ */
    .empty-state { padding: 60px 40px; text-align: center; color: var(--text-3); font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-state::before { content:''; display:block; width:32px; height:1px; background: var(--b2); }

    .loading-screen { display: flex; align-items: center; justify-content: center; flex: 1; padding: 80px; flex-direction: column; gap: 14px; }
    .loading-bar-wrap { width: 180px; height: 2px; background: var(--b2); border-radius: 1px; overflow: hidden; }
    .loading-bar-fill { height: 100%; width: 40%; background: linear-gradient(90deg, transparent, var(--amber), transparent); border-radius: 1px; animation: sweep 1.6s ease-in-out infinite; }
    @keyframes sweep { 0%{transform:translateX(-200%)} 100%{transform:translateX(500%)} }
    .loading-label { font-family: var(--mono); font-size: 9px; color: var(--text-3); letter-spacing: .24em; text-transform: uppercase; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 900px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .panel-grid, .section-grid { grid-template-columns: 1fr; }
      .player-wrap, .check-wrap { grid-template-columns: 1fr; }
      .mini-panel:not(.check-sidebar) { display: none; }
      .value-table-header, .value-row { grid-template-columns: minmax(120px,2fr) 80px 20px 80px; }
      .summary-row { grid-template-columns: 1fr 80px 18px 80px 70px; }
      .content { padding: 24px 18px 40px; }
      .topbar, .breadcrumb { padding: 0 18px; }
      .check-action-bar { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="err-box" style="display:none;position:fixed;bottom:12px;left:12px;right:12px;z-index:9999;background:#1a0000;border:1px solid #ef4444;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:11px;color:#ef4444;white-space:pre-wrap;max-height:120px;overflow:auto" onclick="this.style.display='none'"></div>
<div class="shell" id="app-shell"></div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════════════════════
   DATA DEFINITIONS
═══════════════════════════════════════════════════════════ */
const BISCUITS = [
  { id:'richtea',    label:'Rich Tea',   formats:['5x6','3x6'], color:'blauw' },
  { id:'koffiekoek', label:'Koffiekoek', formats:['4x4','5x4','5x5'], color:'bruin' },
  { id:'theekokos',  label:'Thee/Kokos', formats:['5x5'], color:'wit' }
];

const SECTIONS = {
  cavanna:    { title:'Cavanna',          logo:'cavanna-logo.png',    desc:'Instellingen voor de Cavanna inpakker, lijn 9 en 10.', hasLines:true },
  robertpack: { title:'Robert Pack',      logo:'robertpack-logo.png', desc:'Plaatst de biscuit rijen in de dozen, lijn 9 en 10.', hasLines:true },
  dozen:      { title:'Dozen Opzetter',   logo:'dozen-logo.png',      desc:'Vouwt en zet de dozen op voor de Robert Pack.', hasLines:false },
  dekselaar:  { title:'Dekselaar Opzetter', logo:'dekselaar-logo.png', desc:'Plaatst en sluit de deksel op de gevulde dozen.', hasLines:false }
};

const FILES = {
  cavanna9:   './data/cavanna9.json',
  cavanna10:  './data/cavanna10.json',
  robertpack: './data/robertpack.json',
  dozen:      './data/dozen.json',
  dekselaar:  './data/dekselaar.json'
};

const COLOR_MAP = {
  rood:'#ef4444', grijs:'#64748b', bruin:'#7a4a21',
  wit:'#ffffff', blauw:'#3b82f6', zwart:'#111', groen:'#22c55e'
};

/* ═══════════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════════ */
const state = {
  loading:true, error:'', data:null,
  stage:1,
  fromBiscuit:null, fromFormat:null,
  toBiscuit:null,   toFormat:null,
  section:null,
  cavannaLine:'9', robertpackLine:'9',
  viewMode:null, onlyChanges:true, stepIndex:0
};

/* ═══════════════════════════════════════════════════════════
   CHECK STATE
═══════════════════════════════════════════════════════════ */
const chk = {
  active:false, stepIndex:0,
  results:{},   /* { paramKey: { status, actual, note } } */
  showSummary:false, tab:'check',
  noteVisible:false
};

/* ═══════════════════════════════════════════════════════════
   STORAGE — localStorage with JSON export helper
═══════════════════════════════════════════════════════════ */
const STORE_KEY = 'pally_v1';

function loadStore(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){ return {}; }
}

function getStore(){
  const s = loadStore();
  if(!s.versions)      s.versions = {};
  if(!s.auditLog)      s.auditLog = [];
  if(!s.currentValues) s.currentValues = {};
  return s;
}

function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e){} }

function buildStoreKey(){
  const line = state.section==='cavanna'    ? state.cavannaLine :
               state.section==='robertpack' ? state.robertpackLine : '';
  return `${state.section}|${state.toBiscuit}|${state.toFormat}|${line}`;
}

function nowStr(){
  return new Date().toLocaleString('nl-NL',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

/* Full snapshot of target values */
function buildSnapshot(){
  const rows = getRows();
  const snap = {};
  rows.forEach(([k,,v])=>{ snap[k] = v; });
  return snap;
}

function persistSavedValue(paramKey, actualVal, note){
  const store = getStore();
  const sk    = buildStoreKey();
  const versionId = `${sk}|${Date.now()}`;

  /* Update currentValues */
  if(!store.currentValues[sk]) store.currentValues[sk] = {};
  store.currentValues[sk][paramKey] = actualVal;

  /* Audit entry with full schema */
  const expectedVal = getExpectedValue(paramKey, getRows().find(r=>r[0]===paramKey)?.[2] ?? '');
  store.auditLog.unshift({
    id:         versionId,
    ts:         nowStr(),
    section:    getSectionTitle(state.section),
    line:       state.section==='cavanna' ? state.cavannaLine : state.section==='robertpack' ? state.robertpackLine : '',
    toBiscuit:  biscuitLabel(state.toBiscuit),
    toFormat:   state.toFormat,
    param:      paramKey,
    old:        normalizeDisplayValue(String(expectedVal)),
    new_:       normalizeDisplayValue(String(actualVal)),
    action:     'saved',
    note:       note || ''
  });

  /* Version with full snapshot */
  if(!store.versions[sk]) store.versions[sk] = [];
  const snapshot = buildSnapshot();
  /* Apply current overrides */
  Object.assign(snapshot, store.currentValues[sk]);

  const last = store.versions[sk][0];
  const changeEntry = {
    param: paramKey,
    old:   normalizeDisplayValue(String(expectedVal)),
    new_:  normalizeDisplayValue(String(actualVal)),
    note:  note || ''
  };

  if(!last || last.locked){
    store.versions[sk].unshift({
      v:        (store.versions[sk].length + 1),
      id:       versionId,
      ts:       nowStr(),
      section:  getSectionTitle(state.section),
      line:     state.section==='cavanna' ? state.cavannaLine : state.section==='robertpack' ? state.robertpackLine : '',
      toBiscuit: biscuitLabel(state.toBiscuit),
      toFormat:  state.toFormat,
      snapshot:  snapshot,
      changes:   [changeEntry],
      locked:    false
    });
  } else {
    const idx = last.changes.findIndex(c=>c.param===paramKey);
    if(idx>=0) last.changes[idx] = changeEntry; else last.changes.push(changeEntry);
    last.snapshot = snapshot;
    last.ts = nowStr();
  }

  saveStore(store);
}

function getExpectedValue(paramKey, fallback){
  const store = getStore();
  const sk    = buildStoreKey();
  const cv    = store.currentValues[sk];
  return (cv && cv[paramKey] != null) ? cv[paramKey] : fallback;
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
const biscuitLabel      = id => (BISCUITS.find(b=>b.id===id)||{}).label || '';
const formatsForBiscuit = id => (BISCUITS.find(b=>b.id===id)||{}).formats || [];
const getBiscuitMeta    = id =>  BISCUITS.find(b=>b.id===id) || null;
const getSectionTitle   = id => (SECTIONS[id]||{}).title || id;

function buildFlowRows(fromObj, toObj){
  const keys = Array.from(new Set([...Object.keys(fromObj||{}), ...Object.keys(toObj||{})]));
  return keys.map(k=>[k, fromObj&&fromObj[k]!=null?fromObj[k]:'—', toObj&&toObj[k]!=null?toObj[k]:'—']);
}

function escapeHtml(v){
  return String(v!=null?v:'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function cleanNumberToken(token){
  let s=String(token).trim();
  if(!s) return s;
  if(!/^[-+]?\d+[\.,]?\d*$/.test(s)) return s;
  const hasComma=s.includes(','), hasDot=s.includes('.');
  const sep=hasComma?',':(hasDot?'.':'');
  let parts=sep?s.split(sep):[s];
  let intPart=parts[0].replace(/^0+(\d)/,'$1');
  if(intPart==='') intPart='0';
  if(parts.length===1) return intPart;
  let decPart=parts[1].replace(/0+$/,'');
  return decPart ? intPart+','+decPart : intPart;
}

function normalizeDisplayValue(v){
  return String(v!=null?v:'').replace(/\u0392/g,'B')
    .split('/').map(p=>cleanNumberToken(p.trim())).join(' / ');
}

function normalizeCompareValue(v){
  return normalizeDisplayValue(v).toLowerCase().replace(/\s+/g,' ').trim();
}

const filterRows  = (rows,only)=>only ? rows.filter(r=>normalizeCompareValue(r[1])!==normalizeCompareValue(r[2])) : rows;
const isColorToken = t=>Object.prototype.hasOwnProperty.call(COLOR_MAP,String(t).trim().toLowerCase());

function renderColorDot(token){
  const name=String(token).trim().toLowerCase();
  const col=COLOR_MAP[name];
  if(!col) return '';
  return `<span class="colorDot ${name}" style="background:${col}"></span>`;
}

function renderRichValue(value){
  const norm=normalizeDisplayValue(value);
  const parts=norm.split('/').map(p=>p.trim()).filter(Boolean);
  if(parts.length&&parts.every(isColorToken))
    return `<span class="richValue"><span class="colorDots">${parts.map(renderColorDot).join('')}</span></span>`;
  const html=parts.map(p=>isColorToken(p)?renderColorDot(p):`<span class="richText">${escapeHtml(p)}</span>`);
  return `<span class="richValue">${html.join('<span class="richText">/</span>')}</span>`;
}

function renderParamKey(key){
  const m=String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
  if(!m) return `<span class="value-key-text">${escapeHtml(key)}</span>`;
  return `<span class="param-num">${escapeHtml(m[1])}</span><span class="value-key-text">${escapeHtml(m[2])}</span>`;
}

function renderPlayerLabel(key){
  const m=String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
  if(!m) return `<span>${escapeHtml(key)}</span>`;
  return `<span class="player-num">${escapeHtml(m[1])}</span><span>${escapeHtml(m[2])}</span>`;
}

/* ═══════════════════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════════════════ */
async function loadData(){
  try{
    const entries=await Promise.all(Object.entries(FILES).map(async([key,path])=>{
      const res=await fetch(path,{cache:'no-store'});
      if(!res.ok) throw new Error('Laden mislukt: '+path);
      return [key,await res.json()];
    }));
    state.data=Object.fromEntries(entries);
  }catch(err){
    state.error=err.message||'Laden mislukt.';
  }finally{
    state.loading=false; render();
  }
}

/* ═══════════════════════════════════════════════════════════
   ROW BUILDER — single source of truth
═══════════════════════════════════════════════════════════ */
function getRows(){
  if(!state.data) return [];
  const { section, cavannaLine, robertpackLine, fromFormat, toFormat, data } = state;

  if(section==='cavanna'){
    const src=cavannaLine==='10'?data.cavanna10:data.cavanna9;
    return buildFlowRows((src&&src.values&&src.values[fromFormat])||{}, (src&&src.values&&src.values[toFormat])||{});
  }
  if(section==='robertpack'){
    const byFormat=data.robertpack&&data.robertpack.values?data.robertpack.values:{};
    const fromObj=(byFormat[fromFormat]&&byFormat[fromFormat][robertpackLine])||{};
    const toObj  =(byFormat[toFormat]  &&byFormat[toFormat][robertpackLine])  ||{};
    return buildFlowRows(fromObj, toObj);
  }
  if(section==='dozen'){
    return buildFlowRows((data.dozen&&data.dozen.values&&data.dozen.values[fromFormat])||{}, (data.dozen&&data.dozen.values&&data.dozen.values[toFormat])||{});
  }
  if(section==='dekselaar'){
    return buildFlowRows((data.dekselaar&&data.dekselaar.values&&data.dekselaar.values[fromFormat])||{}, (data.dekselaar&&data.dekselaar.values&&data.dekselaar.values[toFormat])||{});
  }
  return [];
}

/* ═══════════════════════════════════════════════════════════
   CHECK MODE ACTIONS
═══════════════════════════════════════════════════════════ */
function chkAction(action, paramKey, note){
  const rows    = getRows();
  const cur     = rows[chk.stepIndex];
  if(!cur) return;
  const expRaw  = cur[2];
  const expected= getExpectedValue(paramKey, expRaw);
  const inp     = document.getElementById('chk-input');
  const actual  = inp ? inp.value.trim() : (chk.results[paramKey]?.actual||'');

  if(action==='match'){
    chk.results[paramKey]={ status:'match', actual: normalizeDisplayValue(String(expected)), note:note||'' };
    advanceCheck();
  } else if(action==='save'){
    const val = actual || (chk.results[paramKey]?.actual||'');
    if(!val){ alert('Voer eerst een waarde in.'); return; }
    persistSavedValue(paramKey, val, note||'');
    chk.results[paramKey]={ status:'saved', actual:val, note:note||'' };
    advanceCheck();
  } else if(action==='skip'){
    const val = actual || (chk.results[paramKey]?.actual||'');
    chk.results[paramKey]={ status:'skipped', actual:val, note:note||'' };
    advanceCheck();
  } else if(action==='mismatch'){
    const val = actual || (chk.results[paramKey]?.actual||'');
    chk.results[paramKey]={ status:'mismatch', actual:val, note:note||'' };
    advanceCheck();
  }
}

function advanceCheck(){
  chk.noteVisible = false;
  const rows=getRows();
  if(chk.stepIndex < rows.length-1){ chk.stepIndex++; render(); }
  else { chk.showSummary=true; render(); }
}

function openCheckMode(){
  Object.assign(chk,{active:true, stepIndex:0, results:{}, showSummary:false, tab:'check', noteVisible:false});
  render();
}

function closeCheckMode(){
  Object.assign(chk,{active:false, showSummary:false, noteVisible:false});
  render();
}

function commitAndClose(){
  const store=getStore(); const sk=buildStoreKey();
  if(store.versions[sk]?.[0] && !store.versions[sk][0].locked){
    store.versions[sk][0].locked=true; saveStore(store);
  }
  closeCheckMode();
}

  const actualVal=res.actual||'';
  const curStatus=res.status||'pending';

  const isColorVal=v=>{ const parts=normalizeDisplayValue(String(v)).split('/').map(p=>p.trim()).filter(Boolean); return parts.length>0&&parts.every(isColorToken); };
  const colorMode=isColorVal(expected);

          <button class="check-action-btn act-skip"  style="flex:1;min-height:44px" data-action="chk-color" data-value="skipped" data-param="${escapeHtml(curKey)}">— Overslaan</button>
        </div>
      </div>`
    : `<div class="check-val-box ${boxClass}">

          value="${escapeHtml(actualVal)}"

  const miniRows=rows.map(([key],i)=>{
    const s=chk.results[key]?.status||'pending';
    return `<div class="mini-row${i===chk.stepIndex?' check-active':''}" data-action="chk-jump" data-value="${i}">
      <span class="mini-num">${String(i+1).padStart(2,'0')}</span>

  return `<div class="check-wrap">

          <span class="badge ${badgeMap[curStatus]||'badge-slate'}"><span class="badge-dot"></span>${badgeLbl[curStatus]||'In behandeling'}</span>
        </div>

              <div class="check-val-label">Verwacht (lijst)</div>
