<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally Ombouwen v24</title>
  <style>
    :root{
      --bg:#0b0d12;
      --bg2:#11161d;
      --card:#171c24;
      --cardSoft:#1c2330;
      --line:rgba(255,255,255,.08);
      --lineGold:rgba(216,180,138,.22);
      --text:#f5f7fb;
      --muted:rgba(255,255,255,.60);
      --gold:#d8b48a;
      --gold2:#b89570;
      --blue:#67b8ff;
      --green:#59d48a;
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#0b0d12,#0f141b 40%,#0b0d12 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body{min-height:100vh}
    button{font:inherit}
    img{max-width:100%;display:block}

    .app{
      max-width:1100px;
      margin:0 auto;
      padding:18px 14px 42px;
    }

    .hero{
      border:1px solid var(--lineGold);
      background:
        radial-gradient(circle at top right, rgba(216,180,138,.14), transparent 28%),
        radial-gradient(circle at top left, rgba(103,184,255,.07), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:16px;
      overflow:hidden;
    }

    .heroTop{
      display:flex;
      gap:16px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brandWrap{
      display:flex;
      gap:16px;
      align-items:center;
      min-width:0;
    }

    .logoBox{
      width:84px;
      height:84px;
      border-radius:22px;
      background:#0b0d12;
      border:1px solid rgba(216,180,138,.16);
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .eyebrow{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:rgba(216,180,138,.76);
      font-weight:800;
      margin-bottom:6px;
    }

    h1,h2,h3,h4,p{margin:0}

    h1{
      font-size:clamp(30px,5vw,50px);
      line-height:.95;
      letter-spacing:-.05em;
      font-weight:900;
    }

    .heroSub{
      margin-top:10px;
      max-width:760px;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }

    .statusPill{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      border-radius:999px;
      padding:12px 16px;
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .statusDot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(89,212,138,.12);
      flex:0 0 auto;
    }

    .summaryBar{
      margin-top:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:22px;
      padding:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .summaryNode,.summaryArrow{
      border-radius:16px;
      padding:10px 12px;
      font-weight:800;
      font-size:13px;
    }

    .summaryNode{
      background:#0f1319;
      border:1px solid rgba(255,255,255,.06);
    }

    .summaryNode.active{
      background:var(--gold);
      color:#111;
      border-color:transparent;
    }

    .summaryArrow{
      color:rgba(255,255,255,.34);
      padding-left:2px;
      padding-right:2px;
    }

    .stepTrack{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      margin:18px 0 16px;
    }

    .stepDot{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
    }

    .stepDot.active{
      background:linear-gradient(90deg,var(--gold),#f1d4b1);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .sectionHead{
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .sectionTitle{
      font-size:clamp(26px,4vw,38px);
      font-weight:900;
      letter-spacing:-.04em;
    }

    .sectionSub{
      margin-top:8px;
      color:var(--muted);
      max-width:760px;
      line-height:1.5;
      font-size:15px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .grid2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .grid4{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .tileBtn,.formatBtn,.backBtn,.ghostBtn,.primaryBtn,.toggleBtn,.menuBtn{
      border:none;
      cursor:pointer;
      transition:.18s ease;
    }

    .tileBtn,.formatBtn,.menuBtn{
      text-align:left;
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
    }

    .tileBtn{
      padding:18px;
      min-height:170px;
    }

    .menuBtn{
      padding:22px 18px;
      min-height:150px;
    }

    .tileBtn:hover,.formatBtn:hover,.menuBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,138,.25);
    }

    .tileBtn.selected,.formatBtn.selected,.menuBtn.selected{
      border-color:rgba(216,180,138,.52);
      background:linear-gradient(180deg, rgba(216,180,138,.14), rgba(216,180,138,.06));
      box-shadow:0 0 0 1px rgba(216,180,138,.14) inset;
    }

    .tileIcon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(216,180,138,.12);
      border:1px solid rgba(216,180,138,.14);
      font-size:28px;
      margin-bottom:16px;
    }

    .tileTitle{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .tileMeta{
      margin-top:10px;
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
    }

    .formatGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:8px;
    }

    .formatBtn{
      padding:24px 18px;
      min-height:120px;
    }

    .formatKicker{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:11px;
      font-weight:800;
    }

    .formatValue{
      margin-top:8px;
      font-size:34px;
      font-weight:900;
      letter-spacing:-.05em;
    }
.backBtn,.ghostBtn,.toggleBtn{
      background:rgba(255,255,255,.04);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:11px 15px;
      font-weight:700;
    }

    .primaryBtn{
      background:linear-gradient(180deg, #efd2b2, var(--gold));
      color:#111;
      border-radius:999px;
      padding:14px 20px;
      font-weight:900;
      box-shadow:0 14px 32px rgba(216,180,138,.22);
    }

    .primaryBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .toggleBtn.active{
      background:rgba(103,184,255,.14);
      color:#dff1ff;
      border-color:rgba(103,184,255,.28);
    }

    .miniMenu{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:14px;
    }

    .listPanel{
      margin-top:14px;
      border-radius:24px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.16);
      padding:14px;
    }

    .valueList{
      display:grid;
      gap:10px;
    }

    .valueRow{
      border-radius:20px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.18);
      padding:14px;
    }

    .valueLabel{
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
    }

    .valueFlow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .valueBox{
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
    }

    .valueBox.new{
      background:rgba(103,184,255,.12);
      color:#cfe8ff;
      border-color:rgba(103,184,255,.22);
    }

    .valueArrow{
      color:rgba(255,255,255,.35);
      font-weight:900;
    }

    .emptyNote{
      color:var(--muted);
      padding:18px;
      border:1px dashed rgba(255,255,255,.1);
      border-radius:20px;
      background:rgba(0,0,0,.12);
    }

    .stepPlayer{
      margin-top:14px;
      border-radius:28px;
      border:1px solid rgba(103,184,255,.24);
      background:linear-gradient(180deg, rgba(103,184,255,.08), rgba(103,184,255,.04));
      padding:16px;
    }

    .progressText{
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }

    .progressBar{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-bottom:14px;
    }

    .progressFill{
      height:100%;
      background:linear-gradient(90deg, var(--blue), #a5d4ff);
      border-radius:999px;
    }

    .stepPlayerCard{
      border-radius:22px;
      background:rgba(0,0,0,.2);
      border:1px solid rgba(255,255,255,.06);
      padding:16px;
    }

    .stepPlayerLabel{
      font-size:14px;
      color:var(--muted);
      margin-bottom:12px;
    }

    .playerControls{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .bottomBar{
      position:sticky;
      bottom:10px;
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(11,13,18,.72);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:12px;
    }

    @media (max-width:900px){
      .grid2,.grid3,.grid4,.formatGrid,.miniMenu{grid-template-columns:1fr}
      .heroTop{align-items:flex-start}
      .logoBox{width:72px;height:72px}
      .summaryBar{padding:12px}
    }
  </style>
</head>

              React.createElement("div", { className: "pill" }, toFormat)
            )
          }
        ),

        step === 5 && section === "dekselaar" && React.createElement(
          SectionDetail,
          {
            title: "Dekselaar Opzetter",
            rows: dekselaarRows,
            onBack: () => setSection(null),
            onStartOver: resetAll,
            extraToolbar: React.createElement(
              "div",
              { className: "toolbar" },
              React.createElement("div", { className: "pill" }, fromFormat),
              React.createElement("div", { className: "pill" }, toFormat)
            )
          }
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
  </script>
