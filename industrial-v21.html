<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally Ombouwen v21</title>
  <style>
    :root{
      --bg:#0b0d12;
      --bg2:#12161d;
      --card:#171c24;
      --line:rgba(255,255,255,.08);
      --line2:rgba(216,180,138,.18);
      --text:#f5f7fb;
      --muted:rgba(255,255,255,.58);
      --gold:#d8b48a;
      --blue:#67b8ff;
      --green:#59d48a;
      --red:#ff8e7b;
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,var(--bg),#0e131a 40%,#0b0d12 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body{min-height:100vh}
    button,select{font:inherit}
    img{max-width:100%;display:block}
    [hidden]{display:none!important}

    .app{
      max-width:1150px;
      margin:0 auto;
      padding:20px 14px 48px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line2);
      background:
        radial-gradient(circle at top right, rgba(216,180,138,.14), transparent 30%),
        radial-gradient(circle at top left, rgba(103,184,255,.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:36px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:16px;
    }

    .heroTop{
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brandWrap{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:88px;
      height:88px;
      border-radius:24px;
      background:#0a0c10;
      border:1px solid rgba(216,180,138,.16);
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .logoBox img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .eyebrow{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:rgba(216,180,138,.72);
      font-weight:800;
      margin-bottom:6px;
    }

    h1,h2,h3,h4,p{margin:0}

    h1{
      font-size:clamp(30px,5vw,52px);
      line-height:.95;
      letter-spacing:-.05em;
      font-weight:900;
    }

    .heroSub{
      margin-top:10px;
      max-width:760px;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }

    .statusPill{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      border-radius:999px;
      padding:12px 16px;
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .statusDot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(89,212,138,.12);
      flex:0 0 auto;
    }

    .summaryBar{
      margin-top:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:24px;
      padding:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .summaryNode,.summaryArrow{
      border-radius:18px;
      padding:12px 14px;
      font-weight:800;
    }

    .summaryNode{
      background:#0f1319;
      border:1px solid rgba(255,255,255,.06);
    }

    .summaryNode.active{
      color:#111;
      background:var(--gold);
      border-color:transparent;
    }

    .summaryArrow{
      color:rgba(255,255,255,.35);
      padding-left:4px;
      padding-right:4px;
    }

    .stepTrack{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
      margin:18px 0 16px;
    }

    .stepDot{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .stepDot.active{
      background:linear-gradient(90deg,var(--gold),#f0d2af);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .sectionHead{
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .sectionTitle{
      font-size:clamp(26px,4vw,38px);
      font-weight:900;
      letter-spacing:-.04em;
    }

    .sectionSub{
      margin-top:8px;
      color:var(--muted);
      max-width:760px;
      line-height:1.5;
      font-size:15px;
    }

    .backBtn,.ghostBtn,.primaryBtn,.tileBtn,.toggleBtn{
      border:none;
      cursor:pointer;
      transition:.18s ease;
    }

    .backBtn,.ghostBtn,.toggleBtn{
      background:rgba(255,255,255,.04);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:11px 15px;
      font-weight:700;
    }

    .primaryBtn{
      background:linear-gradient(180deg, #efd2b2, var(--gold));
      color:#111;
      border-radius:999px;
      padding:14px 20px;
      font-weight:900;
      box-shadow:0 14px 32px rgba(216,180,138,.22);
    }

    .primaryBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .grid2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .tileBtn{
      text-align:left;
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:18px;
      color:var(--text);
      min-height:170px;
    }

    .tileBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,138,.25);
    }

    .tileBtn.selected{
      border-color:rgba(216,180,138,.55);
      background:linear-gradient(180deg, rgba(216,180,138,.14), rgba(216,180,138,.06));
      box-shadow:0 0 0 1px rgba(216,180,138,.15) inset;
    }

    .tileIcon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(216,180,138,.12);
      border:1px solid rgba(216,180,138,.14);
      font-size:28px;
      margin-bottom:16px;
    }

    .tileTitle{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .tileMeta{
      margin-top:10px;
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
    }

    .formatGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:8px;
    }

    .formatBtn{
      border:none;
      cursor:pointer;
      border-radius:28px;
      padding:24px 18px;
      text-align:left;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--text);
      min-height:120px;
    }

    .formatBtn.selected{
      background:rgba(216,180,138,.12);
      border-color:rgba(216,180,138,.45);
    }

    .formatKicker{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:11px;
      font-weight:800;
    }

    .formatValue{
      margin-top:8px;
      font-size:34px;
      font-weight:900;
      letter-spacing:-.05em;
    }
.finalTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
    }

    .groups{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .groups3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .groupCard{
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:16px;
    }

    .groupHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .groupTitle{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .soon{
      color:#111;
      background:var(--gold);
      border-radius:999px;
      padding:7px 10px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .valueList{
      display:grid;
      gap:10px;
    }

    .valueRow{
      border-radius:20px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.18);
      padding:14px;
    }

    .valueLabel{
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
    }

    .valueFlow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .valueBox{
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
    }

    .valueBox.new{
      background:rgba(103,184,255,.12);
      color:#cfe8ff;
      border-color:rgba(103,184,255,.22);
    }

    .valueArrow{
      color:rgba(255,255,255,.35);
      font-weight:900;
    }

    .singleValue{
      margin-top:10px;
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      display:inline-block;
    }

    .placeholder{
      border-radius:20px;
      border:1px dashed rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      padding:18px;
      color:var(--muted);
      line-height:1.5;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .toggleBtn.active{
      background:rgba(103,184,255,.14);
      color:#dff1ff;
      border-color:rgba(103,184,255,.28);
    }

    .stepPlayer{
      border-radius:28px;
      border:1px solid rgba(103,184,255,.24);
      background:linear-gradient(180deg, rgba(103,184,255,.08), rgba(103,184,255,.04));
      padding:16px;
      margin-bottom:14px;
    }

    .progressText{
      color:var(--muted);
      font-size:13px;
      margin-bottom:10px;
    }

    .progressBar{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      margin-bottom:14px;
    }

    .progressFill{
      height:100%;
      background:linear-gradient(90deg, var(--blue), #a5d4ff);
      border-radius:999px;
    }

    .stepPlayerCard{
      border-radius:22px;
      background:rgba(0,0,0,.2);
      border:1px solid rgba(255,255,255,.06);
      padding:16px;
    }

    .stepPlayerLabel{
      font-size:14px;
      color:var(--muted);
      margin-bottom:12px;
    }

    .playerControls{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .emptyNote{
      color:var(--muted);
      padding:18px;
      border:1px dashed rgba(255,255,255,.1);
      border-radius:20px;
      background:rgba(0,0,0,.12);
    }

    .bottomBar{
      position:sticky;
      bottom:10px;
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(11,13,18,.72);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:12px;
    }

    @media (max-width:900px){
      .grid3,.grid2,.groups,.groups3,.formatGrid{grid-template-columns:1fr}
      .heroTop{align-items:flex-start}
      .logoBox{width:72px;height:72px}
      .summaryBar{padding:12px}
    }
  </style>
</head>

        "NR19 Formaat": "4"
      },
      "5x5": {
        "NR2 Magazijn breedte links": "301",
        "NR4 Zuigerbalk": "10",
        "NR8 Planobreedte": "495.5",
        "NR18 Lijmkop houder": "150",
        "NR19 Formaat": "5"
      },
      "5x6": {
        "NR2 Magazijn breedte links": "510",
        "NR4 Zuigerbalk": "11",
        "NR8 Planobreedte": "507",
        "NR18 Lijmkop houder": "150",
        "NR19 Formaat": "3"
      },
      "3x6": {
        "NR2 Magazijn breedte links": "502",
        "NR4 Zuigerbalk": "110",
        "NR8 Planobreedte": "505",
        "NR18 Lijmkop houder": "150",
        "NR19 Formaat": "3A"
      }
    };

    function biscuitLabel(id){
      return BISCUITS.find(b => b.id === id)?.label || "";
    }

    function formatsForBiscuit(id){
      return BISCUITS.find(b => b.id === id)?.formats || [];
    }

    function objectToRows(obj){
      return Object.entries(obj || {});
    }

    function buildFlowRows(fromObj, toObj){
      const keys = Array.from(new Set([
        ...Object.keys(fromObj || {}),
        ...Object.keys(toObj || {})
      ]));
      return keys.map(key => [key, fromObj?.[key] ?? "—", toObj?.[key] ?? "—"]);
    }

    function filterRows(rows, changesOnly){
      if (!changesOnly) return rows;
      return rows.filter(row => row[1] !== row[2]);
    }

    function StepDots({ step }){
      return React.createElement(
        "div",
        { className: "stepTrack" },
        [1,2,3,4,5,6].map((n) =>
          React.createElement("div", {
            key: n,
            className: "stepDot" + (step >= n ? " active" : "")
          })
        )
      );
    }

    function BiscuitTile({ biscuit, selected, onClick }){
      return React.createElement(
        "button",
        { className: "tileBtn" + (selected ? " selected" : ""), onClick: onClick },
        React.createElement("div", { className: "tileIcon" }, biscuit.icon),
        React.createElement("div", { className: "tileTitle" }, biscuit.label),
        React.createElement("div", { className: "tileMeta" }, "Formats: " + biscuit.formats.join(" • "))
      );
    }

    function ValueGroup({ title, rows, soon=false, mode="single" }){
      return React.createElement(
        "div",
        { className: "groupCard" },
        React.createElement(
          "div",
          { className: "groupHead" },
          React.createElement("div", { className: "groupTitle" }, title),
          soon ? React.createElement("div", { className: "soon" }, "Later") : null
        ),
        soon
          ? React.createElement("div", { className: "placeholder" }, "Values will be added later.")
          : rows.length === 0
            ? React.createElement("div", { className: "emptyNote" }, "No rows to show in this mode.")
            : React.createElement(
                "div",
                { className: "valueList" },
                rows.map((row, i) =>
                  React.createElement(
                    "div",
                    { className: "valueRow", key: i },
                    React.createElement("div", { className: "valueLabel" }, row[0]),
                    mode === "flow"
                      ? React.createElement(
                          "div",
                          { className: "valueFlow" },
                          React.createElement("div", { className: "valueBox" }, row[1]),
                          React.createElement("div", { className: "valueArrow" }, "→"),
                          React.createElement("div", { className: "valueBox new" }, row[2])
                        )
                      : React.createElement("div", { className: "singleValue" }, row[1])
                  )
                )
              )
      );
    }

    function StepPlayer({ rows, index, setIndex, onClose }){
      const total = rows.length;
      const current = rows[index];

      if (!total || !current){
        return React.createElement("div", { className: "emptyNote" }, "No changes available for step-by-step mode.");
      }

      const progress = ((index + 1) / total) * 100;

      return React.createElement(
        "div",
        { className: "stepPlayer" },
        React.createElement("div", { className: "progressText" }, "Step " + (index + 1) + " of " + total),
        React.createElement(
          "div",
          { className: "progressBar" },
          React.createElement("div", { className: "progressFill", style: { width: progress + "%" } })
        ),
        React.createElement(
          "div",
          { className: "stepPlayerCard" },
          React.createElement("div", { className: "stepPlayerLabel" }, current[0]),
          React.createElement(
            "div",
            { className: "valueFlow" },
            React.createElement("div", { className: "valueBox" }, current[1]),
            React.createElement("div", { className: "valueArrow" }, "→"),
            React.createElement("div", { className: "valueBox new" }, current[2])
          ),
          React.createElement(
            "div",
            { className: "playerControls" },
            React.createElement(
              "button",
              {
                className: "backBtn",
                disabled: index === 0,
                onClick: function(){ if(index > 0) setIndex(index - 1); }
              },
              "Previous"
            ),
            React.createElement(
              "button",
              {
                className: "primaryBtn",
                onClick: function(){ if(index < total - 1) setIndex(index + 1); }
              },
              index < total - 1 ? "Next" : "Done"
            ),
            React.createElement("button", { className: "ghostBtn", onClick: onClose }, "Close step mode")
          )
        )
      );
    }
function App(){
      const [step, setStep] = React.useState(1);
      const [fromBiscuit, setFromBiscuit] = React.useState(null);
      const [fromFormat, setFromFormat] = React.useState(null);
      const [toBiscuit, setToBiscuit] = React.useState(null);
      const [toFormat, setToFormat] = React.useState(null);
      const [area, setArea] = React.useState(null);
      const [cavannaLine, setCavannaLine] = React.useState(null);
      const [changesOnly, setChangesOnly] = React.useState(false);
      const [stepMode, setStepMode] = React.useState(false);
      const [stepIndex, setStepIndex] = React.useState(0);

      const fromFormats = formatsForBiscuit(fromBiscuit);
      const toFormats = formatsForBiscuit(toBiscuit);

      function resetAll(){
        setStep(1);
        setFromBiscuit(null);
        setFromFormat(null);
        setToBiscuit(null);
        setToFormat(null);
        setArea(null);
        setCavannaLine(null);
        setChangesOnly(false);
        setStepMode(false);
        setStepIndex(0);
      }

      const cavannaRowsRaw = buildFlowRows(
        CAVANNA_VALUES[fromBiscuit] || {},
        CAVANNA_VALUES[toBiscuit] || {}
      );
      const cavannaRows = filterRows(cavannaRowsRaw, changesOnly);

      const robertRowsRaw = buildFlowRows(
        ROBERTPACK[fromFormat] || {},
        ROBERTPACK[toFormat] || {}
      );
      const dozenRowsRaw = buildFlowRows(
        DOZEN[fromFormat] || {},
        DOZEN[toFormat] || {}
      );
      const dekselaarRowsRaw = buildFlowRows(
        DEKSELAAR[fromFormat] || {},
        DEKSELAAR[toFormat] || {}
      );

      const robertRows = filterRows(robertRowsRaw, changesOnly);
      const dozenRows = filterRows(dozenRowsRaw, changesOnly);
      const dekselaarRows = filterRows(dekselaarRowsRaw, changesOnly);

      const activeStepRows = area === "cavanna"
        ? cavannaRows
        : [...robertRows, ...dozenRows, ...dekselaarRows];

      const summaryBar = React.createElement(
        "div",
        { className: "summaryBar" },
        React.createElement("div", { className: "summaryNode" }, fromBiscuit ? biscuitLabel(fromBiscuit) : "Current biscuit"),
        fromFormat ? React.createElement("div", { className: "summaryNode" }, fromFormat) : null,
        React.createElement("div", { className: "summaryArrow" }, "→"),
        React.createElement("div", { className: "summaryNode active" }, toBiscuit ? biscuitLabel(toBiscuit) : "Next biscuit"),
        toFormat ? React.createElement("div", { className: "summaryNode active" }, toFormat) : null,
        area ? React.createElement("div", { className: "summaryArrow" }, "•") : null,
        area ? React.createElement("div", { className: "summaryNode" }, area === "cavanna" ? "Cavanna" : "Packing side") : null
      );

      return React.createElement(
        "div",
        { className: "app" },

        React.createElement(
          "div",
          { className: "hero" },
          React.createElement(
            "div",
            { className: "heroTop" },
            React.createElement(
              "div",
              { className: "brandWrap" },
              React.createElement(
                "div",
                { className: "logoBox" },
                React.createElement("img", {
                  src: "./pally-logo.png",
                  alt: "Pally Biscuits logo",
                  onError: function(e){ e.currentTarget.style.display = "none"; }
                })
              ),
              React.createElement(
                "div",
                null,
                React.createElement("div", { className: "eyebrow" }, "Pally Biscuits"),
                React.createElement("h1", null, "Ombouwen"),
                React.createElement(
                  "div",
                  { className: "heroSub" },
                  "v21 with current format, next format, full from → to logic, changes-only mode and step-by-step ombouw mode."
                )
              )
            ),
            React.createElement(
              "div",
              { className: "statusPill" },
              React.createElement("div", { className: "statusDot" }),
              React.createElement("span", null, "v21 • ombouw assistant")
            )
          ),
          summaryBar
        ),

        React.createElement(StepDots, { step }),

        step === 1 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "sectionHead" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Step 1"),
              React.createElement("div", { className: "sectionTitle" }, "What biscuit is running now?"),
              React.createElement("div", { className: "sectionSub" }, "Choose the biscuit that is currently running.")
            )
          ),
          React.createElement("div", { className: "grid3" },
            BISCUITS.map((b) =>
              React.createElement(BiscuitTile, {
                key: b.id,
                biscuit: b,
                selected: fromBiscuit === b.id,
                onClick: function(){
                  setFromBiscuit(b.id);
                  setFromFormat(null);
                }
              })
            )
          ),
          React.createElement("div", { className: "bottomBar" },
            React.createElement("button", {
              className: "primaryBtn",
              disabled: !fromBiscuit,
              onClick: function(){ setStep(2); }
            }, "Continue")
          )
        ) : null,

        step === 2 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "sectionHead" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Step 2"),
              React.createElement("div", { className: "sectionTitle" }, "What format is running now?"),
              React.createElement("div", { className: "sectionSub" }, "Formats depend on the current biscuit.")
            ),
            React.createElement("button", { className: "backBtn", onClick: function(){ setStep(1); } }, "Back")
          ),
          React.createElement("div", { className: "formatGrid" },
            fromFormats.map((f) =>
              React.createElement("button", {
                key: f,
                className: "formatBtn" + (fromFormat === f ? " selected" : ""),
                onClick: function(){ setFromFormat(f); }
              },
                React.createElement("div", { className: "formatKicker" }, "Current format"),
                React.createElement("div", { className: "formatValue" }, f)
              )
            )
          ),
          React.createElement("div", { className: "bottomBar" },
            React.createElement("button", { className: "ghostBtn", onClick: resetAll }, "Start over"),
            React.createElement("button", {
              className: "primaryBtn",
              disabled: !fromFormat,
              onClick: function(){ setStep(3); }
            }, "Continue")
          )
        ) : null,

        step === 3 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "sectionHead" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Step 3"),
              React.createElement("div", { className: "sectionTitle" }, "What biscuit are we changing to?"),
              React.createElement("div", { className: "sectionSub" }, "Choose the next biscuit.")
            ),
            React.createElement("button", { className: "backBtn", onClick: function(){ setStep(2); } }, "Back")
          ),
          React.createElement("div", { className: "grid3" },
            BISCUITS.map((b) =>
              React.createElement(BiscuitTile, {
                key: b.id,
                biscuit: b,
                selected: toBiscuit === b.id,
                onClick: function(){
                  setToBiscuit(b.id);
                  setToFormat(null);
                }
              })
            )
          ),
          React.createElement("div", { className: "bottomBar" },
            React.createElement("button", { className: "ghostBtn", onClick: resetAll }, "Start over"),
            React.createElement("button", {
              className: "primaryBtn",
              disabled: !toBiscuit,
              onClick: function(){ setStep(4); }
            }, "Continue")
          )
        ) : null,

        step === 4 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "sectionHead" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Step 4"),
              React.createElement("div", { className: "sectionTitle" }, "What format are we changing to?"),
              React.createElement("div", { className: "sectionSub" }, "Formats depend on the next biscuit.")
            ),
            React.createElement("button", { className: "backBtn", onClick: function(){ setStep(3); } }, "Back")
          ),
          React.createElement("div", { className: "formatGrid" },
            toFormats.map((f) =>
              React.createElement("button", {
                key: f,
                className: "formatBtn" + (toFormat === f ? " selected" : ""),
                onClick: function(){ setToFormat(f); }
              },
                React.createElement("div", { className: "formatKicker" }, "Next format"),
                React.createElement("div", { className: "formatValue" }, f)
              )
            )
          ),
          React.createElement("div", { className: "bottomBar" },
            React.createElement("button", { className: "ghostBtn", onClick: resetAll }, "Start over"),
            React.createElement("button", {
              className: "primaryBtn",
              disabled: !toFormat,
              onClick: function(){ setStep(5); }
            }, "Continue")
          )
        ) : null,

        step === 5 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "sectionHead" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Step 5"),
              React.createElement("div", { className: "sectionTitle" }, "Choose area"),
              React.createElement("div", { className: "sectionSub" }, "Open Cavanna or the packing side.")
            ),
            React.createElement("button", { className: "backBtn", onClick: function(){ setStep(4); } }, "Back")
          ),
          React.createElement("div", { className: "grid2" },
            React.createElement("button", {
              className: "tileBtn" + (area === "cavanna" ? " selected" : ""),
              onClick: function(){ setArea("cavanna"); setCavannaLine("Cavanna 9"); setStep(6); }
            },
              React.createElement("div", { className: "tileIcon" }, "⚙️"),
              React.createElement("div", { className: "tileTitle" }, "Cavanna"),
              React.createElement("div", { className: "tileMeta" }, "From → to based on current biscuit and next biscuit")
            ),
            React.createElement("button", {
              className: "tileBtn" + (area === "packing" ? " selected" : ""),
              onClick: function(){ setArea("packing"); setStep(6); }
            },
              React.createElement("div", { className: "tileIcon" }, "📦"),
              React.createElement("div", { className: "tileTitle" }, "Robert Pack + Dozen Opzetter + Dekselaar Opzetter"),
              React.createElement("div", { className: "tileMeta" }, "From → to based on current format and next format")
            )
          )
        ) : null,

        step === 6 ? React.createElement(
          "div",
          { className: "card" },
          React.createElement("div", { className: "finalTop" },
            React.createElement("div", null,
              React.createElement("div", { className: "eyebrow" }, "Final ombouwen"),
              React.createElement("div", { className: "sectionTitle" }, area === "cavanna" ? (cavannaLine || "Cavanna 9") : "Packing side"),
              React.createElement("div", { className: "sectionSub" },
                biscuitLabel(fromBiscuit) + " " + fromFormat + " → " + biscuitLabel(toBiscuit) + " " + toFormat
              )
            ),
            React.createElement("div", { className: "row" },
              React.createElement("button", { className: "backBtn", onClick: function(){ setStep(5); } }, "Back"),
              React.createElement("button", { className: "ghostBtn", onClick: function(){ window.print(); } }, "Print"),
              React.createElement("button", { className: "primaryBtn", onClick: resetAll }, "Start over")
            )
          ),

          React.createElement("div", { className: "row", style: { marginBottom: "14px" } },
            React.createElement("div", { className: "pill" }, biscuitLabel(fromBiscuit) + " " + fromFormat),
            React.createElement("div", { className: "pill" }, biscuitLabel(toBiscuit) + " " + toFormat),
            React.createElement("div", { className: "pill" }, area === "cavanna" ? "Cavanna 9" : "Packing side")
          ),

          React.createElement("div", { className: "toolbar" },
            React.createElement("button", {
              className: "toggleBtn" + (!changesOnly ? " active" : ""),
              onClick: function(){ setChangesOnly(false); setStepMode(false); setStepIndex(0); }
            }, "Show all"),
            React.createElement("button", {
              className: "toggleBtn" + (changesOnly ? " active" : ""),
              onClick: function(){ setChangesOnly(true); setStepMode(false); setStepIndex(0); }
            }, "Changes only"),
            React.createElement("button", {
              className: "toggleBtn" + (stepMode ? " active" : ""),
              onClick: function(){ setStepMode(true); setStepIndex(0); }
            }, "Start Ombouw")
          ),

          stepMode
            ? React.createElement(StepPlayer, {
                rows: activeStepRows,
                index: stepIndex,
                setIndex: setStepIndex,
                onClose: function(){ setStepMode(false); }
              })
            : null,

          area === "cavanna"
            ? React.createElement("div", { className: "groups" },
                React.createElement(ValueGroup, {
                  title: "Cavanna 9 values",
                  rows: cavannaRows,
                  mode: "flow"
                }),
                React.createElement(ValueGroup, {
                  title: "Cavanna 10",
                  rows: [],
                  soon: true
                })
              )
            : React.createElement("div", { className: "groups3" },
                React.createElement(ValueGroup, {
                  title: "Robert Pack",
                  rows: robertRows,
                  mode: "flow"
                }),
                React.createElement(ValueGroup, {
                  title: "Dozen Opzetter",
                  rows: dozenRows,
                  mode: "flow"
                }),
                React.createElement(ValueGroup, {
                  title: "Dekselaar Opzetter",
                  rows: dekselaarRows,
                  mode: "flow"
                })
              )
        ) : null
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
  </script>
