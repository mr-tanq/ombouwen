<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally Ombouwen v20</title>
  <style>
    :root{
      --bg:#0b0d12;
      --bg2:#12161d;
      --card:#171c24;
      --card2:#1d2430;
      --line:rgba(255,255,255,.08);
      --line2:rgba(216,180,138,.18);
      --text:#f5f7fb;
      --muted:rgba(255,255,255,.58);
      --soft:rgba(255,255,255,.08);
      --gold:#d8b48a;
      --gold2:#b89570;
      --blue:#67b8ff;
      --green:#59d48a;
      --red:#ff8e7b;
      --shadow:0 24px 70px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,var(--bg),#0e131a 40%,#0b0d12 100%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body{min-height:100vh}
    button,select{font:inherit}
    img{max-width:100%;display:block}

    .app{
      max-width:1100px;
      margin:0 auto;
      padding:20px 14px 48px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line2);
      background:
        radial-gradient(circle at top right, rgba(216,180,138,.14), transparent 30%),
        radial-gradient(circle at top left, rgba(103,184,255,.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:36px;
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:16px;
    }

    .heroTop{
      display:flex;
      gap:18px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brandWrap{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:88px;
      height:88px;
      border-radius:24px;
      background:#0a0c10;
      border:1px solid rgba(216,180,138,.16);
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .logoBox img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .eyebrow{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:rgba(216,180,138,.72);
      font-weight:800;
      margin-bottom:6px;
    }

    h1,h2,h3,h4,p{margin:0}

    h1{
      font-size:clamp(30px,5vw,52px);
      line-height:.95;
      letter-spacing:-.05em;
      font-weight:900;
    }

    .heroSub{
      margin-top:10px;
      max-width:760px;
      color:var(--muted);
      line-height:1.5;
      font-size:15px;
    }

    .statusPill{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      border-radius:999px;
      padding:12px 16px;
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .statusDot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 6px rgba(89,212,138,.12);
      flex:0 0 auto;
    }

    .summaryBar{
      margin-top:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:24px;
      padding:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .summaryNode,.summaryArrow{
      border-radius:18px;
      padding:12px 14px;
      font-weight:800;
    }

    .summaryNode{
      background:#0f1319;
      border:1px solid rgba(255,255,255,.06);
    }

    .summaryNode.active{
      color:#111;
      background:var(--gold);
      border-color:transparent;
    }

    .summaryArrow{
      color:rgba(255,255,255,.35);
      padding-left:4px;
      padding-right:4px;
    }

    .stepTrack{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      margin:18px 0 16px;
    }

    .stepDot{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .stepDot.active{
      background:linear-gradient(90deg,var(--gold),#f0d2af);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .sectionHead{
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .sectionTitle{
      font-size:clamp(26px,4vw,38px);
      font-weight:900;
      letter-spacing:-.04em;
    }

    .sectionSub{
      margin-top:8px;
      color:var(--muted);
      max-width:760px;
      line-height:1.5;
      font-size:15px;
    }

    .backBtn,.ghostBtn,.primaryBtn,.tileBtn{
      border:none;
      cursor:pointer;
      transition:.18s ease;
    }

    .backBtn,.ghostBtn{
      background:rgba(255,255,255,.04);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:999px;
      padding:11px 15px;
      font-weight:700;
    }

    .primaryBtn{
      background:linear-gradient(180deg, #efd2b2, var(--gold));
      color:#111;
      border-radius:999px;
      padding:14px 20px;
      font-weight:900;
      box-shadow:0 14px 32px rgba(216,180,138,.22);
    }

    .primaryBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .grid3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .grid2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .tileBtn{
      text-align:left;
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:18px;
      color:var(--text);
      min-height:170px;
    }

    .tileBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(216,180,138,.25);
    }

    .tileBtn.selected{
      border-color:rgba(216,180,138,.55);
      background:linear-gradient(180deg, rgba(216,180,138,.14), rgba(216,180,138,.06));
      box-shadow:0 0 0 1px rgba(216,180,138,.15) inset;
    }

    .tileIcon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(216,180,138,.12);
      border:1px solid rgba(216,180,138,.14);
      font-size:28px;
      margin-bottom:16px;
    }

    .tileTitle{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .tileMeta{
      margin-top:10px;
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
    }
    .formatGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:8px;
    }

    .formatBtn{
      border:none;
      cursor:pointer;
      border-radius:28px;
      padding:24px 18px;
      text-align:left;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--text);
      min-height:120px;
    }

    .formatBtn.selected{
      background:rgba(216,180,138,.12);
      border-color:rgba(216,180,138,.45);
    }

    .formatKicker{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:11px;
      font-weight:800;
    }

    .formatValue{
      margin-top:8px;
      font-size:34px;
      font-weight:900;
      letter-spacing:-.05em;
    }

    .finalTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
    }

    .groups{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .groups3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .groupCard{
      border-radius:28px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:16px;
    }

    .groupHead{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .groupTitle{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .soon{
      color:#111;
      background:var(--gold);
      border-radius:999px;
      padding:7px 10px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .valueList{
      display:grid;
      gap:10px;
    }

    .valueRow{
      border-radius:20px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.18);
      padding:14px;
    }

    .valueLabel{
      font-size:13px;
      color:var(--muted);
      line-height:1.35;
    }

    .valueFlow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .valueBox{
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
    }

    .valueBox.new{
      background:rgba(103,184,255,.12);
      color:#cfe8ff;
      border-color:rgba(103,184,255,.22);
    }

    .valueArrow{
      color:rgba(255,255,255,.35);
      font-weight:900;
    }

    .singleValue{
      margin-top:10px;
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      display:inline-block;
    }

    .placeholder{
      border-radius:20px;
      border:1px dashed rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      padding:18px;
      color:var(--muted);
      line-height:1.5;
    }

    .bottomBar{
      position:sticky;
      bottom:10px;
      margin-top:18px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      background:rgba(11,13,18,.72);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--line);
      border-radius:24px;
      padding:12px;
    }

    @media (max-width:900px){
      .grid3,.grid2,.groups,.groups3,.formatGrid{grid-template-columns:1fr}
      .heroTop{align-items:flex-start}
      .logoBox{width:72px;height:72px}
      .summaryBar{padding:12px}
    }
  </style>
</head>

            key: n,
            className: "stepDot" + (step >= n ? " active" : "")

        React.createElement("div", { className: "tileMeta" }, "Formats: " + biscuit.formats.join(" • "))

            { className: "bottomBar" },

            React.createElement("div", { className: "pill" }, cavannaLine || "Cavanna 9")

          React.createElement(

            { className: "groups" },

              React.createElement(
                "div",

              { className: "row" },

            { className: "row", style: { marginBottom: "14px" } },

            React.createElement("div", { className: "pill" }, format),
            React.createElement("div", { className: "pill" }, "Robert Pack + Dozen + Dekselaar")

          React.createElement(
            "div",
            { className: "groups3" },
            React.createElement(ValueGroup, { title: "Robert Pack", rows: ROBERTPACK[format] || [] }),
            React.createElement(ValueGroup, { title: "Dozen Opzetter", rows: DOZEN[format] || [] }),
            React.createElement(ValueGroup, { title: "Dekselaar Opzetter", rows: DEKSELAAR[format] || [] })
          )
        ) : null

    }

    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
