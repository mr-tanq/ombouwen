<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pally · Ombouwen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --black:#000000;
      --surface-1:rgba(255,255,255,.035);
      --surface-2:rgba(255,255,255,.06);
      --surface-3:rgba(255,255,255,.09);
      --border:rgba(255,255,255,.08);
      --border-2:rgba(255,255,255,.13);
      --border-3:rgba(255,255,255,.19);

      --amber:#f59e0b;
      --amber-glow:rgba(245,158,11,.28);
      --blue:#3b82f6;
      --blue-glow:rgba(59,130,246,.28);
      --green:#22c55e;
      --green-glow:rgba(34,197,94,.35);
      --red:#ef4444;
      --red-glow:rgba(239,68,68,.28);
      --slate:#64748b;

      --text:#ffffff;
      --text-2:#a7b4c6;
      --text-3:#5f728a;

      --mono:'Geist Mono', monospace;
      --sans:'Geist', system-ui, sans-serif;

      --radius-sm:8px;
      --radius-md:12px;
      --radius-lg:14px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100vh;
      background:var(--black);
      color:var(--text);
      font-family:var(--sans);
      font-size:15px;
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    button{font:inherit;cursor:pointer;border:none;background:none}
    img{max-width:100%;display:block}

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.03), transparent 22%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.025), transparent 18%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,.006) 2px,
          rgba(255,255,255,.006) 4px
        );
    }

    .shell{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-rows:auto 1fr;
      min-height:100vh;
    }

    .topbar{
      height:62px;
      padding:0 32px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:200;
      background:rgba(0,0,0,.9);
      backdrop-filter:blur(20px) saturate(1.6);
      -webkit-backdrop-filter:blur(20px) saturate(1.6);
      border-bottom:1px solid var(--border);
    }
    .topbar-brand{display:flex;align-items:center;gap:14px}
    .topbar-logo{
      width:34px;height:34px;
      border-radius:8px;
      border:1px solid var(--border-2);
      background:var(--surface-2);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      flex-shrink:0;
    }
    .topbar-name{
      font-family:var(--mono);
      font-size:13px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .topbar-sep{width:1px;height:18px;background:var(--border-2)}
    .topbar-module{
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--text-3);
    }
    .topbar-right{display:flex;align-items:center;gap:16px}
    .sys-readout{
      font-family:var(--mono);
      font-size:11px;
      color:var(--text-3);
      letter-spacing:.08em;
    }
    .status-pill{
      display:flex;align-items:center;gap:8px;
      padding:6px 12px;
      border-radius:20px;
      border:1px solid rgba(34,197,94,.22);
      background:rgba(34,197,94,.07);
    }
    .status-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--green);
      box-shadow:0 0 8px var(--green-glow);
      animation:pulse 3s ease-in-out infinite;
    }
    .status-label{
      font-family:var(--mono);
      font-size:10px;
      color:var(--green);
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .body{display:grid;grid-template-columns:280px 1fr}

    .sidebar{
      border-right:1px solid var(--border);
      background:rgba(0,0,0,.56);
      padding:28px 0;
      min-height:calc(100vh - 62px);
      position:sticky;
      top:62px;
      align-self:start;
      max-height:calc(100vh - 62px);
      overflow-y:auto;
    }
    .sidebar::-webkit-scrollbar{width:2px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}
    .sidebar-section{padding:0 18px 22px}
    .sidebar-label{
      font-family:var(--mono);
      font-size:10px;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--text-3);
      margin-bottom:10px;
    }
    .flow-card{
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
      background:var(--surface-1);
    }
    .flow-card-row{display:grid;grid-template-columns:1fr auto 1fr}
    .flow-block{padding:12px 13px}
    .flow-block + .flow-block{border-left:1px solid var(--border)}
    .flow-block-label{
      font-family:var(--mono);
      font-size:8px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--text-3);
      margin-bottom:4px;
    }
    .flow-block-value{
      font-family:var(--mono);
      font-size:12px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .flow-block-value.dim{color:var(--text-3);font-weight:400}
    .flow-block-value.amber{color:var(--amber)}
    .flow-arrow-col{
      display:flex;align-items:center;justify-content:center;
      padding:0 10px;
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
      color:var(--text-3);
      font-family:var(--mono);
      font-size:11px;
      background:var(--surface-1);
    }
    .section-tag{
      margin-top:8px;
      display:flex;align-items:center;gap:8px;
      padding:6px 11px;
      border:1px solid var(--border);
      border-radius:7px;
      background:var(--surface-1);
      font-family:var(--mono);
      font-size:10px;
      color:var(--text-3);
      letter-spacing:.05em;
    }
    .tag-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 6px var(--amber-glow);
      flex-shrink:0;
    }
    .sidebar-sep{height:1px;background:var(--border);margin:0 18px 22px}
    .step-list{display:flex;flex-direction:column;gap:4px;padding:0 18px}
    .step-item{
      display:flex;align-items:center;gap:12px;
      padding:10px 11px;
      border-radius:10px;
      border:1px solid transparent;
      transition:all .18s ease;
    }
    .step-item.done{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.12)}
    .step-item.active{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.14)}
    .step-item.check-active{background:rgba(6,182,212,.05);border-color:rgba(6,182,212,.16)}
    .step-num{
      width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      border-radius:6px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      color:var(--text-3);
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
    }
    .step-item.done .step-num{
      background:rgba(34,197,94,.15);
      border-color:rgba(34,197,94,.3);
      color:var(--green);
    }
    .step-item.active .step-num{
      background:rgba(245,158,11,.12);
      border-color:rgba(245,158,11,.25);
      color:var(--amber);
    }
    .step-item.check-active .step-num{
      background:rgba(6,182,212,.1);
      border-color:rgba(6,182,212,.28);
      color:#06b6d4;
      box-shadow:0 0 8px rgba(6,182,212,.18);
    }
    .step-text{font-size:13px;font-weight:500;color:var(--text-3)}
    .step-item.done .step-text{color:rgba(34,197,94,.78)}
    .step-item.active .step-text{color:var(--text)}
    .step-item.check-active .step-text{color:rgba(6,182,212,.94)}

    .main{display:flex;flex-direction:column;min-width:0}
    .breadcrumb{
      height:40px;
      display:flex;align-items:center;gap:8px;
      padding:0 32px;
      border-bottom:1px solid var(--border);
      background:rgba(0,0,0,.42);
    }
    .bc-item{
      font-family:var(--mono);
      font-size:10px;
      color:var(--text-3);
      letter-spacing:.08em;
    }
    .bc-item.active{color:rgba(255,255,255,.66)}
    .bc-sep{
      font-family:var(--mono);
      font-size:10px;
      color:var(--text-3);
      opacity:.45;
    }

    .content{
      flex:1;
      padding:40px 40px 58px;
      animation:fadeUp .22s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .content-header{margin-bottom:28px}
    .content-title{
      font-size:28px;
      line-height:1.12;
      letter-spacing:-.04em;
      font-weight:750;
      margin-bottom:7px;
    }
    .content-sub{
      font-size:14px;
      line-height:1.7;
      color:var(--text-2);
      max-width:580px;
    }

    .panel-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:24px;
    }
    .panel{
      position:relative;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:13px;
      background:var(--surface-1);
      backdrop-filter:blur(10px);
      transition:border-color .18s ease;
    }
    .panel::before{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);
      pointer-events:none;
    }
    .panel:hover{border-color:var(--border-2)}
    .panel-header{
      padding:13px 18px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.015);
    }
    .panel-title{
      font-family:var(--mono);
      font-size:10px;
      font-weight:700;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(255,255,255,.38);
    }
    .panel-badge{
      margin-left:auto;
      display:flex;align-items:center;gap:5px;
      padding:4px 10px;
      border-radius:20px;
      font-family:var(--mono);
      font-size:8px;
      font-weight:700;
      letter-spacing:.12em;
      background:rgba(34,197,94,.1);
      border:1px solid rgba(34,197,94,.2);
      color:var(--green);
    }
    .panel-badge::before{
      content:"";
      width:4px;height:4px;border-radius:50%;
      background:var(--green);
      flex-shrink:0;
    }
    .panel-body{padding:20px}

    .field-label{
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--text-3);
      margin-bottom:10px;
      margin-top:17px;
    }
    .field-label:first-child{margin-top:0}

    .chipRow,.chip-row{display:flex;flex-wrap:wrap;gap:8px}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:9px 14px;
      border-radius:8px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      color:var(--text-2);
      font-size:13px;
      font-weight:550;
      transition:all .14s cubic-bezier(.16,1,.3,1);
    }
    .chip:hover{
      background:var(--surface-3);
      border-color:var(--border-3);
      color:var(--text);
      transform:translateY(-1px);
    }
    .chip.active{
      background:rgba(245,158,11,.09);
      border-color:rgba(245,158,11,.28);
      color:var(--amber);
      box-shadow:0 0 0 3px rgba(245,158,11,.07);
    }
    .chipInner{display:inline-flex;align-items:center;gap:8px}

    .actions-bar{
      display:flex;align-items:center;justify-content:flex-end;gap:10px;
      padding-top:22px;
      border-top:1px solid var(--border);
    }
    .btn-ghost{
      padding:10px 18px;
      border-radius:9px;
      border:1px solid var(--border-2);
      background:transparent;
      color:var(--text-2);
      font-size:14px;
      font-weight:500;
      transition:all .14s ease;
    }
    .btn-ghost:hover{
      background:var(--surface-2);
      color:var(--text);
      border-color:var(--border-3);
    }
    .btn-ghost:disabled{opacity:.25;cursor:not-allowed}
    .btn-primary{
      padding:10px 21px;
      border-radius:9px;
      background:var(--amber);
      color:#000;
      font-size:14px;
      font-weight:750;
      transition:all .16s cubic-bezier(.16,1,.3,1);
    }
    .btn-primary:hover:not(:disabled){
      background:#fbbf24;
      box-shadow:0 0 22px var(--amber-glow);
      transform:translateY(-1px);
    }
    .btn-primary:disabled{opacity:.18;cursor:not-allowed}
    .section-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .section-card{
      position:relative;
      overflow:hidden;
      min-height:132px;
      border:1px solid var(--border);
      border-radius:13px;
      background:var(--surface-1);
      padding:16px 15px 12px;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-start;
      transition:all .18s cubic-bezier(.16,1,.3,1);
      cursor:pointer;
    }
    .section-card::before{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 55%);
      pointer-events:none;
    }
    .section-card:hover{
      border-color:var(--border-3);
      background:var(--surface-2);
      transform:translateY(-2px);
      box-shadow:0 12px 34px rgba(0,0,0,.46);
    }
    .section-card-logo-wrap{
      width:100%;
      min-height:38px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }
    .section-card-logo{
      max-height:28px;
      width:auto;
      object-fit:contain;
      opacity:.95;
      filter:brightness(1.08);
    }
    .section-card-logo-fallback{
      width:34px;height:34px;
      border-radius:9px;
      border:1px solid var(--border-2);
      background:var(--surface-2);
      display:none;
      align-items:center;
      justify-content:center;
    }
    .section-card-logo-fallback svg{
      width:15px;height:15px;
      stroke:rgba(255,255,255,.3);
      fill:none;
      stroke-width:1.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .section-card-title{
      font-size:14px;
      font-weight:750;
      letter-spacing:-.02em;
      color:var(--text);
    }
    .section-card-desc{
      font-size:12px;
      color:var(--text-3);
      line-height:1.42;
    }
    .section-card-footer{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      margin-top:auto;
      padding-top:8px;
      border-top:1px solid var(--border);
    }
    .section-card-arrow{
      font-size:14px;
      color:var(--text-3);
      transition:color .14s ease, transform .14s ease;
    }
    .section-card:hover .section-card-arrow{
      color:var(--amber);
      transform:translateX(4px);
    }

    .section-header-logo{
      height:34px;
      width:auto;
      object-fit:contain;
      opacity:.95;
      filter:brightness(1.12);
    }

    .toggle-row{display:flex;gap:6px;margin-bottom:20px}
    .toggleBtn{
      display:inline-flex;align-items:center;gap:7px;
      padding:8px 14px;
      border-radius:8px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      color:var(--text-3);
      font-family:var(--mono);
      font-size:10px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      transition:all .14s ease;
    }
    .toggleBtn:hover{color:var(--text-2);background:var(--surface-2)}
    .toggleBtn.active{
      background:rgba(245,158,11,.08);
      border-color:rgba(245,158,11,.22);
      color:var(--amber);
    }

    .view-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:22px;
      gap:14px;
      flex-wrap:wrap;
    }
    .view-header-left,.view-header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .btn-back{
      width:36px;height:36px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      border-radius:8px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      color:rgba(255,255,255,.45);
      font-size:17px;
      transition:all .14s ease;
    }
    .btn-back:hover{background:var(--surface-3);color:var(--text)}
    .view-title{
      font-size:21px;
      font-weight:760;
      color:var(--text);
      letter-spacing:-.03em;
    }
    .pill{
      display:inline-flex;align-items:center;gap:7px;
      padding:5px 12px;
      border-radius:20px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      font-family:var(--mono);
      font-size:11px;
      color:var(--text-2);
    }

    .mode-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      gap:12px;
      flex-wrap:wrap;
    }
    .view-actions{display:flex;gap:6px;flex-wrap:wrap}
    .view-action-btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:8px 14px;
      border-radius:8px;
      border:1px solid var(--border-2);
      background:var(--surface-1);
      color:var(--text-3);
      font-family:var(--mono);
      font-size:10px;
      font-weight:700;
      letter-spacing:.11em;
      text-transform:uppercase;
      transition:all .14s ease;
    }
    .view-action-btn:hover{background:var(--surface-3);color:var(--text)}
    .view-action-btn.active{
      background:rgba(59,130,246,.08);
      border-color:rgba(59,130,246,.22);
      color:var(--blue);
    }
    .mode-pills{display:flex;gap:4px}
    .mode-btn{
      padding:6px 11px;
      border-radius:7px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--text-3);
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      transition:all .12s ease;
    }
    .mode-btn:hover{color:var(--text-2)}
    .mode-btn.active{
      background:var(--surface-2);
      border-color:var(--border-2);
      color:var(--text);
    }

    .value-table{
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--surface-1);
    }
    .value-table-header,
    .value-row{
      display:grid;
      grid-template-columns:minmax(180px,2fr) 150px 24px 150px;
      gap:10px;
      align-items:center;
    }
    .value-table-header{
      padding:11px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.02);
    }
    .value-table-col{
      font-family:var(--mono);
      font-size:8px;
      font-weight:700;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--text-3);
    }
    .value-table-col.center{text-align:center}
    .value-rows{display:flex;flex-direction:column}
    .value-row{
      padding:12px 18px;
      border-bottom:1px solid var(--border);
      transition:background .11s ease;
    }
    .value-row:last-child{border-bottom:none}
    .value-row:hover{background:rgba(255,255,255,.02)}
    .value-key{
      display:flex;align-items:center;gap:8px;
      min-width:0;
      padding-right:8px;
      font-size:13px;
      color:rgba(255,255,255,.72);
    }
    .value-key-text{
      white-space:normal;
      word-break:break-word;
      line-height:1.45;
    }
    .param-num{
      flex-shrink:0;
      align-self:flex-start;
      margin-top:1px;
      padding:2px 6px;
      border-radius:5px;
      border:1px solid rgba(245,158,11,.2);
      background:rgba(245,158,11,.07);
      color:var(--amber);
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
      letter-spacing:.04em;
    }
    .value-cell{
      font-family:var(--mono);
      font-size:13px;
      font-weight:550;
      color:var(--slate);
    }
    .value-cell.is-new{color:var(--blue);font-weight:650}
    .value-sep{
      text-align:center;
      color:var(--text-3);

<body>
<div id="pally-error-box" style="display:none;position:fixed;bottom:12px;left:12px;right:12px;z-index:9999;background:#1a0000;border:1px solid #ef4444;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:11px;color:#ef4444;white-space:pre-wrap;max-height:140px;overflow:auto" onclick="this.style.display='none'"></div>

<div class="shell" id="app-shell"></div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════ */
const BISCUITS = [
  { id:'richtea', label:'Rich Tea', formats:['5x6','3x6'], color:'blauw' },
  { id:'koffiekoek', label:'Koffiekoek', formats:['4x4','5x4','5x5'], color:'bruin' },
  { id:'theekokos', label:'Thee/Kokos', formats:['5x5'], color:'wit' }
];

const FILES = {
  cavanna9:'./data/cavanna9.json',
  cavanna10:'./data/cavanna10.json',
  robertpack:'./data/robertpack.json',
  dozen:'./data/dozen.json',
  dekselaar:'./data/dekselaar.json'
};

const SECTION_LOGOS = {
  cavanna:'./cavanna-logo.png',
  robertpack:'./robertpack-logo.png',
  dozen:'./dozen-logo.png',
  dekselaar:'./dekselaar-logo.png'
};

const SECTION_ICONS = {
  cavanna:`<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`,
  robertpack:`<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1"/><path d="M10 6.5h4M14 4v5"/><path d="M14 6.5c2 0 3 .5 4 2l1 2"/><path d="M19 10.5v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-4"/><rect x="7" y="16" width="10" height="5" rx="1"/><path d="M10 16v-2M14 16v-2"/></svg>`,
  dozen:`<svg viewBox="0 0 24 24" fill="none"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>`,
  dekselaar:`<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="12" width="18" height="9" rx="1"/><path d="M3 12l2.5-6h13L21 12"/><path d="M2 12h20"/><path d="M9 12V9M15 12V9"/></svg>`
};

const SECTION_DESCS = {
  cavanna:'Instellingen voor Cavanna 9 en 10',
  robertpack:'Instellingen voor RobertPack 9 en 10',
  dozen:'Instellingen voor Dozen Opzetter',
  dekselaar:'Instellingen voor Dekselaar Opzetter'
};

const COLOR_MAP = {
  rood:'#ef4444',
  grijs:'#64748b',
  bruin:'#7a4a21',
  wit:'#ffffff',
  blauw:'#3b82f6',
  zwart:'#111111',
  groen:'#22c55e'
};

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const state = {
  loading:true,
  error:'',
  data:null,
  stage:1,
  fromBiscuit:null,
  fromFormat:null,
  toBiscuit:null,
  toFormat:null,
  section:null,
  cavannaLine:'9',
  robertpackLine:'9',
  viewMode:null,
  onlyChanges:true,
  stepIndex:0
};

const checkState = {
  active:false,
  stepIndex:0,
  results:{},
  showSummary:false,
  pendingSave:null,
  saving:false,
  tab:'check',
  _finishAfterSave:false,
  remoteVersions:null,
  remoteLogboek:null,
  remoteStatus:{ versions:'idle', logboek:'idle' }
};

/* ═══════════════════════════════════════
   API CLIENT
═══════════════════════════════════════ */
async function apiSaveChange(payload){
  const res = await fetch('/api/save-change',{
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body:JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok || !data.ok){
    throw new Error((data && data.error) || 'Failed to save change.');
  }
  return data;
}

function buildApiParams(){
  return new URLSearchParams({
    section: state.section || '',
    toBiscuit: state.toBiscuit || '',
    toFormat: state.toFormat || '',
    line:
      state.section === 'cavanna' ? (state.cavannaLine || '') :
      state.section === 'robertpack' ? (state.robertpackLine || '') : ''
  });
}

async function apiFetchVersions(){
  const params = buildApiParams();
  const res = await fetch(`/api/versions?${params.toString()}`);
  const data = await res.json().catch(() => ({}));
  if(!res.ok || !data.ok){
    throw new Error((data && data.error) || 'Failed to fetch versions.');
  }
  return data.versions || [];
}

async function apiFetchLogboek(){
  const params = buildApiParams();
  const res = await fetch(`/api/logboek?${params.toString()}`);
  const data = await res.json().catch(() => ({}));
  if(!res.ok || !data.ok){
    throw new Error((data && data.error) || 'Failed to fetch logboek.');
  }
  return data.entries || [];
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function showError(msg){
  const box = document.getElementById('pally-error-box');
  if(!box) return;
  box.textContent = String(msg || 'Unknown error');
  box.style.display = 'block';
}

function escapeHtml(v){
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function biscuitLabel(id){
  const b = BISCUITS.find(x => x.id === id);
  return b ? b.label : '';
}

function formatsForBiscuit(id){
  const b = BISCUITS.find(x => x.id === id);
  return b ? (b.formats || []) : [];
}

function getBiscuitMeta(id){
  return BISCUITS.find(x => x.id === id) || null;
}

function getSectionTitle(s){
  return s === 'cavanna' ? 'Cavanna'
    : s === 'robertpack' ? 'Robert Pack'
    : s === 'dozen' ? 'Dozen Opzetter'
    : 'Dekselaar Opzetter';
}

function currentLineValue(){
  if(state.section === 'cavanna') return state.cavannaLine;
  if(state.section === 'robertpack') return state.robertpackLine;
  return '';
}

function buildStoreKey(){
  return `${state.section}|${state.toBiscuit}|${state.toFormat}|${currentLineValue()}`;
}

function nowStr(){
  return new Date().toLocaleString('nl-NL',{
    day:'2-digit',month:'short',year:'numeric',
    hour:'2-digit',minute:'2-digit'
  });
}

function loadStore(){
  try{ return JSON.parse(sessionStorage.getItem('pally_store') || '{}'); }catch{ return {}; }
}
function saveStore(store){
  try{ sessionStorage.setItem('pally_store', JSON.stringify(store)); }catch(err){ console.warn(err); }
}
function getStore(){
  const s = loadStore();
  if(!s.currentValues) s.currentValues = {};
  return s;
}

function cleanNumberToken(token){
  let s = String(token).trim();
  if(!s) return s;
  if(!/^[-+]?\d+[\.,]?\d*$/.test(s)) return s;
  const hasComma = s.includes(',');
  const hasDot = s.includes('.');
  const sep = hasComma ? ',' : (hasDot ? '.' : '');
  let parts = sep ? s.split(sep) : [s];
  let intPart = parts[0].replace(/^0+(\d)/,'$1');
  if(intPart === '') intPart = '0';
  if(parts.length === 1) return intPart;
  let decPart = parts[1].replace(/0+$/,'');
  if(decPart === '') return intPart;
  return intPart + ',' + decPart;
}

function normalizeDisplayValue(value){
  return String(value == null ? '' : value)
    .replace(/\u0392/g,'B')
    .split('/')
    .map(p => cleanNumberToken(p.trim()))
    .join(' / ');
}

function normalizeCompareValue(value){
  return normalizeDisplayValue(value).toLowerCase().replace(/\s+/g,' ').trim();
}

function isColorToken(token){
  return Object.prototype.hasOwnProperty.call(COLOR_MAP, String(token).trim().toLowerCase());
}

function renderColorDot(token){
  const name = String(token).trim().toLowerCase();
  const color = COLOR_MAP[name];
  if(!color) return '';
  return `<span class="colorDot ${name}" style="background:${color}"></span>`;
}

function renderRichValue(value){
  const norm = normalizeDisplayValue(value);
  const parts = norm.split('/').map(p => p.trim()).filter(Boolean);
  if(parts.length && parts.every(isColorToken)){
    return `<span class="richValue"><span class="colorDots">${parts.map(renderColorDot).join('')}</span></span>`;
  }
  return `<span class="richValue">${parts.map(p => isColorToken(p) ? renderColorDot(p) : `<span class="richText">${escapeHtml(p)}</span>`).join('<span class="richText">/</span>')}</span>`;
}

function renderParamKey(key){
  const m = String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
  if(!m) return `<span class="value-key-text">${escapeHtml(key)}</span>`;
  return `<span class="param-num">${escapeHtml(m[1])}</span><span class="value-key-text">${escapeHtml(m[2])}</span>`;
}

function renderPlayerLabel(key){
  const m = String(key).match(/^(\d+[A-Z]?)\s+(.+)$/);
  if(!m) return `<span>${escapeHtml(key)}</span>`;
  return `<span class="player-num">${escapeHtml(m[1])}</span><span>${escapeHtml(m[2])}</span>`;
}

function buildFlowRows(fromObj, toObj){
  const keys = Array.from(new Set([...(Object.keys(fromObj || {})), ...(Object.keys(toObj || {}))]));
  return keys.map(k => [k, fromObj && fromObj[k] != null ? fromObj[k] : '—', toObj && toObj[k] != null ? toObj[k] : '—']);
}

function filterRows(rows, onlyChanges){
  return onlyChanges ? rows.filter(r => normalizeCompareValue(r[1]) !== normalizeCompareValue(r[2])) : rows;
}

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
async function loadData(){
  try{
    const entries = await Promise.all(
      Object.entries(FILES).map(async ([key, path]) => {
        const res = await fetch(path, { cache:'no-store' });
        if(!res.ok) throw new Error('Failed: ' + path);
        return [key, await res.json()];
      })
    );
    state.data = Object.fromEntries(entries);
  }catch(err){
    state.error = err.message || 'Failed to load data.';
    showError(state.error);
  }finally{
    state.loading = false;
    render();
  }
}

function setState(patch){
  Object.assign(state, patch);
  render();
}

function resetAll(){
  Object.assign(state,{
    stage:1, fromBiscuit:null, fromFormat:null,
    toBiscuit:null, toFormat:null, section:null,
    cavannaLine:'9', robertpackLine:'9',
    viewMode:null, onlyChanges:true, stepIndex:0
  });
  Object.assign(checkState,{
    active:false, stepIndex:0, results:{},
    showSummary:false, pendingSave:null, saving:false,
    tab:'check', _finishAfterSave:false,
    remoteVersions:null, remoteLogboek:null,
    remoteStatus:{ versions:'idle', logboek:'idle' }
  });
  render();
}

function getRobertPackValuesForFormat(format, col){
  const rp = state.data && state.data.robertpack;
  const byFormat = rp && rp.values && rp.values[format] ? rp.values[format] : {};
  return byFormat[col] || {};
}

function getRows(){
  if(!state.data) return [];
  if(state.section === 'cavanna'){
    const src = state.cavannaLine === '10' ? state.data.cavanna10 : state.data.cavanna9;
    return buildFlowRows(
      (src && src.values && src.values[state.fromFormat]) || {},
      (src && src.values && src.values[state.toFormat]) || {}
    );
  }
  if(state.section === 'robertpack'){
    return buildFlowRows(
      getRobertPackValuesForFormat(state.fromFormat, state.robertpackLine),
      getRobertPackValuesForFormat(state.toFormat, state.robertpackLine)
    );
  }
  if(state.section === 'dozen'){
    return buildFlowRows(
      (state.data.dozen && state.data.dozen.values && state.data.dozen.values[state.fromFormat]) || {},
      (state.data.dozen && state.data.dozen.values && state.data.dozen.values[state.toFormat]) || {}
    );
  }
  if(state.section === 'dekselaar'){
    return buildFlowRows(
      (state.data.dekselaar && state.data.dekselaar.values && state.data.dekselaar.values[state.fromFormat]) || {},
      (state.data.dekselaar && state.data.dekselaar.values && state.data.dekselaar.values[state.toFormat]) || {}
    );
  }
  return [];
}

function getExpectedValue(paramKey, originalExpected){
  const store = getStore();
  const sk = buildStoreKey();
  const scopeMap = store.currentValues && store.currentValues[sk];
  return (scopeMap && scopeMap[paramKey]) || originalExpected;
}

function detectPresetType(expectedVal){
  const norm = normalizeCompareValue(String(expectedVal));
  if(norm === '-' || norm === '—') return { type:'dash', options:null };
  if(norm === 'ja' || norm === 'nee') return { type:'preset', options:['JA','NEE'] };
  if(norm === 'open' || norm === 'dicht') return { type:'preset', options:['OPEN','DICHT'] };
  if(norm === 'a' || norm === 'b') return { type:'preset', options:['A','B'] };
  if(/^x\d+$/.test(norm)) return { type:'preset', options:['x1','x2','x3','x4','x5','x6','x7','x8'] };
  if(norm === 'uit' || norm === 'in') return { type:'preset', options:['uit','in'] };
  if(/gat$/.test(norm)) return { type:'preset', options:['1ste gat','4de gat'] };
  if(/^nr\.\d+\s*-\s*\d+x$/.test(norm)) return { type:'racetrack', options:null };
  if(norm.includes('->') || norm.includes('<-')) return { type:'sequence', options:null };
  if(norm.length > 20 && !/^[-+]?[\d,./]+$/.test(norm)) return { type:'freetext', options:null };
  return null;
}

function saveCurrentInput(){
  const inp = document.getElementById('check-actual-input');
  const rows = getRows();
  const cur = rows[checkState.stepIndex];
  if(!cur) return;
  const key = cur[0];
  const expRaw = cur[2];
  const normExp = normalizeDisplayValue(String(expRaw));
  const parts = normExp.split('/').map(p => p.trim()).filter(Boolean);
  const isColor = parts.length > 0 && parts.every(isColorToken);
  if(isColor) return;
  const preset = detectPresetType(expRaw);
  if(preset && preset.options) return;
  if(preset && (preset.type === 'dash' || preset.type === 'sequence' || preset.type === 'racetrack' || preset.type === 'freetext')) return;
  const prev = checkState.results[key] || {};
  const val = inp ? inp.value : (prev.actual || '');
  const exp = getExpectedValue(key, expRaw);
  const status = val.trim()
    ? (normalizeCompareValue(String(exp)) === normalizeCompareValue(val) ? 'match' : 'mismatch')
    : (prev.status || 'pending');
  checkState.results[key] = Object.assign({}, prev, { actual:val, status });
}

/* ═══════════════════════════════════════
   CHECK: SAVE CHANGE (remote + local cache)
═══════════════════════════════════════ */
async function confirmSave(){
  const p = checkState.pendingSave;
  if(!p) return;

  const saveBtn = document.getElementById('confirm-save-btn');
  const skipBtn = document.getElementById('confirm-skip-btn');
  checkState.saving = true;
  if(saveBtn){
    saveBtn.disabled = true;
    saveBtn.textContent = 'Opslaan...';
  }
  if(skipBtn) skipBtn.disabled = true;

  try{
    const ts = new Date().toISOString();
    const payload = {
      action:'saved',
      section:state.section,
      line:currentLineValue(),
      toBiscuit:state.toBiscuit,
      toFormat:state.toFormat,
      param:p.paramKey,
      old:normalizeDisplayValue(String(p.expectedVal)),
      new_:normalizeDisplayValue(String(p.actualVal)),
      note:'',
      ts
    };

    await apiSaveChange(payload);

    // Update local scope cache so subsequent checks use the new value
    const store = getStore();
    const sk = buildStoreKey();
    if(!store.currentValues[sk]) store.currentValues[sk] = {};
    store.currentValues[sk][p.paramKey] = payload.new_;
    saveStore(store);

    checkState.results[p.paramKey] = { status:'saved', actual:p.actualVal };

    // Invalidate remote caches so next tab open refetches
    checkState.remoteVersions = null;
    checkState.remoteLogboek = null;
    checkState.remoteStatus = { versions:'idle', logboek:'idle' };

    removeConfirmOverlay();
    checkState.pendingSave = null;
    const finishAfter = checkState._finishAfterSave;
    checkState._finishAfterSave = false;
    checkState.saving = false;

    if(finishAfter){
      checkState.showSummary = true;
      render();
    }else{
      advanceCheck();
    }
  }catch(err){
    checkState.saving = false;
    if(saveBtn){
      saveBtn.disabled = false;
      saveBtn.textContent = '↑ Ja, opslaan als nieuwe waarde';
    }
    if(skipBtn) skipBtn.disabled = false;
    showError(err && err.message ? err.message : 'Opslaan mislukt.');
  }
}

function confirmSkip(){
  const p = checkState.pendingSave;
  if(!p) return;
  checkState.results[p.paramKey] = { status:'mismatch', actual:p.actualVal };
  removeConfirmOverlay();
  const finishAfter = checkState._finishAfterSave;
  checkState._finishAfterSave = false;
  checkState.pendingSave = null;
  if(finishAfter){
    checkState.showSummary = true;
    render();
  }else{
    advanceCheck();
  }
}

function removeConfirmOverlay(){
  const el = document.getElementById('check-confirm-overlay');
  if(el) el.remove();
}

function renderConfirmOverlay(){
  const p = checkState.pendingSave;
  if(!p) return;
  removeConfirmOverlay();
  const div = document.createElement('div');
  div.className = 'check-confirm-overlay';
  div.id = 'check-confirm-overlay';
  div.innerHTML = `
    <div class="check-confirm-box">
      <div class="check-confirm-title">Waarde verschilt</div>
      <div class="check-confirm-body">De machine-waarde verschilt van de lijst. Wil je de nieuwe waarde opslaan als de geldende waarde?</div>
      <div class="check-confirm-vals">
        <span class="check-confirm-val old">${escapeHtml(normalizeDisplayValue(String(p.expectedVal)))}</span>
        <span class="check-confirm-arr">→</span>
        <span class="check-confirm-val new">${escapeHtml(normalizeDisplayValue(String(p.actualVal)))}</span>
      </div>
      <div class="check-confirm-actions">
        <button class="btn-confirm-save" id="confirm-save-btn">↑ Ja, opslaan als nieuwe waarde</button>
        <button class="btn-confirm-skip" id="confirm-skip-btn">Nee, doorgaan</button>
      </div>
    </div>`;
  document.body.appendChild(div);
  document.getElementById('confirm-save-btn').addEventListener('click', confirmSave);
  document.getElementById('confirm-skip-btn').addEventListener('click', confirmSkip);
}

function advanceCheck(){
  if(checkState.stepIndex < getRows().length - 1){
    checkState.stepIndex++;
    render();
  }else{
    checkState.showSummary = true;
    render();
  }
}

function openCheckMode(){
  Object.assign(checkState,{
    active:true, stepIndex:0, results:{},
    showSummary:false, pendingSave:null, saving:false,
    tab:'check', _finishAfterSave:false,
    remoteVersions:null, remoteLogboek:null,
    remoteStatus:{ versions:'idle', logboek:'idle' }
  });
  render();
}

function closeCheckMode(){
  Object.assign(checkState,{
    active:false, showSummary:false,
    pendingSave:null, _finishAfterSave:false
  });
  render();
}

function commitAndClose(){
  closeCheckMode();
}

/* ═══════════════════════════════════════
   FETCH VERSIONS / LOGBOEK
═══════════════════════════════════════ */
function loadRemoteVersions(){
  if(checkState.remoteStatus.versions === 'loading') return;
  checkState.remoteStatus.versions = 'loading';
  render();
  apiFetchVersions()
    .then(versions => {
      checkState.remoteVersions = versions;
      checkState.remoteStatus.versions = 'ok';
      render();
    })
    .catch(err => {
      console.error(err);
      checkState.remoteVersions = [];
      checkState.remoteStatus.versions = 'error';
      render();
    });
}

function loadRemoteLogboek(){
  if(checkState.remoteStatus.logboek === 'loading') return;
  checkState.remoteStatus.logboek = 'loading';
  render();
  apiFetchLogboek()
    .then(entries => {
      checkState.remoteLogboek = entries;
      checkState.remoteStatus.logboek = 'ok';
      render();
    })
    .catch(err => {
      console.error(err);
      checkState.remoteLogboek = [];
      checkState.remoteStatus.logboek = 'error';
      render();
    });
}

/* ═══════════════════════════════════════
   RENDER: building blocks
═══════════════════════════════════════ */
function renderChipGroup(items, value, onClick, formatter){
  formatter = formatter || (x => x);
  return `<div class="chipRow">${items.map(item => `
    <button class="chip${value === item ? ' active' : ''}" data-action="${onClick}" data-value="${item}">
      <span class="chipInner">${formatter(item)}</span>
    </button>
  `).join('')}</div>`;
}

function renderValueList(rows){
  if(!rows.length) return `<div class="emptyNote">Geen data gevonden</div>`;
  return `
    <div class="value-table">
      <div class="value-table-header">
        <span class="value-table-col">Parameter</span>
        <span class="value-table-col">Huidig</span>
        <span class="value-table-col center"></span>
        <span class="value-table-col">Nieuw</span>
      </div>
      <div class="value-rows">
        ${rows.map(r => `
          <div class="value-row">
            <span class="value-key">${renderParamKey(r[0])}</span>
            <span class="value-cell">${renderRichValue(r[1])}</span>
            <span class="value-sep">→</span>
            <span class="value-cell is-new">${renderRichValue(r[2])}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderStepPlayer(rows){
  const total = rows.length;
  const cur = rows[state.stepIndex];
  if(!total || !cur) return `<div class="emptyNote">Geen data gevonden</div>`;
  const pct = ((state.stepIndex + 1) / total * 100).toFixed(1);
  const isLast = state.stepIndex >= total - 1;

  return `
    <div class="player-wrap">
      <div class="player-main">
        <div class="player-top-bar">
          <span class="player-counter">${state.stepIndex + 1} / ${total}</span>
          <div class="player-progress-track"><div class="player-progress-fill" style="width:${pct}%"></div></div>
          <span class="player-counter">${pct}%</span>
        </div>
        <div class="player-body">
          <div class="player-key">PARAMETER</div>
          <div class="player-label">${renderPlayerLabel(cur[0])}</div>
          <div class="player-values">
            <div class="player-val-block">
              <div class="player-val-label">Huidig</div>
              <div class="player-val-box">${renderRichValue(cur[1])}</div>
            </div>
            <div class="player-arrow-sep">→</div>
            <div class="player-val-block">
              <div class="player-val-label">Nieuw</div>
              <div class="player-val-box new-val">${renderRichValue(cur[2])}</div>
            </div>
          </div>
        </div>
        <div class="player-controls">
          <button class="btn-ghost" data-action="prev-step" ${state.stepIndex === 0 ? 'disabled' : ''}>← Vorige</button>
          <button class="btn-primary" data-action="next-step">${isLast ? 'Afronden ✓' : 'Volgende →'}</button>
        </div>
      </div>
      <div class="player-sidebar">
        <div class="player-sidebar-header"><div class="player-sidebar-title">Stappen overzicht</div></div>
        <div class="mini-list">
          ${rows.map((r,i) => `
            <div class="mini-row${i === state.stepIndex ? ' active' : ''}" data-action="jump-step" data-value="${i}">
              <span class="mini-num">${String(i + 1).padStart(2,'0')}</span>
              <span class="mini-key">${escapeHtml(r[0])}</span>
              ${i < state.stepIndex ? '<span class="mini-check">✓</span>' : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function buildActualArea(colorMode, boxClass, liveStatus, curKey, actualVal, expectedVal){
  if(colorMode){
    const matchSt = liveStatus === 'match' ? 'background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.5);' : '';
    const missSt = liveStatus === 'mismatch' ? 'background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.5);' : '';
    return `
      <div class="check-val-box ${boxClass}" style="flex-direction:column;gap:12px;padding:20px;">
        <div style="font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);width:100%;">Klopt dit op de machine?</div>
        <div style="display:flex;gap:10px;width:100%;">
          <button class="check-color-btn match" data-action="check-color-confirm" data-key="${escapeHtml(curKey)}" data-value="match" style="${matchSt}">✓ Ja, klopt</button>
          <button class="check-color-btn miss" data-action="check-color-confirm" data-key="${escapeHtml(curKey)}" data-value="mismatch" style="${missSt}">✕ Nee, afwijking</button>
        </div>
      </div>`;
  }

  const preset = detectPresetType(expectedVal);

  if(preset && preset.type === 'dash'){
    return `
      <div>
        <div class="check-val-label" style="margin-bottom:8px;">Niet van toepassing</div>
        <div class="seq-confirm">
          <button class="preset-btn ${liveStatus === 'match' ? 'selected-match' : ''}" data-action="check-preset" data-key="${escapeHtml(curKey)}" data-value="-">✓ N.v.t. — bevestigen</button>
        </div>
      </div>`;
  }

  if(preset && preset.options){
    const expNorm = normalizeCompareValue(String(expectedVal));
    return `
      <div>
        <div class="check-val-label" style="margin-bottom:8px;">Selecteer waarde</div>
        <div class="preset-grid">
          ${preset.options.map(opt => {
            const normOpt = normalizeCompareValue(opt);
            const isExpected = normOpt === expNorm;
            const isSelected = normalizeCompareValue(actualVal || String(expectedVal)) === normOpt && liveStatus === 'match';
            const isMiss = normalizeCompareValue(actualVal) === normOpt && liveStatus === 'mismatch';
            return `
              <button class="preset-btn ${isSelected ? 'selected-match' : (isMiss ? 'selected-miss' : '')}" data-action="check-preset" data-key="${escapeHtml(curKey)}" data-value="${escapeHtml(opt)}">
                ${escapeHtml(opt)}
                ${isExpected ? '<span style="display:block;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-top:3px;">verwacht</span>' : ''}
              </button>
            `;
          }).join('')}
        </div>
      </div>`;
  }

  if(preset && (preset.type === 'sequence' || preset.type === 'racetrack' || preset.type === 'freetext')){
    return `
      <div>
        <div class="check-val-label" style="margin-bottom:8px;">Controleer op machine</div>
        <div class="seq-display">${escapeHtml(normalizeDisplayValue(String(expectedVal)))}</div>
        <div class="seq-confirm">
          <button class="preset-btn ${liveStatus === 'match' ? 'selected-match' : ''}" data-action="check-preset" data-key="${escapeHtml(curKey)}" data-value="${escapeHtml(String(expectedVal))}">✓ Klopt</button>
          <button class="preset-btn ${liveStatus === 'mismatch' ? 'selected-miss' : ''}" data-action="check-preset-miss" data-key="${escapeHtml(curKey)}">✕ Afwijking</button>
        </div>
      </div>`;
  }

  return `
    <div class="check-val-box ${boxClass}">
      <input
        class="check-input"
        id="check-actual-input"
        type="text"
        
        autocomplete="off"
        placeholder="Voer waarde in…"
        value="${escapeHtml(actualVal)}"
        data-param="${escapeHtml(curKey)}"
        data-expected="${escapeHtml(String(expectedVal))}"
      />
    </div>`;
}

function renderCheckMode(checkRows){
  const total = checkRows.length;
  if(!total){
    return `<div class="emptyNote">Geen parameters gevonden</div>`;
  }
  if(checkState.showSummary) return renderCheckSummary(checkRows);

  const done = checkRows.filter(r => {
    const s = checkState.results[r[0]] && checkState.results[r[0]].status;
    return s && s !== 'pending';
  }).length;
  const pct = Math.round(done / total * 100);

  const cur = checkRows[checkState.stepIndex];
  const [curKey, , curExpRaw] = cur;
  const curResult = checkState.results[curKey] || {};
  const expectedVal = getExpectedValue(curKey, curExpRaw);
  const actualVal = curResult.actual || '';
  const liveStatus = curResult.status || (
    actualVal.trim()
      ? (normalizeCompareValue(String(expectedVal)) === normalizeCompareValue(actualVal) ? 'match' : 'mismatch')
      : 'pending'
  );
  const colorMode = (function(){
    const parts = normalizeDisplayValue(String(expectedVal)).split('/').map(p => p.trim()).filter(Boolean);
    return parts.length > 0 && parts.every(isColorToken);
  })();
  const preset = detectPresetType(expectedVal);
  const stacked = preset && (preset.type === 'sequence' || preset.type === 'racetrack' || preset.type === 'freetext' || preset.type === 'dash');

  const boxClass = liveStatus === 'match' ? 'status-match'
    : liveStatus === 'mismatch' ? 'status-mismatch'
    : liveStatus === 'saved' ? 'status-saved'
    : 'actual';

  const badgeCls = liveStatus === 'match' ? 'match'
    : liveStatus === 'mismatch' ? 'mismatch'
    : liveStatus === 'saved' ? 'saved'
    : 'pending';

  const badgeLabel = liveStatus === 'match' ? '✓ Match'
    : liveStatus === 'mismatch' ? '✕ Mismatch'
    : liveStatus === 'saved' ? '↑ Opgeslagen'
    : 'Wacht…';

  const actualArea = buildActualArea(colorMode, boxClass, liveStatus, curKey, actualVal, expectedVal);
  const isLast = checkState.stepIndex >= total - 1;

  return `
    <div class="check-wrap">
      <div>
        <div class="check-player">
          <div class="check-player-top">
            <span class="player-counter">${checkState.stepIndex + 1} / ${total}</span>
            <div class="player-progress-track" style="flex:1;margin:0 18px">
              <div class="player-progress-fill" style="width:${pct}%"></div>
            </div>
            <span class="check-status-badge ${badgeCls}">
              <span class="check-status-dot"></span>${badgeLabel}
            </span>
          </div>

          <div class="check-player-body">
            <div class="check-param-label">PARAMETER</div>
            <div class="check-param-name">${renderPlayerLabel(curKey)}</div>

            ${stacked ? `
              <div class="check-values-stacked">
                <div class="check-val-block">
                  <div class="check-val-label">Expected (lijst)</div>
                  <div class="check-val-box expected">${renderRichValue(String(expectedVal))}</div>
                </div>
                <div class="check-val-block">${actualArea}</div>
              </div>
            ` : `
              <div class="check-values-grid">
                <div class="check-val-block">
                  <div class="check-val-label">Expected (lijst)</div>
                  <div class="check-val-box expected">${renderRichValue(String(expectedVal))}</div>
                </div>
                <div class="check-arrow">→</div>
                <div class="check-val-block">
                  <div class="check-val-label">Actual (machine)</div>
                  ${actualArea}
                </div>
              </div>
            `}
          </div>

          <div class="check-player-nav">
            <button class="btn-ghost" data-action="check-prev" ${checkState.stepIndex === 0 ? 'disabled' : ''}>← Vorige</button>
            <div style="display:flex;gap:8px;align-items:center">
              <span class="player-counter">${done}/${total}</span>
              ${isLast
                ? `<button class="btn-primary" data-action="check-finish">Afronden ✓</button>`
                : `<button class="btn-primary" data-action="check-next">Volgende →</button>`
              }
            </div>
          </div>
        </div>
      </div>

      <div class="check-sidebar">
        <div class="check-sidebar-header">
          <div class="player-sidebar-title">Parameters</div>
          <div class="player-counter">${pct}%</div>
        </div>
        <div class="mini-list">
          ${checkRows.map(([key], i) => {
            const s = (checkState.results[key] && checkState.results[key].status) || 'pending';
            return `
              <div class="check-mini-row${i === checkState.stepIndex ? ' active' : ''}" data-action="check-jump" data-value="${i}">
                <span class="check-mini-num">${String(i + 1).padStart(2,'0')}</span>
                <span class="check-mini-key">${escapeHtml(key)}</span>
                <span class="check-mini-status ${s}"></span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>`;
}

function renderCheckSummary(checkRows){
  const saved = checkRows.filter(([k]) => (checkState.results[k] && checkState.results[k].status) === 'saved');
  const mismatches = checkRows.filter(([k]) => (checkState.results[k] && checkState.results[k].status) === 'mismatch');
  const matches = checkRows.filter(([k]) => (checkState.results[k] && checkState.results[k].status) === 'match');
  const pending = checkRows.filter(([k]) => {
    const s = checkState.results[k] && checkState.results[k].status;
    return !s || s === 'pending';
  });

  const allChecked = [...saved, ...mismatches, ...matches];

  return `
    <div class="check-summary-screen">
      <div class="content-title" style="font-size:25px;margin-bottom:6px;">Check afgerond</div>
      <div class="content-sub" style="margin-bottom:26px;">${getSectionTitle(state.section)} · ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat || '')}</div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;">
        <span class="pill" style="color:var(--green)">${matches.length} Match</span>
        <span class="pill" style="color:var(--red)">${mismatches.length} Mismatch</span>
        <span class="pill" style="color:var(--blue)">${saved.length} Opgeslagen</span>
        ${pending.length ? `<span class="pill">${pending.length} Niet gecheckt</span>` : ''}
      </div>

      ${allChecked.length ? `
        <div class="value-table">
          <div class="value-table-header">
            <span class="value-table-col">Parameter</span>
            <span class="value-table-col">Expected</span>
            <span class="value-table-col center"></span>
            <span class="value-table-col">Actual</span>
          </div>
          <div class="value-rows">
            ${allChecked.map(([key, , expRaw]) => {
              const r = checkState.results[key];
              const status = (r && r.status) || 'pending';
              const actualDisplay = escapeHtml(normalizeDisplayValue(String(r && r.actual || '—')));
              return `
                <div class="value-row">
                  <span class="value-key">${renderParamKey(key)}</span>
                  <span class="value-cell">${renderRichValue(getExpectedValue(key, expRaw))}</span>
                  <span class="value-sep">→</span>
                  <span class="value-cell ${status === 'saved' ? 'is-new' : ''}" style="${status === 'match' ? 'color:var(--green)' : status === 'mismatch' ? 'color:var(--red)' : ''}">${actualDisplay}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      ` : `<div class="emptyNote">Geen parameters gecheckt</div>`}

      <div class="actions-bar" style="margin-top:24px;border-top:none;padding-top:0;justify-content:flex-start;">
        <button class="btn-primary" data-action="close-check">Sluiten</button>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   HISTORY / AUDIT TABS (remote)
═══════════════════════════════════════ */
function remoteStatusPill(kind){
  const s = checkState.remoteStatus[kind];
  if(s === 'loading') return `<span class="remote-status loading"><span class="remote-status-dot"></span>Laden…</span>`;
  if(s === 'error')   return `<span class="remote-status error"><span class="remote-status-dot"></span>Fout</span>`;
  if(s === 'ok')      return `<span class="remote-status ok"><span class="remote-status-dot"></span>Live</span>`;
  return '';
}

function renderHistory(){
  const statusPill = remoteStatusPill('versions');
  if(checkState.remoteStatus.versions === 'loading' && !checkState.remoteVersions){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Versies ophalen…</div>`;
  }
  if(checkState.remoteStatus.versions === 'error'){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Fout bij ophalen versies</div>`;
  }
  const versions = checkState.remoteVersions || [];
  if(!versions.length){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Geen versies gevonden</div>`;
  }

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
    <div class="version-list">
      ${versions.map((v, vi) => `
        <div class="version-card">
          <div class="version-card-header" data-action="toggle-version" data-value="${vi}">
            <span class="version-badge${vi === 0 ? ' latest' : ''}">v${escapeHtml(v.v || (versions.length - vi))}</span>
            <span class="version-meta">${escapeHtml(biscuitLabel(v.toBiscuit || state.toBiscuit))} ${escapeHtml(v.toFormat || state.toFormat || '')} · ${escapeHtml(getSectionTitle(v.section || state.section))}${(v.line || '') ? ' · Lijn ' + escapeHtml(v.line) : ''}</span>
            <span class="version-change-count">${(v.changes || []).length} wijziging${(v.changes || []).length === 1 ? '' : 'en'}</span>
            <span class="version-date">${escapeHtml(v.ts || '')}</span>
          </div>
          <div class="version-body${vi === 0 ? ' open' : ''}" id="version-body-${vi}">
            <div class="version-param-list">
              ${(v.changes || []).map(c => `
                <div class="version-param-row">
                  <span class="version-param-name">${renderParamKey(c.param || '')}</span>
                  <span class="version-param-val">${escapeHtml(c.old || '')}</span>
                  <span class="version-param-sep">→</span>
                  <span class="version-param-val new">${escapeHtml(c.new_ || '')}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function renderAudit(){
  const statusPill = remoteStatusPill('logboek');
  if(checkState.remoteStatus.logboek === 'loading' && !checkState.remoteLogboek){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Logboek ophalen…</div>`;
  }
  if(checkState.remoteStatus.logboek === 'error'){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Fout bij ophalen logboek</div>`;
  }
  const logs = checkState.remoteLogboek || [];
  if(!logs.length){
    return `
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
      <div class="empty-state">Geen logboek gevonden</div>`;
  }

  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">${statusPill}</div>
    <div class="audit-list">
      ${logs.map(e => {
        const action = e.action || 'saved';
        const icon = action === 'saved' ? '↑' : action === 'match' ? '✓' : action === 'mismatch' ? '✕' : '•';
        return `
          <div class="audit-entry">
            <div class="audit-icon ${escapeHtml(action)}">${icon}</div>
            <div class="audit-body">
              <div class="audit-title">${escapeHtml(e.param || '')}</div>
              <div class="audit-meta">${escapeHtml(getSectionTitle(e.section || ''))}${e.line ? ' · Lijn ' + escapeHtml(e.line) : ''} · ${escapeHtml(biscuitLabel(e.toBiscuit || ''))} ${escapeHtml(e.toFormat || '')}</div>
              <div class="audit-change">
                <span class="audit-old">${escapeHtml(e.old || '')}</span>
                <span class="audit-arr">→</span>
                <span class="audit-new">${escapeHtml(e.new_ || '')}</span>
              </div>
            </div>
            <div class="audit-timestamp">${escapeHtml(e.ts || '')}</div>
          </div>
        `;
      }).join('')}
    </div>`;
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderSidebar(){
  const canContinue = state.fromBiscuit && state.fromFormat && state.toBiscuit && state.toFormat;
  const sectionLabel = !state.section ? '' :
    state.section === 'cavanna' ? `Cavanna · L${state.cavannaLine}` :
    state.section === 'robertpack' ? `Robert Pack · L${state.robertpackLine}` :
    state.section === 'dozen' ? 'Dozen Opzetter' : 'Dekselaar Opzetter';

  const steps = [
    { label:'Product & Formaat', done:canContinue, active:state.stage === 1 },
    { label:'Sectie & Ombouw', done:state.stage === 2 && !!state.section, active:state.stage === 2 && !checkState.active },
    { label:'Check & Verify', done:false, active:checkState.active, checkActive:checkState.active }
  ];

  return `
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Ombouw sessie</div>
        <div class="flow-card">
          <div class="flow-card-row">
            <div class="flow-block">
              <div class="flow-block-label">Van</div>
              <div class="flow-block-value ${state.fromBiscuit ? '' : 'dim'}">${state.fromBiscuit ? biscuitLabel(state.fromBiscuit) + ' · ' + state.fromFormat : '—'}</div>
            </div>
            <div class="flow-arrow-col">→</div>
            <div class="flow-block">
              <div class="flow-block-label">Naar</div>
              <div class="flow-block-value ${state.toBiscuit ? 'amber' : 'dim'}">${state.toBiscuit ? biscuitLabel(state.toBiscuit) + ' · ' + state.toFormat : '—'}</div>
            </div>
          </div>
        </div>
        ${sectionLabel ? `<div class="section-tag"><div class="tag-dot"></div>${escapeHtml(sectionLabel)}</div>` : ''}
      </div>

      <div class="sidebar-sep"></div>

      <div class="step-list">
        <div class="sidebar-label" style="padding:0 2px;margin-bottom:10px">Workflow</div>
        ${steps.map((s, i) => `
          <div class="step-item${s.done ? ' done' : ''}${s.active && !s.done ? ' active' : ''}${s.checkActive ? ' check-active' : ''}">
            <div class="step-num">${s.done ? '✓' : i + 1}</div>
            <div class="step-text">${s.label}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function render(){
  const shell = document.getElementById('app-shell');
  const rows = getRows();
  const visibleRows = filterRows(rows, state.onlyChanges);

  let bcParts = [];
  if(state.stage >= 1) bcParts.push(`<span class="bc-item${state.stage === 1 && !checkState.active ? ' active' : ''}">Configuratie</span>`);
  if(state.stage >= 2) bcParts.push(`<span class="bc-sep">›</span><span class="bc-item${state.stage === 2 && !checkState.active && !state.section ? ' active' : ''}">Sectie kiezen</span>`);
  if(state.stage === 2 && state.section) bcParts.push(`<span class="bc-sep">›</span><span class="bc-item${!checkState.active ? ' active' : ''}">${getSectionTitle(state.section)}</span>`);
  if(checkState.active) bcParts.push(`<span class="bc-sep">›</span><span class="bc-item active" style="color:#06b6d4">Check Mode</span>`);

  let mainContent = '';

  if(state.loading){
    mainContent = `<div class="loading-screen"><div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div><div class="loading-label">Systeem initialiseren</div></div>`;
  }else if(state.error){
    mainContent = `<div class="content"><div class="emptyNote">${escapeHtml(state.error)}</div></div>`;
  }else if(checkState.active && state.stage === 2 && state.section){
    const checkRows = getRows();
    const tabContent = checkState.tab === 'check' ? renderCheckMode(checkRows)
      : checkState.tab === 'history' ? renderHistory()
      : renderAudit();

    mainContent = `
      <div class="content">
        <div class="check-header">
          <div class="check-header-left">
            <button class="btn-back" data-action="close-check">‹</button>
            <div class="check-title">Check Mode <span style="font-family:var(--mono);font-size:12px;color:var(--text-3);font-weight:400;margin-left:4px">— ${getSectionTitle(state.section)}</span></div>
          </div>
          <div class="check-header-right">
            <div class="pill">${renderColorDot(getBiscuitMeta(state.toBiscuit) && getBiscuitMeta(state.toBiscuit).color)} ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat || '')}</div>
            ${currentLineValue() ? `<div class="pill">Lijn ${escapeHtml(currentLineValue())}</div>` : ''}
          </div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn${checkState.tab === 'check' ? ' active' : ''}" data-action="check-tab" data-value="check">⊙ Check</button>
          <button class="tab-btn${checkState.tab === 'history' ? ' active' : ''}" data-action="check-tab" data-value="history">◷ Versies</button>
          <button class="tab-btn${checkState.tab === 'audit' ? ' active' : ''}" data-action="check-tab" data-value="audit">≡ Logboek</button>
        </div>

        ${tabContent}
      </div>`;
  }else if(state.stage === 1){
    mainContent = `
      <div class="content">
        <div class="content-header">
          <div class="content-title">Configureer ombouw</div>
          <div class="content-sub">Selecteer van welk product je komt en naar welk product je gaat.</div>
        </div>

        <div class="panel-grid">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Van</span>
              ${state.fromBiscuit && state.fromFormat ? '<span class="panel-badge">Gereed</span>' : ''}
            </div>
            <div class="panel-body">
              <div class="field-label">Product</div>
              ${renderChipGroup(BISCUITS.map(b => b.id), state.fromBiscuit, 'from-product', id => `${renderColorDot(getBiscuitMeta(id) && getBiscuitMeta(id).color)}<span>${escapeHtml(biscuitLabel(id))}</span>`)}
              ${state.fromBiscuit ? `<div class="field-label">Formaat</div>${renderChipGroup(formatsForBiscuit(state.fromBiscuit), state.fromFormat, 'from-format')}` : ''}
            </div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Naar</span>
              ${state.toBiscuit && state.toFormat ? '<span class="panel-badge">Gereed</span>' : ''}
            </div>
            <div class="panel-body">
              <div class="field-label">Product</div>
              ${renderChipGroup(BISCUITS.map(b => b.id), state.toBiscuit, 'to-product', id => `${renderColorDot(getBiscuitMeta(id) && getBiscuitMeta(id).color)}<span>${escapeHtml(biscuitLabel(id))}</span>`)}
              ${state.toBiscuit ? `<div class="field-label">Formaat</div>${renderChipGroup(formatsForBiscuit(state.toBiscuit), state.toFormat, 'to-format')}` : ''}
            </div>
          </div>
        </div>

        <div class="actions-bar">
          <button class="btn-ghost" data-action="reset-all">Reset</button>
          <button class="btn-primary" data-action="go-sections" ${state.fromBiscuit && state.fromFormat && state.toBiscuit && state.toFormat ? '' : 'disabled'}>Volgende stap →</button>
        </div>
      </div>`;
  }else if(state.stage === 2 && !state.section){
    mainContent = `
      <div class="content">
        <div class="view-header">
          <div class="view-header-left">
            <button class="btn-back" data-action="back-setup">‹</button>
            <div class="view-title">Kies sectie</div>
          </div>
        </div>

        <div class="section-grid">
          ${['cavanna','robertpack','dozen','dekselaar'].map(id => `
            <button class="section-card" data-action="open-section" data-value="${id}">
              <div class="section-card-logo-wrap">
                <img class="section-card-logo" src="${SECTION_LOGOS[id]}" alt="${escapeHtml(getSectionTitle(id))}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="section-card-logo-fallback">${SECTION_ICONS[id]}</div>
              </div>
              <div class="section-card-title">${escapeHtml(getSectionTitle(id))}</div>
              <div class="section-card-desc">${escapeHtml(SECTION_DESCS[id])}</div>
              <div class="section-card-footer"><span class="section-card-arrow">→</span></div>
            </button>
          `).join('')}
        </div>
      </div>`;
  }else if(state.stage === 2 && state.section){
    mainContent = `
      <div class="content">
        <div class="view-header">
          <div class="view-header-left">
            <button class="btn-back" data-action="close-section">‹</button>
            <img src="${SECTION_LOGOS[state.section]}" alt="${escapeHtml(getSectionTitle(state.section))}" class="section-header-logo" onerror="this.style.display='none'">
          </div>
          <div class="view-header-right">
            <div class="pill">${renderColorDot(getBiscuitMeta(state.fromBiscuit) && getBiscuitMeta(state.fromBiscuit).color)} ${escapeHtml(biscuitLabel(state.fromBiscuit))} ${escapeHtml(state.fromFormat || '')}</div>
            <span style="color:var(--text-3);font-family:var(--mono);font-size:11px">→</span>
            <div class="pill">${renderColorDot(getBiscuitMeta(state.toBiscuit) && getBiscuitMeta(state.toBiscuit).color)} ${escapeHtml(biscuitLabel(state.toBiscuit))} ${escapeHtml(state.toFormat || '')}</div>
            <button class="view-action-btn" data-action="open-check">⊙ Check &amp; Verify</button>
          </div>
        </div>

        <div class="toggle-row">
          ${state.section === 'cavanna' ? `
            <button class="toggleBtn ${state.cavannaLine === '9' ? 'active' : ''}" data-action="cav-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
            <button class="toggleBtn ${state.cavannaLine === '10' ? 'active' : ''}" data-action="cav-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>
          ` : ''}
          ${state.section === 'robertpack' ? `
            <button class="toggleBtn ${state.robertpackLine === '9' ? 'active' : ''}" data-action="rp-line" data-value="9">${renderColorDot('rood')}<span>Lijn 9</span></button>
            <button class="toggleBtn ${state.robertpackLine === '10' ? 'active' : ''}" data-action="rp-line" data-value="10">${renderColorDot('grijs')}<span>Lijn 10</span></button>
          ` : ''}
        </div>

        <div class="mode-bar">
          <div class="view-actions">
            <button class="view-action-btn${state.viewMode === 'start' ? ' active' : ''}" data-action="view-mode" data-value="start">▶ Stap voor stap</button>
            <button class="view-action-btn${state.viewMode === 'list' ? ' active' : ''}" data-action="view-mode" data-value="list">☰ Lijst</button>
          </div>
          ${state.viewMode ? `
            <div class="mode-pills">
              <button class="mode-btn${!state.onlyChanges ? ' active' : ''}" data-action="show-mode" data-value="all">Alles</button>
              <button class="mode-btn${state.onlyChanges ? ' active' : ''}" data-action="show-mode" data-value="changes">Wijzigingen</button>
            </div>
          ` : ''}
        </div>

        ${state.viewMode === 'start' ? renderStepPlayer(visibleRows) : ''}
        ${state.viewMode === 'list' ? renderValueList(visibleRows) : ''}
        ${!state.viewMode ? `<div class="emptyNote">Kies hierboven hoe je de informatie wilt weergeven.</div>` : ''}
      </div>`;
  }

  shell.innerHTML = `
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo"><img src="./pally-logo.png" alt="Pally" onerror="this.style.display='none'"></div>
        <span class="topbar-name">Pally Biscuits</span>
        <div class="topbar-sep"></div>
        <span class="topbar-module">${checkState.active ? 'Check Mode' : 'Ombouwen'}</span>
      </div>
      <div class="topbar-right">
        <div class="sys-readout">SYS v4.0</div>
        <div class="status-pill"><div class="status-dot"></div><span class="status-label">Online</span></div>
      </div>
    </div>

    <div class="body">
      ${renderSidebar()}
      <div class="main">
        <div class="breadcrumb">${bcParts.join('')}</div>
        ${mainContent}
      </div>
    </div>
  `;

  bindActions();
}

/* ═══════════════════════════════════════
   EVENT BINDING
═══════════════════════════════════════ */
function bindActions(){
  document.querySelectorAll('[data-action]').forEach(el => {
    if(el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      const value = el.dataset.value;

      if(action === 'from-product') setState({ fromBiscuit:value, fromFormat:null });
      if(action === 'to-product')   setState({ toBiscuit:value, toFormat:null });
      if(action === 'from-format')  setState({ fromFormat:value });
      if(action === 'to-format')    setState({ toFormat:value });

      if(action === 'reset-all') resetAll();
      if(action === 'go-sections' && state.fromBiscuit && state.fromFormat && state.toBiscuit && state.toFormat) setState({ stage:2 });

      if(action === 'back-setup')    setState({ stage:1 });
      if(action === 'open-section')  setState({ section:value, viewMode:null, stepIndex:0 });
      if(action === 'close-section') setState({ section:null, viewMode:null, stepIndex:0 });

      if(action === 'cav-line') setState({ cavannaLine:value, stepIndex:0 });
      if(action === 'rp-line')  setState({ robertpackLine:value, stepIndex:0 });

      if(action === 'show-mode') setState({ onlyChanges:value === 'changes', stepIndex:0 });
      if(action === 'view-mode') setState({ viewMode: state.viewMode === value ? null : value, stepIndex:0 });

      if(action === 'jump-step') setState({ stepIndex:parseInt(value,10) });
      if(action === 'prev-step' && state.stepIndex > 0) setState({ stepIndex:state.stepIndex - 1 });
      if(action === 'next-step'){
        const vr = filterRows(getRows(), state.onlyChanges);
        if(state.stepIndex < vr.length - 1) setState({ stepIndex:state.stepIndex + 1 });
        else setState({ viewMode:null, stepIndex:0 });
      }

      if(action === 'open-check')   openCheckMode();
      if(action === 'close-check')  closeCheckMode();
      if(action === 'check-commit') commitAndClose();

      if(action === 'check-tab'){
        checkState.tab = value;
        render();
        if(value === 'history' && !checkState.remoteVersions && checkState.remoteStatus.versions !== 'loading'){
          loadRemoteVersions();
        }
        if(value === 'audit' && !checkState.remoteLogboek && checkState.remoteStatus.logboek !== 'loading'){
          loadRemoteLogboek();
        }
      }

      if(action === 'check-jump'){
        saveCurrentInput();
        checkState.stepIndex = parseInt(value,10);
        render();
      }

      if(action === 'check-prev'){
        saveCurrentInput();
        if(checkState.stepIndex > 0){
          checkState.stepIndex--;
          render();
        }
      }

      if(action === 'check-next'){
        saveCurrentInput();
        const rows = getRows();
        const cur = rows[checkState.stepIndex];
        if(!cur) return;
        const key = cur[0];
        const expRaw = cur[2];
        const res = checkState.results[key] || {};
        if(res.status === 'mismatch'){
          checkState.pendingSave = {
            paramKey:key,
            expectedVal:getExpectedValue(key, expRaw),
            actualVal:res.actual || ''
          };
          renderConfirmOverlay();
        }else{
          advanceCheck();
        }
      }

      if(action === 'check-finish'){
        saveCurrentInput();
        const rows = getRows();
        const cur = rows[checkState.stepIndex];
        if(!cur) return;
        const key = cur[0];
        const expRaw = cur[2];
        const res = checkState.results[key] || {};
        if(res.status === 'mismatch'){
          checkState.pendingSave = {
            paramKey:key,
            expectedVal:getExpectedValue(key, expRaw),
            actualVal:res.actual || ''
          };
          checkState._finishAfterSave = true;
          renderConfirmOverlay();
        }else{
          checkState.showSummary = true;
          render();
        }
      }

      if(action === 'check-preset'){
        const pKey = el.dataset.key;
        const pVal = el.dataset.value;
        const row = getRows().find(r => r[0] === pKey);
        const exp = getExpectedValue(pKey, row ? row[2] : '');
        const isMatch = normalizeCompareValue(pVal) === normalizeCompareValue(String(exp));
        checkState.results[pKey] = { actual:pVal, status:isMatch ? 'match' : 'mismatch' };
        render();
      }

      if(action === 'check-preset-miss'){
        const pKey = el.dataset.key;
        checkState.results[pKey] = { actual:'—', status:'mismatch' };
        render();
      }

      if(action === 'check-color-confirm'){
        const key = el.dataset.key;
        const status = el.dataset.value;
        checkState.results[key] = { actual:status === 'match' ? '✓' : '✕', status };
        render();
      }

      if(action === 'toggle-version'){
        const body = document.getElementById('version-body-' + value);
        if(body) body.classList.toggle('open');
      }
    });
  });

  const inp = document.getElementById('check-actual-input');
  if(inp){
    inp.addEventListener('input', () => {
      const rows = getRows();
      const cur = rows[checkState.stepIndex];
      if(!cur) return;
      const key = cur[0];
      const expRaw = cur[2];
      const val = inp.value;
      const exp = getExpectedValue(key, expRaw);
      const status = val.trim()
        ? (normalizeCompareValue(String(exp)) === normalizeCompareValue(val) ? 'match' : 'mismatch')
        : 'pending';
      const prev = checkState.results[key] || {};
      checkState.results[key] = Object.assign({}, prev, { actual:val, status });

      // Live visual update without re-render
      const box = inp.closest('.check-val-box');
      if(box){
        box.className = 'check-val-box ' +
          (status === 'match' ? 'status-match' : status === 'mismatch' ? 'status-mismatch' : 'actual');
      }
      const badge = document.querySelector('.check-status-badge');
      if(badge){
        const labels = { match:'✓ Match', mismatch:'✕ Mismatch', pending:'Wacht…' };
        const cls = { match:'match', mismatch:'mismatch', pending:'pending' };
        badge.className = 'check-status-badge ' + (cls[status] || 'pending');
        badge.innerHTML = `<span class="check-status-dot"></span>${labels[status] || 'Wacht…'}`;
      }
    });
    inp.focus();
    const len = inp.value.length;
    inp.setSelectionRange(len, len);
  }
}

render();
loadData();

})();
</script>
</body>
</html>
